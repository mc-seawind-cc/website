  <script>
    // 全部照片頁面 — 無限滾動載入
    (function() {
      const container = document.getElementById('allPhotosGrid');
      if (!container) return;

      const BATCH_SIZE = 24;
      let allPhotos = [];
      let loaded = 0;

      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const lightboxClose = document.getElementById('lightboxClose');
      const lightboxPrev = document.getElementById('lightboxPrev');
      const lightboxNext = document.getElementById('lightboxNext');
      const lightboxCounter = document.getElementById('lightboxCounter');
      let currentIdx = 0;

      function getVisible() {
        return Array.from(container.querySelectorAll('.photo-item')).filter(
          img => img.style.display !== 'none' && img.naturalWidth > 0
        );
      }

      function showLightbox(i) {
        const visible = getVisible();
        if (!visible.length) return;
        if (i < 0) i = visible.length - 1;
        if (i >= visible.length) i = 0;
        currentIdx = i;
        lightboxImg.src = visible[currentIdx].src;
        if (lightboxCounter) lightboxCounter.textContent = `${currentIdx + 1} / ${visible.length}`;
        lightbox.classList.add('open');
      }

      container.addEventListener('click', e => {
        if (e.target.classList.contains('photo-item')) {
          const visible = getVisible();
          const vi = visible.indexOf(e.target);
          showLightbox(vi >= 0 ? vi : 0);
        }
      });

      lightboxClose?.addEventListener('click', () => lightbox.classList.remove('open'));
      lightboxPrev?.addEventListener('click', e => { e.stopPropagation(); showLightbox(currentIdx - 1); });
      lightboxNext?.addEventListener('click', e => { e.stopPropagation(); showLightbox(currentIdx + 1); });
      lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
      document.addEventListener('keydown', e => {
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'Escape') lightbox.classList.remove('open');
        if (e.key === 'ArrowLeft') showLightbox(currentIdx - 1);
        if (e.key === 'ArrowRight') showLightbox(currentIdx + 1);
      });

      fetch('photos.json')
        .then(r => r.json())
        .then(data => {
          allPhotos = data.photos || [];
          if (!allPhotos.length) {
            container.innerHTML = '<div class="photo-placeholder">暫無照片</div>';
            return;
          }

          const grid = document.createElement('div');
          grid.className = 'photo-grid';
          container.appendChild(grid);

          const counter = document.createElement('div');
          counter.className = 'photo-counter';
          container.appendChild(counter);

          function loadBatch() {
            const end = Math.min(loaded + BATCH_SIZE, allPhotos.length);
            for (let i = loaded; i < end; i++) {
              const img = document.createElement('img');
              img.src = allPhotos[i];
              img.className = 'photo-item';
              img.alt = `海風風景照 ${i + 1}`;
              img.loading = 'lazy';
              img.onerror = function() { this.style.display = 'none'; };
              grid.appendChild(img);
            }
            loaded = end;
            counter.textContent = `${loaded} / ${allPhotos.length}`;

            if (loaded < allPhotos.length) {
              setupSentinel();
            } else if (sentinel) {
              sentinel.remove();
            }
          }

          var sentinel = null;
          function setupSentinel() {
            if (sentinel) sentinel.remove();
            sentinel = document.createElement('div');
            sentinel.className = 'photo-sentinel';
            sentinel.innerHTML = '<div class="photo-loading">載入中⋯</div>';
            container.appendChild(sentinel);

            const obs = new IntersectionObserver(entries => {
              if (entries[0].isIntersecting) {
                obs.disconnect();
                setTimeout(loadBatch, 200);
              }
            }, { rootMargin: '300px' });
            obs.observe(sentinel);
          }

          loadBatch();
        });
    })();
  </script>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <button class="lightbox-prev" id="lightboxPrev">‹</button>
    <button class="lightbox-next" id="lightboxNext">›</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-counter" id="lightboxCounter"></div>
