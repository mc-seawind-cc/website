<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找不到頁面 — 海風</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/img/logo.png">
  <meta name="theme-color" content="#060a14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      background: #060a14;
      user-select: none;
    }

    .scene { position: fixed; inset: 0; }

    .sky {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, #050810 0%, #0a1225 25%, #0e1c38 50%, #0c1a30 100%);
    }
    .star { position: absolute; background: #fff; border-radius: 50%; }
    .moon {
      position: absolute; top: 14%; right: 20%;
      width: 64px; height: 64px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffce8, #f0d878, #c49a30);
      box-shadow: 0 0 30px 10px rgba(240,216,120,0.1), 0 0 80px 30px rgba(240,216,120,0.04);
    }

    .ocean {
      position: absolute; bottom: 0; left: 0; right: 0; height: 45%;
    }
    .ocean-body {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(10,18,37,0) 0%, rgba(8,16,32,0.8) 15%, rgba(6,14,28,0.95) 40%, #060e1c 100%);
    }
    .wave-svg { position: absolute; left: 0; width: 200%; pointer-events: none; }
    .wave-svg.w1 { top: 0%; height: 40%; animation: drift 16s linear infinite; }
    .wave-svg.w2 { top: 8%; height: 50%; animation: drift 22s linear infinite reverse; }
    .wave-svg.w3 { top: 18%; height: 60%; animation: drift 12s linear infinite; }
    .wave-svg.w4 { top: 30%; height: 70%; animation: drift 28s linear infinite reverse; }
    @keyframes drift { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .horizon {
      position: absolute; bottom: 42%; left: 0; right: 0; height: 40px;
      background: linear-gradient(180deg, transparent, rgba(87,138,255,0.04), transparent);
      pointer-events: none;
    }
    .reflection {
      position: absolute; bottom: 38%; right: calc(20% + 30px);
      width: 3px;
      background: linear-gradient(180deg, rgba(240,216,120,0.2), rgba(240,216,120,0.05), transparent);
      border-radius: 2px; filter: blur(2px);
      animation: refl 5s ease-in-out infinite alternate;
    }
    @keyframes refl { 0% { height: 60px; opacity: 0.5; } 100% { height: 100px; opacity: 0.2; } }

    /* ═══ Content ═══ */
    .content {
      position: absolute; top: 36%; left: 50%; transform: translate(-50%, -50%);
      z-index: 10; text-align: center; width: 90%; max-width: 500px;
    }
    .code {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(5rem, 16vw, 10rem); font-weight: 700;
      line-height: 1; letter-spacing: 0.06em;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(157,175,255,0.4) 100%);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    .title {
      font-size: clamp(0.95rem, 2vw, 1.3rem); font-weight: 600;
      color: rgba(255,255,255,0.75); letter-spacing: 0.18em; margin-bottom: 0.5rem;
    }
    .desc {
      font-size: clamp(0.78rem, 1.2vw, 0.88rem); color: rgba(255,255,255,0.3);
      line-height: 2; max-width: 300px; margin: 0 auto 1.5rem; font-weight: 300;
    }
    .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
      text-decoration: none; font-family: inherit; transition: all 0.25s ease;
    }
    .btn-main {
      background: rgba(87,138,255,0.18); border: 1px solid rgba(87,138,255,0.25); color: #b3c8ff;
    }
    .btn-main:hover { background: rgba(87,138,255,0.3); border-color: rgba(87,138,255,0.45); transform: translateY(-1px); }
    .btn-sub { background: transparent; border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
    .btn-sub:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.6); transform: translateY(-1px); }

    /* ═══ Game Menu ═══ */
    .game-menu {
      display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    }
    .game-btn {
      padding: 8px 16px; border-radius: 20px;
      background: rgba(157,175,255,0.08); border: 1px solid rgba(157,175,255,0.12);
      color: rgba(255,255,255,0.5); font-size: 0.78rem; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.2s ease;
    }
    .game-btn:hover, .game-btn.active {
      background: rgba(157,175,255,0.18); border-color: rgba(157,175,255,0.3);
      color: #b3c8ff;
    }

    /* ═══ Game Container ═══ */
    .game-container {
      position: absolute; bottom: 45%; left: 50%; transform: translateX(-50%);
      z-index: 20; display: none; width: 90%; max-width: 420px;
    }
    .game-container.active { display: block; animation: game-in 0.3s ease-out; }
    @keyframes game-in { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* Game HUD */
    .game-hud {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px; margin-bottom: 10px;
      background: rgba(6,14,28,0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(157,175,255,0.12); border-radius: 100px;
      font-size: 0.8rem; color: rgba(255,255,255,0.6);
    }
    .hud-score { color: #a8e6cf; font-weight: 700; font-variant-numeric: tabular-nums; }
    .hud-timer { color: #9dafff; font-variant-numeric: tabular-nums; }
    .hud-close {
      background: none; border: none; color: rgba(255,255,255,0.3);
      cursor: pointer; font-size: 0.75rem; font-family: inherit; padding: 2px 8px;
      border-radius: 4px; transition: all 0.2s;
    }
    .hud-close:hover { color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.05); }

    /* ═══ Fishing Game ═══ */
    .fish-zone {
      position: relative; height: 120px; overflow: hidden;
      border-radius: 12px; background: rgba(6,14,28,0.3);
    }
    .fish {
      position: absolute; font-size: 1.6rem; cursor: pointer;
      user-select: none; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
      transition: transform 0.1s;
    }
    .fish:hover { transform: scale(1.3); }
    .fish.caught { animation: fish-pop 0.4s ease-out forwards; pointer-events: none; }
    @keyframes fish-pop {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.8) translateY(-20px); opacity: 0.8; }
      100% { transform: scale(0) translateY(-40px); opacity: 0; }
    }
    .splash {
      position: absolute; pointer-events: none; font-size: 1rem;
      animation: splash-out 0.5s ease-out forwards;
    }
    @keyframes splash-out {
      0% { transform: scale(0.5) translateY(0); opacity: 1; }
      100% { transform: scale(1.5) translateY(-15px); opacity: 0; }
    }

    /* ═══ Memory Game ═══ */
    .memory-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      padding: 12px; background: rgba(6,14,28,0.5); border-radius: 12px;
      border: 1px solid rgba(157,175,255,0.08);
    }
    .mem-card {
      aspect-ratio: 1; border-radius: 8px; cursor: pointer;
      background: rgba(157,175,255,0.1); border: 1px solid rgba(157,175,255,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; transition: all 0.25s ease;
      position: relative; overflow: hidden;
    }
    .mem-card:hover { background: rgba(157,175,255,0.18); }
    .mem-card .front, .mem-card .back {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .mem-card .front { transform: rotateY(90deg); opacity: 0; }
    .mem-card .back { color: rgba(157,175,255,0.3); font-size: 1.2rem; }
    .mem-card.flipped .front { transform: rotateY(0); opacity: 1; }
    .mem-card.flipped .back { transform: rotateY(-90deg); opacity: 0; }
    .mem-card.matched {
      background: rgba(168,230,207,0.15); border-color: rgba(168,230,207,0.3);
      pointer-events: none;
    }
    .mem-card.matched .front { animation: match-pulse 0.5s ease; }
    @keyframes match-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    /* ═══ Star Catch Game ═══ */
    .star-field {
      position: relative; height: 180px; overflow: hidden;
      border-radius: 12px; background: rgba(6,14,28,0.3);
    }
    .falling-star {
      position: absolute; font-size: 1.4rem; cursor: pointer;
      animation: fall linear forwards; user-select: none;
      filter: drop-shadow(0 0 6px rgba(255,255,200,0.5));
      transition: transform 0.1s;
    }
    .falling-star:hover { transform: scale(1.4); }
    .falling-star.caught { animation: star-caught 0.3s ease-out forwards !important; pointer-events: none; }
    @keyframes fall { from { top: -30px; } to { top: 200px; } }
    @keyframes star-caught {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2) translateY(-10px); opacity: 0; }
    }

    /* ═══ Result ═══ */
    .game-result {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); z-index: 25; text-align: center;
      padding: 24px 36px; background: rgba(6,14,28,0.92);
      backdrop-filter: blur(16px); border: 1px solid rgba(157,175,255,0.2);
      border-radius: 16px; display: none; min-width: 200px;
    }
    .game-result.active { display: block; animation: result-in 0.3s ease-out; }
    @keyframes result-in { from { transform: translate(-50%,-50%) scale(0.9); opacity: 0; } to { transform: translate(-50%,-50%) scale(1); opacity: 1; } }
    .result-emoji { font-size: 2rem; margin-bottom: 8px; }
    .result-score { font-size: 1.8rem; font-weight: 800; color: #a8e6cf; margin-bottom: 4px; }
    .result-text { font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-bottom: 16px; }
    .result-btn {
      padding: 8px 20px; border-radius: 8px;
      background: rgba(87,138,255,0.2); border: 1px solid rgba(87,138,255,0.3);
      color: #b3c8ff; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .result-btn:hover { background: rgba(87,138,255,0.35); }

    /* ═══ Whack-a-Mole ═══ */
    .mole-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      padding: 16px; background: rgba(6,14,28,0.5); border-radius: 12px;
      border: 1px solid rgba(157,175,255,0.08);
    }
    .mole-hole {
      aspect-ratio: 1; border-radius: 50%; background: rgba(0,0,0,0.4);
      border: 2px solid rgba(157,175,255,0.1); display: flex;
      align-items: center; justify-content: center; font-size: 1.8rem;
      cursor: pointer; transition: all 0.15s; overflow: hidden;
      position: relative;
    }
    .mole-hole .mole {
      transition: transform 0.2s ease; transform: translateY(100%);
      user-select: none;
    }
    .mole-hole .mole.up { transform: translateY(0); }
    .mole-hole .mole.whacked {
      animation: mole-whack 0.3s ease-out forwards;
    }
    @keyframes mole-whack {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.3); }
      100% { transform: translateY(100%) scale(0.5); opacity: 0; }
    }

    /* ═══ Click Speed ═══ */
    .click-zone {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 24px; background: rgba(6,14,28,0.5); border-radius: 12px;
      border: 1px solid rgba(157,175,255,0.08);
    }
    .click-target {
      width: 100px; height: 100px; border-radius: 50%;
      background: radial-gradient(circle, rgba(157,175,255,0.3), rgba(157,175,255,0.1));
      border: 2px solid rgba(157,175,255,0.3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; transition: all 0.1s; user-select: none;
    }
    .click-target:active { transform: scale(0.9); }
    .click-target:hover { border-color: rgba(157,175,255,0.6); box-shadow: 0 0 20px rgba(157,175,255,0.2); }
    .click-cps { font-size: 1.2rem; color: #a8e6cf; font-weight: 700; }
    .click-label { font-size: 0.75rem; color: rgba(255,255,255,0.4); }

    /* ═══ Color Challenge ═══ */
    .color-zone {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 24px; background: rgba(6,14,28,0.5); border-radius: 12px;
      border: 1px solid rgba(157,175,255,0.08);
    }
    .color-word {
      font-size: 2rem; font-weight: 800; text-align: center;
      padding: 10px 0; user-select: none; min-height: 50px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .color-buttons {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%;
    }
    .color-btn {
      padding: 12px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.1);
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: all 0.15s; user-select: none;
    }
    .color-btn:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.3); }
    .color-btn:active { transform: scale(0.95); }
    .color-btn.wrong { animation: shake 0.3s ease; border-color: rgba(255,100,100,0.5); }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    /* ═══ Reaction Time ═══ */
    .reaction-zone {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px; border-radius: 12px; cursor: pointer;
      transition: background 0.1s; min-height: 160px; text-align: center;
      border: 1px solid rgba(157,175,255,0.08);
    }
    .reaction-zone.waiting {
      background: rgba(255,80,80,0.15);
      border-color: rgba(255,80,80,0.2);
    }
    .reaction-zone.ready {
      background: rgba(80,200,120,0.15);
      border-color: rgba(80,200,120,0.3);
    }
    .reaction-zone.idle {
      background: rgba(6,14,28,0.5);
    }
    .reaction-text { font-size: 1.1rem; color: rgba(255,255,255,0.7); }
    .reaction-ms { font-size: 2.5rem; font-weight: 800; color: #a8e6cf; }

    /* ═══ Number Guess ═══ */
    .number-zone {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 24px; background: rgba(6,14,28,0.5); border-radius: 12px;
      border: 1px solid rgba(157,175,255,0.08);
    }
    .number-display {
      font-size: 2.5rem; font-weight: 800; color: #9dafff;
      font-variant-numeric: tabular-nums;
    }
    .number-hint {
      font-size: 0.9rem; color: rgba(255,255,255,0.5);
      min-height: 1.5em;
    }
    .number-hint.high { color: #ff8080; }
    .number-hint.low { color: #80c8ff; }
    .number-buttons {
      display: flex; gap: 12px;
    }
    .number-btn {
      padding: 14px 28px; border-radius: 10px; font-size: 1.2rem;
      font-weight: 700; cursor: pointer; border: 2px solid rgba(157,175,255,0.2);
      background: rgba(157,175,255,0.1); color: #b3c8ff;
      font-family: inherit; transition: all 0.15s; user-select: none;
    }
    .number-btn:hover { background: rgba(157,175,255,0.2); transform: scale(1.05); }
    .number-btn:active { transform: scale(0.95); }

    @media (max-width: 768px) {
      .moon { width: 44px; height: 44px; top: 10%; right: 12%; }
      .content { top: 30%; }
      .memory-grid { grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 8px; }
      .mem-card { font-size: 1.2rem; }
      .game-container { bottom: 50%; }
      .game-menu { gap: 6px; }
      .game-btn {
        padding: 10px 14px;
        font-size: 0.8rem;
        min-height: 44px;
      }
      .mole-grid { gap: 6px; padding: 10px; }
      .mole-hole { font-size: 1.4rem; }
      .color-buttons { gap: 6px; }
      .color-btn { padding: 14px 6px; font-size: 0.85rem; }
      .color-word { font-size: 1.6rem; }
      .number-btn { padding: 12px 20px; min-width: 90px; }
      .number-display { font-size: 2rem; }
      .reaction-zone { padding: 30px 16px; min-height: 140px; }
      .fish-zone { height: 100px; }
    }
    @media (max-width: 375px) {
      .content { top: 28%; }
      .code { font-size: 4rem; }
      .title { font-size: 0.9rem; }
      .game-btn { padding: 8px 10px; font-size: 0.75rem; }
      .mem-card { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="sky" id="sky"><div class="moon"></div></div>
    <div class="reflection"></div>
    <div class="horizon"></div>
    <div class="ocean">
      <div class="ocean-body"></div>
      <svg class="wave-svg w1" viewBox="0 0 2880 120" preserveAspectRatio="none"><path d="M0,40 Q360,80 720,40 Q1080,0 1440,40 Q1800,80 2160,40 Q2520,0 2880,40 L2880,120 L0,120Z" fill="rgba(10,18,37,0.5)"/></svg>
      <svg class="wave-svg w2" viewBox="0 0 2880 120" preserveAspectRatio="none"><path d="M0,60 Q480,20 960,60 Q1440,100 1920,60 Q2400,20 2880,60 L2880,120 L0,120Z" fill="rgba(8,16,32,0.6)"/></svg>
      <svg class="wave-svg w3" viewBox="0 0 2880 120" preserveAspectRatio="none"><path d="M0,50 Q360,90 720,50 Q1080,10 1440,50 Q1800,90 2160,50 Q2520,10 2880,50 L2880,120 L0,120Z" fill="rgba(6,14,28,0.8)"/></svg>
      <svg class="wave-svg w4" viewBox="0 0 2880 120" preserveAspectRatio="none"><path d="M0,70 Q480,40 960,70 Q1440,100 1920,70 Q2400,40 2880,70 L2880,120 L0,120Z" fill="#060e1c"/></svg>
    </div>

    <!-- Game Container -->
    <div class="game-container" id="gameContainer">
      <div class="game-hud">
        <span id="gameInfo">🐟 <span class="hud-score" id="gameScore">0</span></span>
        <span class="hud-timer" id="gameTimer">⏱ 30s</span>
        <button class="hud-close" onclick="closeGame()">✕</button>
      </div>
      <div id="gameArea"></div>
    </div>

    <!-- Game Result -->
    <div class="game-result" id="gameResult">
      <div class="result-emoji" id="resultEmoji">🐟</div>
      <div class="result-score" id="resultScore">0</div>
      <div class="result-text" id="resultText"></div>
      <button class="result-btn" id="resultBtn">再玩一次</button>
    </div>

    <!-- Main Content -->
    <div class="content" id="mainContent">
      <div class="code">404</div>
      <h1 class="title">您已航向未知的海域</h1>
      <p class="desc">看來這片海域沒有陸地。<br>別擔心，讓風帶你回到正確的航線。</p>
      <div class="btns">
        <a href="首頁.html" class="btn btn-main">返回首頁</a>
        <a href="https://discord.gg/HdS2HrJEH7" target="_blank" rel="noopener" class="btn btn-sub">加入社群</a>
      </div>
      <div class="game-menu">
        <button class="game-btn" onclick="startGame('fishing')">🎣 釣魚</button>
        <button class="game-btn" onclick="startGame('memory')">🃏 翻牌</button>
        <button class="game-btn" onclick="startGame('stars')">⭐ 打星星</button>
        <button class="game-btn" onclick="startGame('mole')">🔨 打海怪</button>
        <button class="game-btn" onclick="startGame('click')">⚡ 點擊測速</button>
        <button class="game-btn" onclick="startGame('color')">🎨 顏色</button>
        <button class="game-btn" onclick="startGame('reaction')">⏱️ 反應</button>
        <button class="game-btn" onclick="startGame('number')">🎲 猜數</button>
      </div>
    </div>
  </div>

  <script>
    // ═══ Stars ═══
    const sky = document.getElementById('sky');
    for (let i = 0; i < 100; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 55 + '%';
      const sz = 0.5 + Math.random() * 1.5;
      s.style.width = sz + 'px'; s.style.height = sz + 'px';
      s.style.opacity = 0.15 + Math.random() * 0.6;
      sky.appendChild(s);
    }
    function shoot() {
      const s = document.createElement('div');
      s.style.cssText = 'position:absolute;width:80px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.7),transparent);border-radius:1px;z-index:2;';
      s.style.top = (5 + Math.random() * 25) + '%';
      s.style.left = (10 + Math.random() * 50) + '%';
      s.style.transform = 'rotate(' + (-20 - Math.random() * 30) + 'deg)';
      sky.appendChild(s);
      s.animate([
        { opacity: 0, transform: s.style.transform + ' translateX(0)' },
        { opacity: 1, offset: 0.1 },
        { opacity: 0, transform: s.style.transform + ' translateX(250px)' }
      ], { duration: 800, easing: 'ease-out' }).onfinish = () => s.remove();
    }
    setInterval(() => { if (Math.random() > 0.5) shoot(); }, 5000);

    // ═══ Game Engine ═══
    const FISH = ['🐟','🐠','🐡','🦈','🐙','🦑','🦐','🐬','🐳','🐋'];
    const SEA = ['🐙','🦑','🦐','🐡','🐠','🐟','🐬','🐳','🦀','🦞','🐚','🪸'];
    const STARS = ['⭐','🌟','💫','✨','🌠'];

    let currentGame = null, score = 0, timeLeft = 0;
    let timerHandle = null, spawnHandle = null;

    function startGame(type) {
      closeGame();
      currentGame = type;
      score = 0; timeLeft = type === 'memory' ? 60 : 30;

      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('gameResult').classList.remove('active');
      const gc = document.getElementById('gameContainer');
      gc.classList.add('active');
      document.getElementById('gameScore').textContent = '0';
      document.getElementById('gameTimer').textContent = '⏱ ' + timeLeft + 's';

      const area = document.getElementById('gameArea');
      area.innerHTML = '';

      if (type === 'fishing') initFishing(area);
      else if (type === 'memory') initMemory(area);
      else if (type === 'stars') initStars(area);
      else if (type === 'mole') initMole(area);
      else if (type === 'click') initClick(area);
      else if (type === 'color') initColor(area);
      else if (type === 'reaction') initReaction(area);
      else if (type === 'number') initNumber(area);

      clearInterval(timerHandle);
      timerHandle = setInterval(() => {
        timeLeft--;
        document.getElementById('gameTimer').textContent = '⏱ ' + timeLeft + 's';
        if (timeLeft <= 0) endGame();
      }, 1000);

      // Timer-less games: set infinite time
      if (type === 'color' || type === 'reaction') {
        clearInterval(timerHandle);
        document.getElementById('gameTimer').textContent = '⏱ ∞';
      }
    }

    function endGame() {
      clearInterval(timerHandle);
      clearInterval(spawnHandle);
      document.getElementById('gameContainer').classList.remove('active');

      const emoji = currentGame === 'fishing'
        ? (score >= 15 ? '🏆' : score >= 8 ? '🎉' : score >= 3 ? '🐟' : '🌊')
        : currentGame === 'memory'
        ? (score >= 8 ? '🧠' : score >= 4 ? '🃏' : '💪')
        : currentGame === 'stars'
        ? (score >= 20 ? '🌟' : score >= 10 ? '⭐' : '💫')
        : currentGame === 'mole'
        ? (score >= 12 ? '🔨' : score >= 6 ? '🐙' : '🌊')
        : currentGame === 'click'
        ? (score >= 80 ? '⚡' : score >= 40 ? '💨' : '🖱️')
        : currentGame === 'color'
        ? (score >= 15 ? '🎨' : score >= 8 ? '🌈' : '🖌️')
        : currentGame === 'reaction'
        ? (score < 200 ? '⚡' : score < 300 ? '🏃' : score < 400 ? '👍' : '🐢')
        : currentGame === 'number'
        ? (score >= 8 ? '🧠' : score >= 4 ? '🎲' : '💪')
        : '🎮';

      const text = currentGame === 'fishing'
        ? (score >= 15 ? '釣魚大師！' : score >= 8 ? '收穫滿滿！' : score >= 3 ? '還不錯喔' : '繼續加油～')
        : currentGame === 'memory'
        ? (score >= 8 ? '記憶天才！' : score >= 4 ? '記憶力不錯' : '再試試看')
        : currentGame === 'stars'
        ? (score >= 20 ? '星空獵手！' : score >= 10 ? '抓到不少星星' : '繼續努力～')
        : currentGame === 'mole'
        ? (score >= 12 ? '海怪殺手！' : score >= 6 ? '打到不少！' : '繼續打～')
        : currentGame === 'click'
        ? (score >= 80 ? '閃電快手！' : score >= 40 ? '手速不錯' : '再快一點！')
        : currentGame === 'color'
        ? (score >= 15 ? '色彩大師！' : score >= 8 ? '眼力不錯' : '繼續挑戰～')
        : currentGame === 'reaction'
        ? (score < 200 ? '反應神速！' : score < 300 ? '反應很快！' : score < 400 ? '反應不錯' : '再快一點～')
        : currentGame === 'number'
        ? (score >= 8 ? '直覺超強！' : score >= 4 ? '判斷力不錯' : '再試試～')
        : '🎮';

      const scoreDisplay = currentGame === 'click' ? (score / 5).toFixed(1) + ' CPS'
        : currentGame === 'reaction' ? score + 'ms'
        : score;

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultScore').textContent = scoreDisplay;
      document.getElementById('resultText').textContent = text;
      document.getElementById('resultBtn').onclick = () => startGame(currentGame);
      document.getElementById('gameResult').classList.add('active');
    }

    function closeGame() {
      clearInterval(timerHandle);
      clearInterval(spawnHandle);
      document.querySelectorAll('.fish, .splash, .falling-star').forEach(e => e.remove());
      document.getElementById('gameContainer').classList.remove('active');
      document.getElementById('gameResult').classList.remove('active');
      document.getElementById('mainContent').style.display = '';
      currentGame = null;
    }

    // ═══ Fishing ═══
    function initFishing(area) {
      area.innerHTML = '<div class="fish-zone" id="fishZone"></div>';
      document.getElementById('gameInfo').innerHTML = '🐟 <span class="hud-score" id="gameScore">0</span>';
      clearInterval(spawnHandle);
      spawnHandle = setInterval(spawnFish, 600);
      spawnFish();
    }

    function spawnFish() {
      if (currentGame !== 'fishing') return;
      const zone = document.getElementById('fishZone');
      if (!zone) return;
      const fish = document.createElement('div');
      fish.className = 'fish';
      fish.textContent = FISH[Math.floor(Math.random() * FISH.length)];
      const goRight = Math.random() > 0.5;
      const dur = 2500 + Math.random() * 3000;
      const y = 10 + Math.random() * 70;
      fish.style.top = y + '%';
      fish.style.fontSize = (1.2 + Math.random() * 0.8) + 'rem';

      const keyframes = goRight
        ? [{ left: '-40px' }, { left: (zone.offsetWidth + 40) + 'px' }]
        : [{ right: '-40px' }, { right: (zone.offsetWidth + 40) + 'px' }];
      fish.style.transform = goRight ? '' : 'scaleX(-1)';
      fish.animate(keyframes, { duration: dur, easing: 'linear', fill: 'forwards' });

      fish.onclick = () => {
        if (fish.classList.contains('caught')) return;
        fish.classList.add('caught');
        score++;
        document.getElementById('gameScore').textContent = score;
        const sp = document.createElement('div');
        sp.className = 'splash'; sp.textContent = '💦';
        sp.style.left = fish.getBoundingClientRect().left - zone.getBoundingClientRect().left + 'px';
        sp.style.top = fish.style.top;
        zone.appendChild(sp);
        setTimeout(() => sp.remove(), 500);
        setTimeout(() => fish.remove(), 400);
      };
      zone.appendChild(fish);
      setTimeout(() => { if (!fish.classList.contains('caught')) fish.remove(); }, dur);
    }

    // ═══ Memory ═══
    function initMemory(area) {
      document.getElementById('gameInfo').innerHTML = '🃏 配對 <span class="hud-score" id="gameScore">0</span>';
      document.getElementById('gameTimer').textContent = '⏱ 60s';
      timeLeft = 60;

      const pairs = SEA.slice(0, 8);
      const cards = [...pairs, ...pairs].sort(() => Math.random() - 0.5);

      const grid = document.createElement('div');
      grid.className = 'memory-grid';

      let flipped = [], matched = 0, locked = false;

      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'mem-card';
        card.innerHTML = `<div class="back">?</div><div class="front">${emoji}</div>`;
        card.onclick = () => {
          if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
          card.classList.add('flipped');
          flipped.push(card);

          if (flipped.length === 2) {
            locked = true;
            const [a, b] = flipped;
            if (a.querySelector('.front').textContent === b.querySelector('.front').textContent) {
              a.classList.add('matched'); b.classList.add('matched');
              matched += 2; score = matched;
              document.getElementById('gameScore').textContent = score;
              flipped = []; locked = false;
              if (matched === cards.length) endGame();
            } else {
              setTimeout(() => {
                a.classList.remove('flipped'); b.classList.remove('flipped');
                flipped = []; locked = false;
              }, 800);
            }
          }
        };
        grid.appendChild(card);
      });
      area.appendChild(grid);
    }

    // ═══ Star Catch ═══
    function initStars(area) {
      area.innerHTML = '<div class="star-field" id="starField"></div>';
      document.getElementById('gameInfo').innerHTML = '⭐ <span class="hud-score" id="gameScore">0</span>';
      clearInterval(spawnHandle);
      spawnHandle = setInterval(spawnStar, 500);
      spawnStar();
    }

    function spawnStar() {
      if (currentGame !== 'stars') return;
      const field = document.getElementById('starField');
      if (!field) return;
      const star = document.createElement('div');
      star.className = 'falling-star';
      star.textContent = STARS[Math.floor(Math.random() * STARS.length)];
      star.style.left = (5 + Math.random() * 85) + '%';
      const dur = 1500 + Math.random() * 2000;
      star.style.animationDuration = dur + 'ms';

      star.onclick = () => {
        if (star.classList.contains('caught')) return;
        star.classList.add('caught');
        score++;
        document.getElementById('gameScore').textContent = score;
        setTimeout(() => star.remove(), 300);
      };

      field.appendChild(star);
      setTimeout(() => { if (!star.classList.contains('caught')) star.remove(); }, dur);
    }
    // ═══ Whack-a-Mole ═══
    const MOLES = ['🐙','🦑','🦐','🐡','🦀','🦞','🐚','🐳','🦈'];

    function initMole(area) {
      document.getElementById('gameInfo').innerHTML = '🔨 <span class="hud-score" id="gameScore">0</span>';
      const grid = document.createElement('div');
      grid.className = 'mole-grid';
      for (let i = 0; i < 9; i++) {
        const hole = document.createElement('div');
        hole.className = 'mole-hole';
        const mole = document.createElement('span');
        mole.className = 'mole';
        mole.textContent = MOLES[Math.floor(Math.random() * MOLES.length)];
        mole.onclick = (e) => {
          e.stopPropagation();
          if (!mole.classList.contains('up') || mole.classList.contains('whacked')) return;
          mole.classList.add('whacked');
          score++;
          document.getElementById('gameScore').textContent = score;
          setTimeout(() => {
            mole.classList.remove('up', 'whacked');
            mole.textContent = MOLES[Math.floor(Math.random() * MOLES.length)];
          }, 300);
        };
        hole.appendChild(mole);
        grid.appendChild(hole);
      }
      area.appendChild(grid);

      clearInterval(spawnHandle);
      spawnHandle = setInterval(() => {
        if (currentGame !== 'mole') return;
        const holes = grid.querySelectorAll('.mole-hole');
        const idx = Math.floor(Math.random() * 9);
        const mole = holes[idx].querySelector('.mole');
        if (!mole.classList.contains('up')) {
          mole.classList.add('up');
          const stayTime = 800 + Math.random() * 700;
          setTimeout(() => {
            if (mole.classList.contains('up') && !mole.classList.contains('whacked')) {
              mole.classList.remove('up');
            }
          }, stayTime);
        }
      }, 450);
    }

    // ═══ Click Speed Test ═══
    function initClick(area) {
      document.getElementById('gameInfo').innerHTML = '⚡ CPS <span class="hud-score" id="gameScore">0</span>';
      document.getElementById('gameTimer').textContent = '⏱ 5s';
      timeLeft = 5;

      const zone = document.createElement('div');
      zone.className = 'click-zone';

      const target = document.createElement('div');
      target.className = 'click-target';
      target.textContent = '🌊';

      let clicks = 0;
      target.onclick = () => {
        clicks++;
        score = clicks;
        document.getElementById('gameScore').textContent = clicks;
        target.textContent = ['🌊','💨','⚡','🔥','💫'][clicks % 5];
      };

      const label = document.createElement('div');
      label.className = 'click-label';
      label.textContent = '盡可能快速點擊！';

      zone.appendChild(label);
      zone.appendChild(target);
      area.appendChild(zone);
    }

    // ═══ Color Challenge (Stroop Effect) ═══
    const COLOR_NAMES = ['紅','藍','綠','黃','紫','橘'];
    const COLOR_CSS = ['#ff5555','#5599ff','#55cc77','#ffcc33','#bb66ff','#ff9944'];

    function initColor(area) {
      document.getElementById('gameInfo').innerHTML = '🎨 <span class="hud-score" id="gameScore">0</span>';
      const zone = document.createElement('div');
      zone.className = 'color-zone';

      const word = document.createElement('div');
      word.className = 'color-word';
      word.id = 'colorWord';

      const buttons = document.createElement('div');
      buttons.className = 'color-buttons';
      buttons.id = 'colorButtons';

      const hint = document.createElement('div');
      hint.className = 'click-label';
      hint.textContent = '點擊文字的「顏色」，不是文字內容！';

      zone.appendChild(word);
      zone.appendChild(buttons);
      zone.appendChild(hint);
      area.appendChild(zone);

      nextColor();
    }

    function nextColor() {
      const wordEl = document.getElementById('colorWord');
      const btnsEl = document.getElementById('colorButtons');
      if (!wordEl || !btnsEl) return;

      const wordIdx = Math.floor(Math.random() * COLOR_NAMES.length);
      let colorIdx = Math.floor(Math.random() * COLOR_CSS.length);
      while (colorIdx === wordIdx) colorIdx = (colorIdx + 1) % COLOR_CSS.length;

      wordEl.textContent = COLOR_NAMES[wordIdx];
      wordEl.style.color = COLOR_CSS[colorIdx];

      // Shuffle buttons
      const indices = [0,1,2,3,4,5].sort(() => Math.random() - 0.5).slice(0, 6);
      btnsEl.innerHTML = '';
      indices.forEach(i => {
        const btn = document.createElement('button');
        btn.className = 'color-btn';
        btn.textContent = COLOR_NAMES[i];
        btn.style.background = COLOR_CSS[i] + '22';
        btn.style.color = COLOR_CSS[i];
        btn.onclick = () => {
          if (i === colorIdx) {
            score++;
            document.getElementById('gameScore').textContent = score;
            nextColor();
          } else {
            btn.classList.add('wrong');
            setTimeout(() => btn.classList.remove('wrong'), 300);
          }
        };
        btnsEl.appendChild(btn);
      });
    }

    // ═══ Reaction Time ═══
    function initReaction(area) {
      document.getElementById('gameInfo').innerHTML = '⏱️ 最佳 <span class="hud-score" id="gameScore">—</span>';
      const zone = document.createElement('div');
      zone.className = 'reaction-zone idle';
      zone.id = 'reactionZone';

      const text = document.createElement('div');
      text.className = 'reaction-text';
      text.textContent = '點擊開始';
      text.id = 'reactionText';

      zone.appendChild(text);
      area.appendChild(zone);

      let bestTime = Infinity;
      let waitingTimeout = null;
      let startTime = 0;
      let state = 'idle'; // idle, waiting, ready

      zone.onclick = () => {
        if (state === 'idle') {
          state = 'waiting';
          zone.className = 'reaction-zone waiting';
          text.textContent = '等待綠色...';
          text.className = 'reaction-text';
          const delay = 1500 + Math.random() * 3000;
          waitingTimeout = setTimeout(() => {
            state = 'ready';
            zone.className = 'reaction-zone ready';
            text.textContent = '點！';
            text.className = 'reaction-text';
            startTime = performance.now();
          }, delay);
        } else if (state === 'waiting') {
          clearTimeout(waitingTimeout);
          state = 'idle';
          zone.className = 'reaction-zone idle';
          text.textContent = '太早了！再試一次';
          text.className = 'reaction-text';
        } else if (state === 'ready') {
          const elapsed = Math.round(performance.now() - startTime);
          score = elapsed;
          if (elapsed < bestTime) {
            bestTime = elapsed;
            document.getElementById('gameScore').textContent = bestTime + 'ms';
          }
          state = 'idle';
          zone.className = 'reaction-zone idle';

          const rating = elapsed < 200 ? '閃電⚡' : elapsed < 300 ? '很快！' : elapsed < 400 ? '不錯' : elapsed < 500 ? '普通' : '有點慢';
          text.innerHTML = `<div class="reaction-ms">${elapsed}ms</div><div class="reaction-text">${rating} — 再來一次</div>`;
        }
      };
    }

    // ═══ Number Guess ═══
    function initNumber(area) {
      document.getElementById('gameInfo').innerHTML = '🎲 猜中 <span class="hud-score" id="gameScore">0</span>';
      document.getElementById('gameTimer').textContent = '⏱ 30s';
      timeLeft = 30;

      const zone = document.createElement('div');
      zone.className = 'number-zone';

      let target = Math.floor(Math.random() * 100) + 1;
      let current = Math.floor(Math.random() * 100) + 1;
      while (current === target) current = Math.floor(Math.random() * 100) + 1;

      const display = document.createElement('div');
      display.className = 'number-display';
      display.id = 'numDisplay';
      display.textContent = current;

      const hint = document.createElement('div');
      hint.className = 'number-hint';
      hint.id = 'numHint';
      hint.textContent = '目標在...？';

      const buttons = document.createElement('div');
      buttons.className = 'number-buttons';

      const higherBtn = document.createElement('button');
      higherBtn.className = 'number-btn';
      higherBtn.textContent = '↑ 更大';
      higherBtn.onclick = () => {
        if (target > current) {
          score++;
          document.getElementById('gameScore').textContent = score;
          nextGuess();
        } else {
          hint.textContent = '錯了！答案比這小';
          hint.className = 'number-hint high';
          setTimeout(nextGuess, 600);
        }
      };

      const lowerBtn = document.createElement('button');
      lowerBtn.className = 'number-btn';
      lowerBtn.textContent = '↓ 更小';
      lowerBtn.onclick = () => {
        if (target < current) {
          score++;
          document.getElementById('gameScore').textContent = score;
          nextGuess();
        } else {
          hint.textContent = '錯了！答案比這大';
          hint.className = 'number-hint low';
          setTimeout(nextGuess, 600);
        }
      };

      function nextGuess() {
        target = Math.floor(Math.random() * 100) + 1;
        do { current = Math.floor(Math.random() * 100) + 1; } while (current === target);
        display.textContent = current;
        hint.textContent = '目標在...？';
        hint.className = 'number-hint';
      }

      buttons.appendChild(higherBtn);
      buttons.appendChild(lowerBtn);
      zone.appendChild(display);
      zone.appendChild(hint);
      zone.appendChild(buttons);
      area.appendChild(zone);
    }

  </script>
</body>
</html>
