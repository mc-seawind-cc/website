<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找不到頁面 — 海風</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/img/logo.png">
  <link rel="apple-touch-icon" href="assets/img/logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="mob-smasher.css?v=230423n">
  <link rel="stylesheet" href="minigames.css?v=220422a">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#0b1a2e;user-select:none}

    /* ═══ Ocean Scene ═══ */
    .scene{position:fixed;inset:0;overflow:hidden}

    /* Sky */
    .sky{position:absolute;inset:0;background:linear-gradient(180deg,#071018 0%,#0c1f35 25%,#123050 50%,#1a4070 75%,#2a6090 100%);transition:background 8s}
    .sky.sunset{background:linear-gradient(180deg,#1a0a20 0%,#4a1535 15%,#b84030 30%,#e88040 45%,#f0b060 55%,#f0d080 65%,#80b0d0 80%,#3070a0 100%)}
    .sky.night{background:linear-gradient(180deg,#050810 0%,#0a1225 30%,#0e1c38 60%,#0c1a30 100%)}
    .sky.daytime{background:linear-gradient(180deg,#4a90d9 0%,#6bb3f0 25%,#87ceeb 50%,#a8d8ea 75%,#c8e6f5 100%)}
    .sky.rainy{background:linear-gradient(180deg,#0a0e14 0%,#141c28 30%,#1a2636 60%,#1e2e42 100%)}
    .sky.snowy{background:linear-gradient(180deg,#1a1e28 0%,#2a3040 30%,#3a4256 60%,#4a5468 100%)}

    /* Stars */
    .star{position:absolute;background:#fff;border-radius:50%;opacity:0;transition:opacity 4s}
    .sky.night .star,.sky.snowy .star{opacity:0.6}
    .sky.daytime .star{opacity:0}

    /* Sun / Moon */
    .celestial{position:absolute;width:60px;height:60px;border-radius:50%;transition:all 8s ease-in-out}
    .sun{background:radial-gradient(circle at 35% 35%,#fff8e0,#f0c848,#e09020);box-shadow:0 0 40px 12px rgba(240,180,60,0.2),0 0 100px 40px rgba(240,180,60,0.06);top:15%;right:22%}
    .moon{background:radial-gradient(circle at 35% 35%,#fffce8,#e8e0c8,#c0b890);box-shadow:0 0 30px 10px rgba(220,210,180,0.12);top:12%;right:20%;opacity:0}
    .sky.night .sun,.sky.rainy .sun,.sky.snowy .sun{opacity:0;transform:translateY(40px)}
    .sky.night .moon{opacity:1}
    .sky.daytime .sun{opacity:1;top:10%;right:15%}
    .sky.daytime .moon{opacity:0}

    /* Clouds */
    .cloud{position:absolute;background:rgba(255,255,255,0.06);border-radius:100px;filter:blur(2px);transition:background 4s,filter 4s}
    .cloud.c1{width:200px;height:30px;top:18%;left:10%;animation:drift-cloud 40s linear infinite}
    .cloud.c2{width:140px;height:22px;top:25%;left:60%;animation:drift-cloud 55s linear infinite reverse}
    .cloud.c3{width:180px;height:26px;top:12%;left:35%;animation:drift-cloud 48s linear infinite 10s}
    .sky.rainy .cloud,.sky.snowy .cloud{background:rgba(200,210,220,0.15);filter:blur(1px)}
    .sky.daytime .cloud{background:rgba(255,255,255,0.5);filter:blur(3px)}
    @keyframes drift-cloud{from{transform:translateX(-300px)}to{transform:translateX(calc(100vw + 300px))}}

    /* Horizon */
    .horizon{position:absolute;bottom:42%;left:0;right:0;height:60px;background:linear-gradient(180deg,transparent,rgba(100,160,220,0.06),transparent);pointer-events:none}

    /* ═══ Ocean ═══ */
    .ocean{position:absolute;bottom:0;left:0;right:0;height:45%}
    .ocean-body{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,26,46,0)0%,rgba(8,20,38,0.85)15%,rgba(6,16,32,0.95)40%,#060e1c 100%);transition:background 4s}
    .sky.snowy .ocean-body{background:linear-gradient(180deg,rgba(20,30,50,0)0%,rgba(30,42,60,0.85)15%,rgba(40,52,72,0.95)40%,#2a3648 100%)}
    .sky.daytime .ocean-body{background:linear-gradient(180deg,rgba(30,80,140,0)0%,rgba(20,60,120,0.7)15%,rgba(15,45,90,0.9)40%,#0a2a50 100%)}
    .ocean-surface{position:absolute;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(100,160,220,0.08),transparent);pointer-events:none}
    .sky.daytime .ocean-surface{background:linear-gradient(180deg,rgba(120,180,240,0.15),transparent)}

    /* Waves */
    .wave{position:absolute;left:0;width:200%;pointer-events:none;transition:opacity 3s}
    .wave svg{width:100%;height:100%;display:block}
    .w1{top:0;height:50px;animation:wave-move 8s linear infinite}
    .w2{top:6px;height:60px;animation:wave-move 11s linear infinite reverse;opacity:0.7}
    .w3{top:14px;height:70px;animation:wave-move 6s linear infinite;opacity:0.5}
    .w4{top:24px;height:80px;animation:wave-move 14s linear infinite reverse;opacity:0.3}
    .sky.rainy .w1{animation-duration:5s}
    .sky.rainy .w2{animation-duration:7s}
    .sky.snowy .wave{opacity:0.4}
    @keyframes wave-move{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* Ice overlay for snowy */
    .ice-overlay{position:absolute;bottom:43%;left:0;right:0;height:6px;background:linear-gradient(180deg,rgba(180,210,240,0.3),rgba(200,225,245,0.15),transparent);opacity:0;transition:opacity 4s;pointer-events:none;z-index:6}
    .sky.snowy .ice-overlay{opacity:1}

    /* ═══ Weather Particles ═══ */
    .weather-layer{position:absolute;inset:0;pointer-events:none;z-index:8;overflow:hidden}
    .raindrop{position:absolute;width:1.5px;background:linear-gradient(to bottom,transparent,rgba(174,194,224,0.5));border-radius:0 0 1px 1px;animation:rain-fall linear infinite;opacity:0}
    .sky.rainy .raindrop{opacity:1}
    @keyframes rain-fall{
      0%{transform:translateY(-20px) rotate(15deg);opacity:0}
      10%{opacity:0.7}
      90%{opacity:0.5}
      100%{transform:translateY(100vh) rotate(15deg);opacity:0}
    }
    .snowflake{position:absolute;background:radial-gradient(circle,rgba(255,255,255,0.9),rgba(220,230,245,0.5));border-radius:50%;animation:snow-fall linear infinite;opacity:0}
    .sky.snowy .snowflake{opacity:1}
    @keyframes snow-fall{
      0%{transform:translateY(-10px) translateX(0);opacity:0}
      10%{opacity:0.8}
      50%{transform:translateY(50vh) translateX(20px)}
      90%{opacity:0.6}
      100%{transform:translateY(100vh) translateX(-10px);opacity:0}
    }

    /* ═══ Ships ═══ */
    .ship{position:absolute;z-index:7;transition:all 2s ease;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
    .ship.boat{animation:sail-boat 20s ease-in-out infinite;bottom:39%}
    .ship.icebreaker{animation:sail-ice 25s ease-in-out infinite;bottom:40%;opacity:0}
    .ship svg{display:block}
    .sky.rainy .ship.boat{opacity:1}
    .sky.rainy .ship.icebreaker{opacity:0}
    .sky.snowy .ship.boat{opacity:0}
    .sky.snowy .ship.icebreaker{opacity:1}
    .sky.night .ship,.sky.sunset .ship{opacity:0.7}
    .sky.daytime .ship{opacity:0.9}
    @keyframes sail-boat{
      0%{left:-8%;transform:scaleX(1) translateY(0)}
      15%{transform:scaleX(1) translateY(-4px)}
      30%{transform:scaleX(1) translateY(2px)}
      50%{left:50%;transform:scaleX(1) translateY(-3px)}
      65%{transform:scaleX(1) translateY(1px)}
      80%{transform:scaleX(1) translateY(-5px)}
      100%{left:108%;transform:scaleX(1) translateY(0)}
    }
    @keyframes sail-ice{
      0%{left:-10%;transform:scaleX(1) translateY(0)}
      20%{transform:scaleX(1) translateY(-3px)}
      40%{transform:scaleX(1) translateY(1px)}
      60%{left:55%;transform:scaleX(1) translateY(-2px)}
      80%{transform:scaleX(1) translateY(2px)}
      100%{left:110%;transform:scaleX(1) translateY(0)}
    }

    /* Ship wake */
    .ship-wake{position:absolute;bottom:0;left:0;right:0;height:45%;pointer-events:none;z-index:6;overflow:hidden}
    .wake-line{position:absolute;height:1px;background:rgba(255,255,255,0.04);animation:wake-spread 3s ease-out infinite;opacity:0}
    .sky.rainy .wake-line,.sky.snowy .wake-line{opacity:1}
    @keyframes wake-spread{
      0%{width:0;opacity:0.15}
      50%{opacity:0.08}
      100%{width:200px;opacity:0}
    }

    /* ═══ Cleanup Challenge ═══ */
    .cleanup-bar{position:absolute;top:0;left:0;right:0;z-index:15;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;opacity:0;pointer-events:none;transition:opacity 0.4s}
    .cleanup-bar.active{opacity:1;pointer-events:auto}
    .cb-stats{display:flex;align-items:center;gap:16px}
    .cb-stat{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:rgba(255,255,255,0.6)}
    .cb-stat-val{font-weight:800;font-variant-numeric:tabular-nums;font-size:1rem}
    .cb-score{color:#a8e6cf}
    .cb-combo{color:#ffaa32;opacity:0;transform:scale(0.8);transition:all 0.2s}
    .cb-combo.active{opacity:1;transform:scale(1)}
    .cb-timer-wrap{display:flex;align-items:center;gap:8px}
    .cb-timer-bar{width:120px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .cb-timer-fill{height:100%;width:100%;background:linear-gradient(90deg,#a8e6cf,#9dafff);border-radius:3px;transition:width 0.3s linear}
    .cb-timer-fill.urgent{background:linear-gradient(90deg,#ff8282,#ffaa32)}
    .cb-timer-text{font-size:0.9rem;font-weight:700;color:rgba(255,255,255,0.7);font-variant-numeric:tabular-nums;min-width:28px;text-align:right}
    .cb-close{background:none;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.4);font-size:0.9rem;cursor:pointer;padding:4px 10px;font-family:inherit;transition:all 0.2s}
    .cb-close:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7)}

    /* Floating items */
    .c-item{position:absolute;z-index:5;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform 0.15s;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.4))}
    .c-item:hover{transform:scale(1.2)}
    .c-item:active{transform:scale(0.9)}
    .c-item.trash-item{animation:item-float 3s ease-in-out infinite}
    .c-item.creature-item{animation:item-swim 4s ease-in-out infinite}
    .c-item.bonus-item{animation:item-float 2s ease-in-out infinite;filter:drop-shadow(0 0 12px rgba(255,170,50,0.5)) drop-shadow(0 3px 8px rgba(0,0,0,0.4))}
    .c-item.collected{animation:item-collect 0.4s ease-out forwards !important;pointer-events:none}
    .c-item.penalty{animation:item-penalty 0.6s ease-out forwards !important;pointer-events:none}
    @keyframes item-float{
      0%,100%{transform:translateY(0) rotate(0deg)}
      33%{transform:translateY(-6px) rotate(3deg)}
      66%{transform:translateY(3px) rotate(-2deg)}
    }
    @keyframes item-swim{
      0%,100%{transform:translateX(0) translateY(0)}
      25%{transform:translateX(10px) translateY(-5px)}
      50%{transform:translateX(0) translateY(3px)}
      75%{transform:translateX(-10px) translateY(-3px)}
    }
    @keyframes item-collect{
      0%{transform:scale(1);opacity:1}
      30%{transform:scale(1.5) translateY(-15px);opacity:0.8}
      100%{transform:scale(0) translateY(-40px);opacity:0}
    }
    @keyframes item-penalty{
      0%{transform:scale(1);opacity:1;filter:brightness(1)}
      30%{transform:scale(1.3);filter:brightness(2) hue-rotate(330deg)}
      100%{transform:scale(0.5);opacity:0}
    }

    /* Float score popup */
    .float-score{position:absolute;z-index:20;font-weight:800;font-size:0.9rem;pointer-events:none;animation:float-score-up 0.8s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
    .float-score.positive{color:#a8e6cf}
    .float-score.bonus{color:#ffaa32;font-size:1.1rem}
    .float-score.negative{color:#ff8282}
    @keyframes float-score-up{
      0%{opacity:1;transform:translateY(0) scale(1)}
      60%{opacity:0.8;transform:translateY(-30px) scale(1.1)}
      100%{opacity:0;transform:translateY(-60px) scale(0.8)}
    }

    /* Cleanup result overlay (inline in scene) */
    .cleanup-result{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:rgba(6,10,18,0.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity 0.4s}
    .cleanup-result.active{opacity:1;pointer-events:auto}
    .cr-box{text-align:center;animation:cr-enter 0.5s ease-out}
    @keyframes cr-enter{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
    .cr-title{font-size:1.3rem;font-weight:700;color:rgba(255,255,255,0.85);margin-bottom:4px}
    .cr-subtitle{font-size:0.78rem;color:rgba(255,255,255,0.35);margin-bottom:16px}
    .cr-score{font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,#a8e6cf,#9dafff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:4px}
    .cr-label{font-size:0.72rem;color:rgba(255,255,255,0.35);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px}
    .cr-stats{display:flex;gap:20px;justify-content:center;margin-bottom:16px}
    .cr-stat{text-align:center}
    .cr-stat-val{display:block;font-size:1.2rem;font-weight:800;color:rgba(255,255,255,0.8);font-variant-numeric:tabular-nums}
    .cr-stat-label{font-size:0.68rem;color:rgba(255,255,255,0.3)}
    .cr-stars{font-size:1.8rem;margin-bottom:4px;letter-spacing:4px}
    .cr-rank{font-size:0.82rem;color:rgba(168,230,207,0.7);font-weight:600;margin-bottom:16px}
    .cr-best{font-size:0.72rem;color:rgba(255,170,50,0.6);margin-bottom:14px;min-height:1.2em}
    .cr-btns{display:flex;gap:8px;justify-content:center}

    /* Sea creature hit flash */
    .scene-flash{position:absolute;inset:0;z-index:12;background:rgba(255,80,80,0.15);pointer-events:none;opacity:0;animation:flash-fade 0.4s ease-out}
    @keyframes flash-fade{0%{opacity:1}100%{opacity:0}}

    /* Floating items */
    .trash{position:absolute;font-size:1.4rem;pointer-events:auto;z-index:5;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));user-select:none;transition:transform 0.3s,opacity 0.5s;cursor:pointer}

    /* Sea creature (ambient) */
    .creature{position:absolute;z-index:4;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3))}
    .creature.turtle{font-size:2rem;animation:swim-turtle 18s ease-in-out infinite}
    .creature.fish{font-size:1.2rem;animation:swim-fish 12s linear infinite}
    @keyframes swim-turtle{
      0%{bottom:28%;left:10%;transform:scaleX(1)}
      40%{bottom:32%;left:70%;transform:scaleX(1)}
      50%{bottom:30%;left:75%;transform:scaleX(-1)}
      90%{bottom:26%;left:15%;transform:scaleX(-1)}
      100%{bottom:28%;left:10%;transform:scaleX(1)}
    }
    @keyframes swim-fish{
      0%{bottom:20%;left:-5%;transform:scaleX(1)}
      50%{bottom:25%;left:105%;transform:scaleX(1)}
      50.1%{bottom:22%;left:105%;transform:scaleX(-1)}
      100%{bottom:18%;left:-5%;transform:scaleX(-1)}
    }

    /* Cat on waves */
    .cat-float{position:absolute;z-index:5;bottom:38%;left:50%;transform:translateX(-50%);animation:cat-bob 3s ease-in-out infinite;pointer-events:none;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
    @keyframes cat-bob{
      0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}
      25%{transform:translateX(-50%) translateY(-6px) rotate(1.5deg)}
      50%{transform:translateX(-50%) translateY(2px) rotate(-0.5deg)}
      75%{transform:translateX(-50%) translateY(-3px) rotate(1deg)}
    }
    .cat-glow{filter:drop-shadow(0 0 3px rgba(94,234,212,0.5))}

    /* Bubbles */
    .bubble{position:absolute;border-radius:50%;background:rgba(150,200,255,0.08);border:1px solid rgba(150,200,255,0.12);pointer-events:none;z-index:3;animation:rise-bubble linear infinite}
    @keyframes rise-bubble{
      0%{transform:translateY(0)scale(1);opacity:0.6}
      50%{transform:translateY(-80px)scale(1.1);opacity:0.4}
      100%{transform:translateY(-160px)scale(0.8);opacity:0}
    }

    /* Theme Toggle */
    .theme-toggle-404{position:fixed;top:16px;right:16px;z-index:30;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 10px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:1.1rem;transition:all 0.25s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);line-height:1;display:flex;align-items:center}
    .theme-toggle-404:hover{background:rgba(255,255,255,0.15);color:#fff}
    [data-theme="light"] .theme-toggle-404{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);color:rgba(0,0,0,0.5)}
    [data-theme="light"] .theme-toggle-404:hover{background:rgba(0,0,0,0.1);color:rgba(0,0,0,0.8)}

    /* ═══ Content ═══ */
    .content{position:absolute;top:16%;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:90%;max-width:520px}
    .code{font-family:'Noto Serif TC',serif;font-size:clamp(4rem,14vw,8rem);font-weight:700;line-height:1;letter-spacing:0.06em;background:linear-gradient(180deg,rgba(255,255,255,0.85)0%,rgba(100,180,240,0.4)100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3rem}
    .title{font-size:clamp(0.9rem,2vw,1.2rem);font-weight:600;color:rgba(255,255,255,0.8);letter-spacing:0.15em;margin-bottom:0.3rem}
    .desc{font-size:clamp(0.75rem,1.1vw,0.85rem);color:rgba(255,255,255,0.35);line-height:2;max-width:320px;margin:0 auto 0.8rem;font-weight:300}
    .weather-msg{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-bottom:0.6rem;transition:all 0.5s;min-height:1.2em}

    .btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:0.8rem}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:0.8rem;font-weight:600;text-decoration:none;font-family:inherit;transition:all 0.25s ease;cursor:pointer;border:none}
    .btn-main{background:rgba(87,138,255,0.18);border:1px solid rgba(87,138,255,0.25);color:#b3c8ff}
    .btn-main:hover{background:rgba(87,138,255,0.3);border-color:rgba(87,138,255,0.45);transform:translateY(-1px)}
    .btn-sub{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
    .btn-sub:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);transform:translateY(-1px)}

    /* ═══ Game Bar (bottom) ═══ */
    .game-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:90vw}
    .game-tab{padding:7px 13px;border-radius:20px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.18);border-bottom:2px solid rgba(157,175,255,0.25);color:rgba(255,255,255,0.45);font-size:0.72rem;cursor:pointer;font-family:inherit;transition:all 0.2s ease;white-space:nowrap}
    .game-tab:hover,.game-tab.active{background:rgba(157,175,255,0.15);border-color:rgba(157,175,255,0.3);border-bottom-color:rgba(157,175,255,0.5);color:#b3c8ff}

    /* ═══ Overlay (all games/quizzes use this) ═══ */
    .overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(6,10,18,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .overlay.active{display:flex;animation:overlay-in 0.25s ease-out}
    @keyframes overlay-in{from{opacity:0}to{opacity:1}}
    .overlay-box{background:rgba(12,18,30,0.95);border:1px solid rgba(157,175,255,0.1);border-radius:16px;padding:24px;max-width:440px;width:90%;max-height:85vh;overflow-y:auto;animation:box-in 0.3s ease-out}
    @keyframes box-in{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    .overlay-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .overlay-title{font-size:1rem;font-weight:700;color:rgba(255,255,255,0.85)}
    .overlay-close{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.35);font-size:1rem;cursor:pointer;padding:4px 10px;transition:all 0.2s;font-family:inherit}
    .overlay-close:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)}
    .close-overlay{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.35);font-size:1rem;cursor:pointer;padding:4px 10px;transition:all 0.2s;font-family:inherit}
    .close-overlay:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)}

    /* ═══ MCTI Quiz ═══ */
    .mcti-badge{padding:3px 10px;background:linear-gradient(135deg,rgba(171,114,249,0.2),rgba(87,138,255,0.15));border:1px solid rgba(171,114,249,0.25);border-radius:6px;font-size:0.65rem;font-weight:800;color:#c49dff;letter-spacing:0.1em;margin-right:8px}
    .mcti-progress{height:4px;background:rgba(171,114,249,0.08);border-radius:3px;margin-bottom:0;overflow:hidden}
    .mcti-bar{height:100%;width:0%;background:linear-gradient(90deg,#ab72f9,#9dafff,#a8e6cf);border-radius:3px;transition:width 0.5s ease}
    .mcti-card{background:rgba(16,12,30,0.6);border:1px solid rgba(171,114,249,0.1);border-radius:16px;padding:20px 18px;margin-bottom:14px;position:relative;overflow:hidden}
    .mcti-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(171,114,249,0.4),rgba(157,175,255,0.4),transparent)}
    .mcti-q-num{font-size:0.65rem;color:rgba(171,114,249,0.5);font-weight:700;letter-spacing:0.1em;margin-bottom:8px}
    .mcti-q-text{font-size:1rem;color:rgba(255,255,255,0.9);font-weight:600;line-height:1.7}
    .mcti-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .mcti-opt{padding:12px 12px;background:rgba(157,175,255,0.03);border:1px solid rgba(157,175,255,0.08);border-radius:12px;font-size:0.82rem;color:rgba(255,255,255,0.55);cursor:pointer;font-family:inherit;text-align:left;transition:all 0.25s ease;line-height:1.6;position:relative;overflow:hidden}
    .mcti-opt::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(171,114,249,0.08),transparent);opacity:0;transition:opacity 0.25s}
    .mcti-opt:hover{background:rgba(171,114,249,0.08);border-color:rgba(171,114,249,0.2);color:rgba(255,255,255,0.85);transform:translateY(-2px);box-shadow:0 4px 16px rgba(171,114,249,0.1)}
    .mcti-opt:hover::before{opacity:1}
    .mcti-opt:active{transform:translateY(0);transition-duration:0.08s}
    .mcti-opt .opt-label{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:6px;background:rgba(171,114,249,0.1);color:rgba(171,114,249,0.7);font-size:0.6rem;font-weight:800;margin-right:8px;flex-shrink:0}
    @media(max-width:400px){.mcti-options{grid-template-columns:1fr}}

    /* MCTI Result */
    .mcti-r-emoji{font-size:3rem;margin-bottom:6px}
    .mcti-r-code{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#c49dff,#9dafff,#a8e6cf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.08em;margin-bottom:4px}
    .mcti-r-name{font-size:1.05rem;color:rgba(255,255,255,0.85);font-weight:700;margin-bottom:8px}
    .mcti-r-desc{font-size:0.82rem;color:rgba(255,255,255,0.45);line-height:1.8;margin-bottom:12px}
    .mcti-r-bars{margin-bottom:12px}
    .mcti-bar-row{margin-bottom:8px}
    .mcti-bar-label{font-size:0.68rem;color:rgba(255,255,255,0.3);margin-bottom:3px;text-align:center}
    .mcti-bar-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
    .mcti-bar-fill-a{height:100%;background:linear-gradient(90deg,rgba(171,114,249,0.6),rgba(157,175,255,0.6));border-radius:3px;transition:width 0.6s ease}
    .mcti-bar-pcts{display:flex;justify-content:space-between;font-size:0.65rem;color:rgba(255,255,255,0.35);margin-top:2px}
    .mcti-r-tags{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .mcti-r-tag{padding:3px 9px;background:rgba(171,114,249,0.08);border:1px solid rgba(171,114,249,0.12);border-radius:100px;font-size:0.68rem;color:rgba(171,114,249,0.7)}
    .mcti-r-actions{display:flex;gap:8px;justify-content:center}

    /* Mob Smasher styles in mob-smasher.css */

    /* ═══ 合成謎題 ═══ */
    .craft-target{text-align:center;margin-bottom:12px}
    .craft-target-label{display:block;font-size:0.65rem;color:rgba(255,255,255,0.3);letter-spacing:0.1em;margin-bottom:4px}
    .craft-target-emoji{font-size:2.5rem;display:block;margin-bottom:2px}
    .craft-target-name{font-size:1rem;font-weight:700;color:rgba(255,255,255,0.85)}
    .craft-target-tip{font-size:0.72rem;color:rgba(255,255,255,0.35);margin-top:2px}
    .craft-ref-label{text-align:center;font-size:0.65rem;color:rgba(255,255,255,0.25);margin-bottom:6px}
    .craft-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px;background:rgba(6,14,28,0.5);border-radius:10px;border:1px solid rgba(157,175,255,0.08);max-width:200px;margin:0 auto 8px}
    .craft-ref-grid{opacity:0.6;max-width:150px}
    .craft-cell{aspect-ratio:1;border-radius:6px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.1);display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:all 0.15s}
    .craft-ref-cell{cursor:default;background:rgba(157,175,255,0.04)}
    .craft-cell:hover:not(.craft-ref-cell){background:rgba(157,175,255,0.12)}
    .craft-filled{background:rgba(157,175,255,0.12);border-color:rgba(157,175,255,0.2)}
    .craft-tray{display:flex;justify-content:center;gap:6px;margin:10px 0;flex-wrap:wrap}
    .craft-item{width:40px;height:40px;border-radius:8px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.1);font-size:1.2rem;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center}
    .craft-item:hover{background:rgba(157,175,255,0.15);transform:scale(1.1)}
    .craft-item.craft-selected{background:rgba(157,175,255,0.25);border-color:var(--sky,#9dafff);box-shadow:0 0 8px rgba(157,175,255,0.3)}
    .craft-clear{opacity:0.5}
    .craft-hint{text-align:center;font-size:0.68rem;color:rgba(255,255,255,0.2);margin-top:6px}

    /* ═══ 釣魚比賽 ═══ */
    .fish-scene{position:relative;width:100%;height:180px;background:linear-gradient(180deg,#0c1f35 0%,#123050 40%,#1a4070 60%,#0a2a50 100%);border-radius:12px;border:1px solid rgba(157,175,255,0.1);overflow:hidden;cursor:pointer}
    .fish-water{position:absolute;bottom:0;left:0;right:0;height:55%;background:linear-gradient(180deg,rgba(30,80,140,0.3),rgba(10,40,80,0.9));animation:fish-wave 3s ease-in-out infinite}
    @keyframes fish-wave{0%,100%{height:55%}50%{height:53%}}
    .fish-bobber{position:absolute;top:30%;left:50%;transform:translateX(-50%);font-size:1.8rem;transition:all 0.3s;z-index:2}
    .fish-casting{animation:fish-cast 0.6s ease-out forwards}
    @keyframes fish-cast{0%{top:20%}100%{top:55%}}
    .fish-floating{top:50%;animation:fish-float 2s ease-in-out infinite}
    @keyframes fish-float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-3px)}}
    .fish-biting{top:52%;animation:fish-bite 0.15s ease-in-out infinite}
    @keyframes fish-bite{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
    .fish-reel{top:25%;font-size:2.2rem;animation:fish-reel-up 0.5s ease-out}
    @keyframes fish-reel-up{0%{top:55%}100%{top:25%}}
    .fish-msg{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:0.85rem;font-weight:600;color:rgba(255,255,255,0.7);text-shadow:0 2px 8px rgba(0,0,0,0.5);z-index:3;white-space:nowrap}
    .fish-history{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin-top:8px}
    .fish-caught{font-size:1.2rem;animation:fish-pop 0.3s ease-out}
    @keyframes fish-pop{0%{transform:scale(0)}100%{transform:scale(1)}}

    /* ═══ 附魔猜猜 ═══ */
    .ench-table{text-align:center;padding:12px 0}
    .ench-garble{font-size:1.6rem;letter-spacing:0.15em;color:rgba(157,175,255,0.5);margin-bottom:8px;font-family:'JetBrains Mono',monospace;text-shadow:0 0 8px rgba(157,175,255,0.2)}
    .ench-hint{font-size:0.82rem;color:rgba(255,255,255,0.45);margin-bottom:14px;font-style:italic}
    .ench-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .ench-opt{padding:12px;background:rgba(157,175,255,0.04);border:1px solid rgba(157,175,255,0.1);border-radius:10px;color:rgba(255,255,255,0.6);font-size:0.9rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .ench-opt:hover{background:rgba(157,175,255,0.1);border-color:rgba(157,175,255,0.2);color:rgba(255,255,255,0.85);transform:translateY(-1px)}
    .ench-opt:disabled{cursor:default;transform:none}
    .ench-correct{background:rgba(168,230,207,0.15) !important;border-color:rgba(168,230,207,0.3) !important;color:#a8e6cf !important}
    .ench-wrong{background:rgba(255,80,80,0.15) !important;border-color:rgba(255,80,80,0.3) !important;color:#ff8282 !important}
    .ench-msg{font-size:0.85rem;font-weight:600;margin-top:12px;min-height:1.2em}

    /* ═══ 村民交易 ═══ */
    .trade-scene{text-align:center;padding:10px 0}
    .trade-villager{margin-bottom:10px}
    .trade-villager-emoji{font-size:3rem;display:block;margin-bottom:4px}
    .trade-villager-name{font-size:0.9rem;font-weight:700;color:rgba(255,255,255,0.85)}
    .trade-villager-mood{font-size:0.75rem;color:rgba(255,255,255,0.4);display:block;margin-top:2px}
    .trade-item{margin-bottom:10px}
    .trade-item-emoji{font-size:2rem;display:block;margin-bottom:2px}
    .trade-item-name{font-size:0.95rem;font-weight:600;color:rgba(255,255,255,0.8)}
    .trade-ask{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:14px}
    .trade-ask-price{font-weight:800;color:#ffaa32;font-size:1.1rem}
    .trade-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .trade-btn{padding:10px;border-radius:10px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.1);color:rgba(255,255,255,0.55);font-size:0.8rem;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .trade-btn:hover:not(:disabled){background:rgba(157,175,255,0.12);color:rgba(255,255,255,0.8);transform:translateY(-1px)}
    .trade-btn:disabled{opacity:0.3;cursor:default}
    .trade-accept{border-color:rgba(168,230,207,0.2);color:rgba(168,230,207,0.7)}
    .trade-accept:hover:not(:disabled){background:rgba(168,230,207,0.1)}
    .trade-steal{border-color:rgba(171,114,249,0.2);color:rgba(171,114,249,0.7)}
    .trade-steal:hover:not(:disabled){background:rgba(171,114,249,0.1)}
    .trade-msg{font-size:0.85rem;font-weight:600;margin-top:12px;min-height:1.2em}

    /* ═══ 唱片收集 ═══ */
    .rec-wrap{display:flex;justify-content:center}
    #recCanvas{display:block;border-radius:10px;border:1px solid rgba(157,175,255,0.12);max-width:100%}
    .rec-keys{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:240px;margin:8px auto 0}
    .rec-key{padding:12px 0;border-radius:10px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.1);color:rgba(255,255,255,0.4);font-size:1.2rem;cursor:pointer;font-family:inherit;transition:all 0.1s;user-select:none;-webkit-user-select:none}
    .rec-key:hover{background:rgba(157,175,255,0.12)}
    .rec-key:active,.rec-key-hit{background:rgba(168,230,207,0.2);border-color:rgba(168,230,207,0.4);color:#a8e6cf;transform:scale(0.95)}
    .rec-hint{text-align:center;font-size:0.62rem;color:rgba(255,255,255,0.18);margin-top:6px}

    /* ═══ 方塊堆疊 ═══ */
    .stk-wrap{position:relative;display:flex;justify-content:center}
    #stkCanvas{display:block;border-radius:10px;border:1px solid rgba(157,175,255,0.12);cursor:pointer;max-width:100%}
    .stk-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(6,10,18,0.7);border-radius:10px;font-size:1rem;font-weight:700;color:rgba(255,255,255,0.7);cursor:pointer;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
    .stk-final-score{font-size:2.5rem;font-weight:800;color:#a8e6cf}
    .stk-hint{text-align:center;font-size:0.62rem;color:rgba(255,255,255,0.18);margin-top:6px}

    /* Game HUD */
    .game-hud{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:12px;font-size:0.78rem;color:rgba(255,255,255,0.4)}
    .game-hud-val{color:#a8e6cf;font-weight:700;font-variant-numeric:tabular-nums}

    /* Result */
    .game-result{text-align:center;padding:16px 0}
    .game-result-emoji{font-size:2rem;margin-bottom:6px}
    .game-result-val{font-size:1.6rem;font-weight:800;color:#a8e6cf;margin-bottom:4px}
    .game-result-text{font-size:0.82rem;color:rgba(255,255,255,0.4);margin-bottom:6px}
    .game-result-label{font-size:0.9rem;color:#a8e6cf;font-weight:700;margin-bottom:12px}
    .game-result-btns{display:flex;gap:8px;justify-content:center}


    /* Timer */
    .timer{font-size:1.5rem;font-weight:800;color:rgba(255,255,255,0.7);font-variant-numeric:tabular-nums;text-align:center;margin:8px 0}

    @media(max-width:768px){
      .celestial{width:40px;height:40px}
      .sun{top:12%;right:15%}
      .moon{top:10%;right:13%}
      .content{top:12%}
      .code{font-size:3.5rem}
      .game-tab{padding:6px 9px;font-size:0.68rem}
      .game-bar{bottom:10px}
    }
    @media(max-width:375px){
      .content{top:8%}
      .code{font-size:3rem}
      .title{font-size:0.85rem}
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <button class="theme-toggle-404" id="themeToggle404" aria-label="切換主題"></button>
    <!-- Sky -->
    <div class="sky sunset" id="sky">
      <div class="celestial sun" id="sun"></div>
      <div class="celestial moon" id="moon"></div>
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>
    <div class="horizon"></div>

    <!-- Ocean -->
    <div class="ocean" id="ocean">
      <div class="ocean-body"></div>
      <div class="ocean-surface"></div>
      <div class="wave w1"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,20 Q360,45 720,20 Q1080,0 1440,20 Q1800,40 2160,20 Q2520,0 2880,20 L2880,60 L0,60Z" fill="rgba(10,26,46,0.4)"/></svg></div>
      <div class="wave w2"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,30 Q480,10 960,30 Q1440,50 1920,30 Q2400,10 2880,30 L2880,60 L0,60Z" fill="rgba(8,20,38,0.5)"/></svg></div>
      <div class="wave w3"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,25 Q360,45 720,25 Q1080,5 1440,25 Q1800,45 2160,25 Q2520,5 2880,25 L2880,60 L0,60Z" fill="rgba(6,16,32,0.7)"/></svg></div>
      <div class="wave w4"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,35 Q480,15 960,35 Q1440,55 1920,35 Q2400,15 2880,35 L2880,60 L0,60Z" fill="#060e1c"/></svg></div>

      <!-- Ice overlay -->
      <div class="ice-overlay"></div>

      <!-- Sea creatures -->
      <div class="creature turtle" id="turtle">🐢</div>
      <div class="creature fish" style="animation-delay:-3s"><img src="assets/mobs/tropical-fish.png" alt="" class="mc-sprite" width="24" height="24"></div>
      <div class="creature fish" style="animation-delay:-8s;bottom:16%;animation-duration:15s"><img src="assets/mobs/cod.png" alt="" class="mc-sprite" width="20" height="20"></div>

      <!-- Cat -->
      <div class="cat-float" aria-hidden="true">
        <svg width="64" height="56" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="32" cy="38" rx="18" ry="12" fill="#f0ece4" stroke="#e0dcd4" stroke-width="1"/>
          <ellipse cx="24" cy="34" rx="8" ry="7" fill="#1a1a1a"/>
          <ellipse cx="44" cy="40" rx="6" ry="5" fill="#1a1a1a"/>
          <ellipse cx="30" cy="44" rx="5" ry="3" fill="#2a2a2a"/>
          <circle cx="32" cy="22" r="12" fill="#f0ece4" stroke="#e0dcd4" stroke-width="1"/>
          <path d="M32 10 Q44 12 44 22 Q44 32 32 34Z" fill="#1a1a1a"/>
          <ellipse cx="28" cy="13" rx="6" ry="5" fill="#2a2a2a"/>
          <path d="M22 14 L19 3 L28 11Z" fill="#f0ece4" stroke="#d0ccc4" stroke-width="1"/>
          <path d="M20 6 L22 12 L25 10Z" fill="#1a1a1a"/>
          <path d="M42 14 L45 3 L36 11Z" fill="#1a1a1a" stroke="#333" stroke-width="0.8"/>
          <path d="M41 12 L43 5 L37 11Z" fill="#2a2a2a"/>
          <ellipse cx="27" cy="21" rx="2.8" ry="3.2" fill="#5eead4" class="cat-glow"/>
          <ellipse cx="38" cy="21" rx="2.8" ry="3.2" fill="#5eead4" class="cat-glow"/>
          <ellipse cx="27" cy="21" rx="1.3" ry="2.8" fill="#111"/>
          <ellipse cx="38" cy="21" rx="1.3" ry="2.8" fill="#111"/>
          <circle cx="28.2" cy="19.5" r="0.9" fill="#fff" opacity="0.95"/>
          <circle cx="39.2" cy="19.5" r="0.9" fill="#fff" opacity="0.95"/>
          <path d="M31 25.5 L32 27.5 L33 25.5Z" fill="#f5a0b0"/>
          <path d="M32 27.5 Q29 30.5 27 28.5" stroke="#aa9988" stroke-width="0.8" fill="none"/>
          <path d="M32 27.5 Q35 30.5 37 28.5" stroke="#aa9988" stroke-width="0.8" fill="none"/>
          <line x1="17" y1="23" x2="24" y2="24" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="16" y1="26" x2="23" y2="26.5" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="17" y1="29" x2="23" y2="28" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="40" y1="24" x2="47" y2="23" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="41" y1="26.5" x2="48" y2="26" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="41" y1="28" x2="47" y2="29" stroke="#ccbb99" stroke-width="0.5"/>
          <ellipse cx="22" cy="46" rx="5" ry="3.5" fill="#f0ece4" stroke="#d0ccc4" stroke-width="0.8"/>
          <ellipse cx="20" cy="45.5" rx="2" ry="1.5" fill="#2a2a2a"/>
          <ellipse cx="42" cy="46" rx="5" ry="3.5" fill="#1a1a1a" stroke="#333" stroke-width="0.8"/>
          <path d="M50 36 Q57 27 55 18 Q54 14 56 12" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M55 14 Q55 11 56 9" stroke="#f0ece4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Ships -->
    <div class="ship boat" id="boat">
      <svg width="120" height="90" viewBox="0 0 120 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Hull -->
        <path d="M15,58 Q12,58 10,62 L8,72 Q8,78 14,78 L96,78 Q102,78 104,72 L100,62 Q98,58 94,58 Z" fill="#5a3a1a" stroke="#3d2510" stroke-width="1.2"/>

  <script src="minigames.js?v=220422a"></script>
  <script src="404-games.js?v=260416"></script>
  <script>
  (() => {
    'use strict';

    // ═══ Theme Toggle ═══
    const themeBtn404 = document.getElementById('themeToggle404');
    const moonSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
    const sunSVG = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';

    // Init theme from localStorage
    const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    const savedTheme = localStorage.getItem('seabreeze-theme') || (prefersLight ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', savedTheme);
    if (themeBtn404) {
      themeBtn404.innerHTML = savedTheme === 'dark' ? moonSVG : sunSVG;
      themeBtn404.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('seabreeze-theme', next);
        themeBtn404.innerHTML = next === 'dark' ? moonSVG : sunSVG;
      });
    }

    // ═══ Theme-based Sky ═══
    const sky = document.getElementById('sky');
    const weatherMsg = document.getElementById('weatherMsg');

    function setSkyForTheme() {
      const theme = document.documentElement.getAttribute('data-theme') || 'dark';
      if (theme === 'light') {
        sky.style.transition = 'background 3s';
        sky.className = 'sky daytime';
        weatherMsg.textContent = '☀️ 晴空萬里，適合出海';
      } else {
        sky.style.transition = 'background 3s';
        sky.className = 'sky night';
        weatherMsg.textContent = '🌙 月色如水，海面寧靜';
      }
    }

    // Init + listen for theme changes
    setSkyForTheme();
    new MutationObserver(setSkyForTheme).observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    // ═══ Stars ═══
    const skyEl = document.getElementById('sky');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random()*100+'%';
      s.style.top = Math.random()*50+'%';
      const sz = 0.5+Math.random()*1.5;
      s.style.width = sz+'px'; s.style.height = sz+'px';
      skyEl.appendChild(s);
    }

    // ═══ Bubbles ═══
    const bubbleContainer = document.getElementById('bubbles');
    function spawnBubble() {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 4+Math.random()*12;
      b.style.width = size+'px'; b.style.height = size+'px';
      b.style.left = (10+Math.random()*80)+'%';
      b.style.bottom = (5+Math.random()*30)+'%';
      b.style.animationDuration = (4+Math.random()*6)+'s';
      bubbleContainer.appendChild(b);
      setTimeout(() => b.remove(), 10000);
    }
    setInterval(spawnBubble, 1000);

    // ═══ Cleanup Challenge ═══
    const CLEANUP_DURATION = 30; // seconds
    const cleanupField = document.getElementById('cleanupField');
    const cleanupBar = document.getElementById('cleanupBar');
    const cleanupResult = document.getElementById('cleanupResult');
    const TRASH_POOL = [
      { emoji:'🧴', pts:10 }, { emoji:'🥤', pts:10 }, { emoji:'🛍️', pts:10 },
      { emoji:'📦', pts:10 }, { emoji:'🥫', pts:10 }, { emoji:'🧃', pts:10 },
      { emoji:'🫙', pts:10 }, { emoji:'🍶', pts:10 }, { emoji:'🥡', pts:10 },
      { emoji:'🎈', pts:10 }, { emoji:'🪥', pts:10 }, { emoji:'🛒', pts:10 },
      { emoji:'🪣', pts:15 }, { emoji:'🔋', pts:25 }, { emoji:'💊', pts:25 },
      { emoji:'🛢️', pts:25 }, { emoji:'☣️', pts:25 },
    ];
    const CREATURE_POOL = [
      { emoji:'🐢', penalty:15, sprite:'assets/mobs/turtle.png' }, { emoji:'🐠', penalty:15, sprite:'assets/mobs/tropical-fish.png' }, { emoji:'🐟', penalty:15, sprite:'assets/mobs/cod.png' },
      { emoji:'🐬', penalty:20, sprite:'assets/mobs/dolphin.png' }, { emoji:'🐙', penalty:15, sprite:'assets/mobs/squid.png' }, { emoji:'🦀', penalty:15, sprite:'assets/mobs/armadillo.png' },
      { emoji:'🦐', penalty:15, sprite:'assets/mobs/tadpole.png' }, { emoji:'🐡', penalty:15, sprite:'assets/mobs/pufferfish.png' }, { emoji:'🐚', penalty:10, sprite:'assets/mobs/nautilus.png' },
    ];
    const BONUS_POOL = [
      { emoji:'💎', pts:50 }, { emoji:'🏆', pts:50 }, { emoji:'⭐', pts:40 },
      { emoji:'🌊', pts:35 }, { emoji:'🧜‍♀️', pts:60 },
    ];
    let cleanupState = null; // { score, combo, maxCombo, collected, missed, penalties, timer, interval, spawnInterval }

    function spawnCleanupItem() {
      if (!cleanupState) return;
      const isMobile = window.innerWidth < 768;
      const maxItems = isMobile ? 6 : 10;
      const live = cleanupField.querySelectorAll('.c-item').length;
      if (live >= maxItems) return;

      const roll = Math.random();
      let pool, isCreature = false, isBonus = false;
      if (roll < 0.10) { pool = BONUS_POOL; isBonus = true; }
      else { pool = TRASH_POOL; }

      // Occasionally spawn creatures (20% chance per call)
      if (Math.random() < 0.20 && !isBonus) {
        pool = CREATURE_POOL;
        isCreature = true;
      }

      const item = pool[Math.floor(Math.random() * pool.length)];
      const el = document.createElement('div');
      el.className = 'c-item ' + (isCreature ? 'creature-item' : isBonus ? 'bonus-item' : 'trash-item');
      if (isCreature && item.sprite) {
        el.innerHTML = '<img src="' + item.sprite + '" alt="" class="mc-sprite" width="32" height="32">';
      } else {
        el.textContent = item.emoji;
      }
      el.style.fontSize = isBonus ? '1.8rem' : (1.2 + Math.random() * 0.6) + 'rem';

      // Spawn position — in the ocean area (bottom 45% of screen)
      el.style.top = (50 + Math.random() * 25) + '%';
      el.style.left = (3 + Math.random() * 94) + '%';

      el.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!cleanupState || el.classList.contains('collected') || el.classList.contains('penalty')) return;

        if (isCreature) {
          // Hit a creature — penalty!
          cleanupState.combo = 0;
          cleanupState.penalties++;
          const pen = item.penalty;
          cleanupState.score = Math.max(0, cleanupState.score - pen);
          el.classList.add('penalty');
          showFloatScore(el, `-${pen}`, 'negative');
          flashScreen();
          updateCleanupHUD();
          setTimeout(() => el.remove(), 600);
        } else {
          // Collected trash or bonus!
          cleanupState.combo++;
          if (cleanupState.combo > cleanupState.maxCombo) cleanupState.maxCombo = cleanupState.combo;
          const multiplier = Math.min(cleanupState.combo, 5);
          const earned = item.pts * multiplier;
          cleanupState.score += earned;
          cleanupState.collected++;
          el.classList.add('collected');
          if (isBonus) {
            showFloatScore(el, `+${earned}`, 'bonus');
          } else {
            showFloatScore(el, multiplier > 1 ? `+${earned} x${multiplier}` : `+${earned}`, 'positive');
          }
          updateCleanupHUD();
          setTimeout(() => el.remove(), 400);
        }
      });

      cleanupField.appendChild(el);
      // Auto-remove after some time if not clicked
      const lifetime = (4 + Math.random() * 4) * 1000;
      setTimeout(() => {
        if (el.parentNode && !el.classList.contains('collected') && !el.classList.contains('penalty')) {
          if (!isCreature) cleanupState.missed++;
          el.style.opacity = '0';
          el.style.transform = 'translateY(20px)';
          setTimeout(() => el.remove(), 300);
        }
      }, lifetime);
    }

    function showFloatScore(el, text, type) {
      const rect = el.getBoundingClientRect();
      const popup = document.createElement('div');
      popup.className = 'float-score ' + type;
      popup.textContent = text;
      popup.style.left = rect.left + rect.width / 2 + 'px';
      popup.style.top = rect.top + 'px';
      popup.style.transform = 'translateX(-50%)';
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 800);
    }

    function flashScreen() {
      const flash = document.createElement('div');
      flash.className = 'scene-flash';
      document.getElementById('scene').appendChild(flash);
      setTimeout(() => flash.remove(), 400);
    }

    function updateCleanupHUD() {
      if (!cleanupState) return;
      document.getElementById('cbScore').textContent = cleanupState.score;
      const comboEl = document.getElementById('cbCombo');
      if (cleanupState.combo > 1) {
        comboEl.textContent = `x${Math.min(cleanupState.combo, 5)}`;
        comboEl.classList.add('active');
      } else {
        comboEl.classList.remove('active');
      }
    }

    function updateCleanupTimer() {
      if (!cleanupState) return;
      cleanupState.timer--;
      const pct = (cleanupState.timer / CLEANUP_DURATION) * 100;
      const fill = document.getElementById('cbTimerFill');
      fill.style.width = pct + '%';
      fill.classList.toggle('urgent', cleanupState.timer <= 10);
      document.getElementById('cbTimerText').textContent = cleanupState.timer;
      if (cleanupState.timer <= 0) endCleanup();
    }

    window.startCleanup = () => {
      // Prevent starting if already active
      if (cleanupState) return;

      cleanupState = {
        score: 0, combo: 0, maxCombo: 0, collected: 0, missed: 0, penalties: 0,
        timer: CLEANUP_DURATION, interval: null, spawnInterval: null
      };

      // Reset HUD
      document.getElementById('cbScore').textContent = '0';
      document.getElementById('cbCombo').classList.remove('active');
      document.getElementById('cbTimerFill').style.width = '100%';
      document.getElementById('cbTimerFill').classList.remove('urgent');
      document.getElementById('cbTimerText').textContent = CLEANUP_DURATION;

      // Show bar, hide result
      cleanupBar.classList.add('active');
      cleanupResult.classList.remove('active');
      cleanupResult.innerHTML = '';
      cleanupField.innerHTML = '';

      // Hide content buttons
      document.getElementById('cleanBtn').style.display = 'none';

      // Start spawning
      for (let i = 0; i < 4; i++) setTimeout(spawnCleanupItem, i * 250);
      cleanupState.spawnInterval = setInterval(spawnCleanupItem, 800);
      cleanupState.interval = setInterval(updateCleanupTimer, 1000);
    };

    window.endCleanup = () => {
      if (!cleanupState) return;
      clearInterval(cleanupState.interval);
      clearInterval(cleanupState.spawnInterval);

      const s = cleanupState;
      cleanupField.innerHTML = '';

      // Calculate rating
      let stars = 1, rank = '淨灘新手';
      if (s.score >= 800) { stars = 5; rank = '海洋守護神 🌊'; }
      else if (s.score >= 500) { stars = 4; rank = '沙灘勇士'; }
      else if (s.score >= 300) { stars = 3; rank = '環保達人'; }
      else if (s.score >= 150) { stars = 2; rank = '淨灘實習生'; }

      // Best score
      const bestKey = 'sw-cleanup-best';
      let best = parseInt(localStorage.getItem(bestKey) || '0');
      const isNewBest = s.score > best;
      if (isNewBest) localStorage.setItem(bestKey, s.score);

      // Show result
      const starStr = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);
      cleanupResult.innerHTML = `
        <div class="cr-box">
          <div class="cr-title">🧹 淨灘結束！</div>
          <div class="cr-subtitle">30 秒挑戰</div>
          <div class="cr-score">${s.score}</div>
          <div class="cr-label">總得分</div>
          <div class="cr-stats">
            <div class="cr-stat"><span class="cr-stat-val">${s.collected}</span><span class="cr-stat-label">撿起</span></div>
            <div class="cr-stat"><span class="cr-stat-val">${s.missed}</span><span class="cr-stat-label">錯過</span></div>
            <div class="cr-stat"><span class="cr-stat-val">${s.penalties}</span><span class="cr-stat-label">誤觸</span></div>
            <div class="cr-stat"><span class="cr-stat-val">x${s.maxCombo}</span><span class="cr-stat-label">最高連擊</span></div>
          </div>
          <div class="cr-stars">${starStr}</div>
          <div class="cr-rank">${rank}</div>
          <div class="cr-best">${isNewBest ? '🎉 新紀錄！' : (best > 0 ? `最高紀錄 ${best} 分` : '')}</div>
          <div class="cr-btns">
            <button class="btn btn-main" onclick="startCleanup()">🧹 再來一次</button>
            <button class="btn btn-sub" onclick="endCleanupFinal()">關閉</button>
          </div>
        </div>
      `;
      cleanupResult.classList.add('active');
      cleanupBar.classList.remove('active');
      cleanupState = null;
    };

    window.endCleanupFinal = () => {
      cleanupResult.classList.remove('active');
      cleanupResult.innerHTML = '';
      document.getElementById('cleanBtn').style.display = '';
    };

    // ═══ Unified Overlay ═══
    const overlay = document.getElementById('overlay');
    const overlayBox = document.getElementById('overlayBox');
    let currentGame = null;

    window.openGame = (type) => {
      currentGame = type;
      const labelMap = {mcti:'MCTI',mole:'打怪物',crafting:'合成',fishing:'釣魚',enchanting:'附魔',trading:'交易',records:'唱片',stacking:'堆疊',memory:'翻牌',snake:'貪吃蛇',minesweeper:'掃雷',merge2048:'2048',flappy:'滑翔翼',wordle:'猜礦',connect4:'四子棋',gomoku:'五子棋',tictactoe:'井字棋',simon:'礦石記憶',shooting:'射擊場',react:'反應',nummem:'數字記憶'};
      document.querySelectorAll('.game-tab').forEach(t => t.classList.toggle('active', t.textContent.includes(labelMap[type]||'')));
      if (type === 'mcti') { initMCTI(); renderMCTI(); }
      else if (type === 'mole') MOB_SMASHER.open(overlayBox);
      else if (GAMES_404[type]) GAMES_404[type](overlayBox);
      else if (typeof MINIGAMES !== 'undefined' && MINIGAMES[type]) MINIGAMES[type](overlayBox);
      overlay.classList.add('active');
    };

    window.closeOverlay = () => {
      MOB_SMASHER.close();
      if (typeof MINIGAMES !== 'undefined') MINIGAMES.close();
      overlay.classList.remove('active');
      document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
      currentGame = null;
    };

    // ═══ MCTI ═══
    // 每個選項對應一個維度：B=建築 S=生存 R=紅石 D=探索 C=美感 M=效率 L=獨行 H=團隊
    // 但最終只取 B/S, R/D, C/M, L/H 四組
    const MCTI_Q = [
      { q:'進入新的世界，你第一件事會？', opts:[
        {t:'開始蓋一個漂亮的家', d:'B'}, {t:'衝出去探險找寶藏', d:'D'},
        {t:'先做一套頂級裝備', d:'S'}, {t:'找朋友一起玩', d:'H'}
      ]},
      { q:'你在伺服器最常做的事是？', opts:[
        {t:'研究紅石電路搞自動化', d:'R'}, {t:'到處蓋漂亮的建築', d:'B'},
        {t:'挖礦打怪收集資源', d:'D'}, {t:'和朋友一起合作', d:'H'}
      ]},
      { q:'你蓋東西最注重什麼？', opts:[
        {t:'配色和氛圍，讓人驚艷', d:'C'}, {t:'功能和效率，方便使用', d:'M'},
        {t:'規模和氣勢，越大越好', d:'B'}, {t:'實用就好，能住就行', d:'S'}
      ]},
      { q:'你理想中的遊戲體驗是？', opts:[
        {t:'和朋友一起搞事一起蓋', d:'H'}, {t:'一個人安靜地享受世界', d:'L'},
        {t:'挑戰極限，突破紀錄', d:'S'}, {t:'慢慢經營，不急不徐', d:'C'}
      ]},
      { q:'朋友蓋了一棟歪七扭八的房子，你會？', opts:[
        {t:'忍不住幫他重新設計', d:'B'}, {t:'告訴他怎麼蓋更好', d:'H'},
        {t:'誇他有創意默默走開', d:'L'}, {t:'幫他拆掉重建效率更高', d:'M'}
      ]},
      { q:'你更嚮往哪種生活？', opts:[
        {t:'住在充滿機關的堡壘', d:'R'}, {t:'背包一背到處冒險', d:'D'},
        {t:'在村莊裡和大家生活', d:'H'}, {t:'在深山裡隱居蓋花園', d:'C'}
      ]},
      { q:'伺服器辦建築比賽，你會？', opts:[
        {t:'馬上報名大展身手', d:'C'}, {t:'先看獎勵值不值得', d:'M'},
        {t:'幫朋友出主意當軍師', d:'H'}, {t:'算了我更想去探險', d:'D'}
      ]},
      { q:'在海風伺服器你最自在的時刻？', opts:[
        {t:'在群組跟大家聊天哈啦', d:'H'}, {t:'在自己領地裡慢慢經營', d:'L'},
        {t:'研究新的紅石裝置', d:'R'}, {t:'蓋出讓人驚艷的建築', d:'C'}
      ]},
      { q:'你有三天假期，你會在遊戲裡？', opts:[
        {t:'蓋一個夢想中的建築', d:'B'}, {t:'探索一個從沒去過的地方', d:'D'},
        {t:'優化所有農場和設施', d:'M'}, {t:'和朋友辦一場活動', d:'H'}
      ]},
      { q:'你更享受哪種成就感？', opts:[
        {t:'做出超複雜的紅石裝置', d:'R'}, {t:'蓋出讓人讚嘆的作品', d:'C'},
        {t:'找到稀有礦石和裝備', d:'D'}, {t:'帶新手變厲害', d:'H'}
      ]},
      { q:'伺服器有新功能開放，你會？', opts:[
        {t:'想辦法用它做出好看的東西', d:'C'}, {t:'研究效率最大化的用法', d:'M'},
        {t:'馬上測試並寫攻略分享', d:'H'}, {t:'自己默默研究不想被打擾', d:'L'}
      ]},
      { q:'有人在伺服器遇到困難，你會？', opts:[
        {t:'馬上過去幫忙', d:'H'}, {t:'告訴他方法讓他自己解決', d:'L'},
        {t:'看情況，太遠就算了', d:'S'}, {t:'做一個教學設施讓所有人受益', d:'R'}
      ]},
      { q:'你理想中的基地是？', opts:[
        {t:'精心設計的城堡或莊園', d:'B'}, {t:'功能齊全的地下避難所', d:'M'},
        {t:'隱密的叢林樹屋', d:'L'}, {t:'方便大家來玩的公共空間', d:'H'}
      ]},
      { q:'你對「最強裝備」的定義是？', opts:[
        {t:'全套附魔 IV+ 的頂級裝備', d:'S'}, {t:'夠用就好重點是玩得開心', d:'L'},
        {t:'最好看的那套', d:'C'}, {t:'能自動修復的那套', d:'R'}
      ]},
      { q:'你蓋了一座農場，你最開心的是？', opts:[
        {t:'它看起來很美很療癒', d:'C'}, {t:'它全自動效率超高', d:'M'},
        {t:'能養活整個伺服器的人', d:'H'}, {t:'終於不用再手動種田了', d:'S'}
      ]}
    ];
    const MCTI_TYPES = {
      'BRCL':{emoji:'🏗️',name:'建築高手',desc:'你的作品總讓人驚嘆。別人蓋火柴盒的時候，你已經在規劃一座城市了。伺服器地標十有八九出自你手。',tags:['建築×紅石×美感×獨行']},
      'BRCH':{emoji:'🏠',name:'建築藝術家',desc:'美感是你的一切。房子住得舒服比什麼都重要，你蓋的東西讓人想住進去。',tags:['建築×紅石×美感×團隊']},
      'BRML':{emoji:'🔧',name:'紅石大老',desc:'紅石比鑽石珍貴——這是你的人生信條。你的建築不只好看，還會動，每棟都是精密機器。',tags:['建築×紅石×效率×獨行']},
      'BRMH':{emoji:'🌾',name:'農場主人',desc:'自給自足是你的信仰。全自動農場、分類系統、經驗農場——你讓伺服器的每個人都不愁吃穿。',tags:['建築×紅石×效率×團隊']},
      'BDCL':{emoji:'🔍',name:'礦洞探險家',desc:'黑暗的礦洞讓你興奮，未知的遺跡讓你著迷。你的背包永遠裝滿從地底帶回來的戰利品。',tags:['建築×探索×美感×獨行']},
      'BDCH':{emoji:'🧭',name:'冒險學家',desc:'世界就是你的實驗室。死亡？那只是收集數據的一部分。你帶隊探險，讓每趟旅程都有收穫。',tags:['建築×探索×美感×團隊']},
      'BDML':{emoji:'⛏️',name:'物資礦工',desc:'效率就是一切。你知道每個礦脈的最佳路線，Y=-59 是你的後花園。裝備永遠附魔到頂。',tags:['建築×探索×效率×獨行']},
      'BDMH':{emoji:'🦙',name:'流浪商人',desc:'背包就是你的家。你什麼都帶一點、什麼都做一點，走到哪都是行走的百寶箱。',tags:['建築×探索×效率×團隊']},
      'SRCL':{emoji:'⚔️',name:'戰鬥機器',desc:'PvP 是你的最愛。凋零、刦毀獸、遠古守衛者——沒有你打不贏的對手。最好的防禦就是你的攻擊。',tags:['生存×紅石×美感×獨行']},
      'SRCH':{emoji:'🏰',name:'生存專家',desc:'你是伺服器的守護者。村莊觸發襲擊？你第一個衝。新手迷路？你帶他回家。生存就是你的專業。',tags:['生存×紅石×美感×團隊']},
      'SRML':{emoji:'🐉',name:'終界行者',desc:'末地、地獄、深暗之域——哪裏危險你往哪裏去。每次死亡都是下一場冒險的起點。',tags:['生存×紅石×效率×獨行']},
      'SRMH':{emoji:'🍄',name:'蘑菇島之王',desc:'四塊木板做成工作台、營火烤熟第一條魚。不需要豪華裝備，最純粹的生存就是你的浪漫。',tags:['生存×紅石×效率×團隊']},
      'DRCL':{emoji:'📖',name:'維基百科',desc:'問你任何問題都有答案。合成表、農場設計、附魔機率——你的腦袋就是活的 Minecraft Wiki。',tags:['生存×探索×美感×獨行']},
      'DRCH':{emoji:'🐝',name:'馴獸師',desc:'你愛動物勝過一切。馴狼、養貓、繁殖馬匹——你蓋的動物園比你的房子還大。',tags:['生存×探索×美感×團隊']},
      'DRML':{emoji:'🧊',name:'正方形戰士',desc:'一切問題都可以用方塊解決。你的信仰是：方的就對了。你在創造模式下蓋出的東西讓工程師都佩服。',tags:['生存×探索×效率×獨行']},
      'DRMH':{emoji:'🎣',name:'釣魚達人',desc:'你可以在海邊坐上一整天。釣竿是你最強的武器，耐心是你最好的附魔。人生嘛，慢慢來就好。',tags:['生存×探索×效率×團隊']}
    };
    let mctiStep = 0, mctiScores = {};

    function renderMCTI(result) {
      let html = '<div class="overlay-header"><span class="overlay-title"><span class="mcti-badge">MCTI</span>Minecraft 性格測驗</span><button class="overlay-close" onclick="closeOverlay()">✕</button></div>';
      if (result) {
        // 計算四個維度
        const s = mctiScores;
        const code = (s.B>=s.S?'B':'S')+(s.R>=s.D?'R':'D')+(s.C>=s.M?'C':'M')+(s.L>=s.H?'L':'H');
        const t = MCTI_TYPES[code]||MCTI_TYPES['DRMH'];
        const dims = [
          {label:'建築 · 生存',a:'🏗️ 建築家',b:'⚔️ 生存者',va:s.B,vb:s.S},
          {label:'紅石 · 探索',a:'⚙️ 紅石人',b:'🧭 探索者',va:s.R,vb:s.D},
          {label:'美感 · 效率',a:'🎨 美感',b:'📈 效率',va:s.C,vb:s.M},
          {label:'獨行 · 團隊',a:'🐺 獨行俠',b:'🤝 團隊魂',va:s.L,vb:s.H}
        ];
        html += `<div class="mcti-r-emoji">${t.emoji}</div><div class="mcti-r-code">${code}</div><div class="mcti-r-name">${t.name}</div><div class="mcti-r-desc">${t.desc}</div><div class="mcti-r-bars">`;
        dims.forEach(d => {
          const total = d.va+d.vb||1, pA = Math.round(d.va/total*100), pB = 100-pA;
          html += `<div class="mcti-bar-row"><div class="mcti-bar-label">${d.label}</div><div class="mcti-bar-track"><div class="mcti-bar-fill-a" style="width:${pA}%"></div></div><div class="mcti-bar-pcts"><span>${d.a} ${pA}%</span><span>${pB}% ${d.b}</span></div></div>`;
        });
        html += '</div><div class="mcti-r-tags">';
        (t.tags||[]).forEach(tag => html += `<span class="mcti-r-tag">${tag}</span>`);
        html += '</div><div class="game-result-btns"><button class="btn btn-main" onclick="resetMCTI()">🔄 再測一次</button></div>';
      } else {
        const q = MCTI_Q[mctiStep];
        html += `<div class="mcti-progress"><div class="mcti-bar" style="width:${mctiStep/MCTI_Q.length*100}%"></div></div>`;
        html += `<div class="mcti-card"><div class="mcti-q-num">QUESTION ${mctiStep+1} / ${MCTI_Q.length}</div><div class="mcti-q-text">${q.q}</div></div>`;
        html += '<div class="mcti-options">';
        const labels = ['A','B','C','D'];
        q.opts.forEach((opt,i) => {
          html += `<button class="mcti-opt" onclick="answerMCTI(${i})"><span class="opt-label">${labels[i]}</span>${opt.t}</button>`;
        });
        html += '</div>';
      }
      overlayBox.innerHTML = html;
    }

    window.answerMCTI = (choice) => {
      const q = MCTI_Q[mctiStep];
      const d = q.opts[choice].d;
      // 映射到四個主維度
      if(d==='B'||d==='S') mctiScores[d]++;
      else if(d==='R'||d==='D') mctiScores[d]++;
      else if(d==='C'||d==='M') mctiScores[d]++;
      else if(d==='L'||d==='H') mctiScores[d]++;
      mctiStep++;
      if(mctiStep>=MCTI_Q.length) renderMCTI(true);
      else renderMCTI(false);
    };
    window.resetMCTI = () => { mctiStep=0; mctiScores={B:0,S:0,R:0,D:0,C:0,M:0,L:0,H:0}; renderMCTI(false); };
    function initMCTI(){mctiStep=0;mctiScores={B:0,S:0,R:0,D:0,C:0,M:0,L:0,H:0};}

    // ═══ Game Result Helper ═══
    function showGameResult(emoji, val, text) {
      let html = '<div class="overlay-header"><span class="overlay-title" id="resultTitle"></span><button class="overlay-close" onclick="closeOverlay()">✕</button></div>';
      html += `<div class="game-result"><div class="game-result-emoji">${emoji}</div><div class="game-result-val">${val}</div><div class="game-result-text">${text}</div><div class="game-result-btns"><button class="btn btn-main" onclick="openGame('${currentGame}')">🔄 再玩一次</button><button class="btn btn-sub" onclick="closeOverlay()">關閉</button></div></div>`;
      overlayBox.innerHTML = html;
    }

    // ═══ Keyboard ═══
    document.addEventListener('keydown',(e)=>{
      if(e.key==='Escape'&&overlay.classList.contains('active'))closeOverlay();
    });

    // Init MCTI
    initMCTI();
  })();
  </script>
