<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找不到頁面 — 海風</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/img/logo.png">
  <meta name="theme-color" content="#060a14">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Noto Sans TC', system-ui, sans-serif;
      background: #060a14;
    }

    .scene {
      position: fixed;
      inset: 0;
    }

    /* ═══ Sky ═══ */
    .sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #050810 0%, #0a1225 25%, #0e1c38 50%, #0c1a30 100%);
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }

    /* Moon */
    .moon {
      position: absolute;
      top: 14%;
      right: 20%;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffce8, #f0d878, #c49a30);
      box-shadow: 0 0 30px 10px rgba(240, 216, 120, 0.1), 0 0 80px 30px rgba(240, 216, 120, 0.04);
    }

    /* ═══ Ocean ═══ */
    .ocean {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40%;
    }

    /* Water gradient body */
    .ocean-body {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(10, 18, 37, 0) 0%,
        rgba(8, 16, 32, 0.8) 15%,
        rgba(6, 14, 28, 0.95) 40%,
        #060e1c 100%
      );
    }

    /* SVG waves */
    .wave-svg {
      position: absolute;
      left: 0;
      width: 200%;
      pointer-events: none;
    }
    .wave-svg.w1 {
      top: 0%;
      height: 40%;
      animation: drift 16s linear infinite;
    }
    .wave-svg.w2 {
      top: 8%;
      height: 50%;
      animation: drift 22s linear infinite reverse;
    }
    .wave-svg.w3 {
      top: 18%;
      height: 60%;
      animation: drift 12s linear infinite;
    }
    .wave-svg.w4 {
      top: 30%;
      height: 70%;
      animation: drift 28s linear infinite reverse;
    }
    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* Horizon glow */
    .horizon {
      position: absolute;
      bottom: 38%;
      left: 0;
      right: 0;
      height: 40px;
      background: linear-gradient(180deg, transparent, rgba(87, 138, 255, 0.04), transparent);
      pointer-events: none;
    }

    /* Moon reflection */
    .reflection {
      position: absolute;
      bottom: 35%;
      right: calc(20% + 30px);
      width: 3px;
      background: linear-gradient(180deg, rgba(240, 216, 120, 0.2), rgba(240, 216, 120, 0.05), transparent);
      border-radius: 2px;
      filter: blur(2px);
      animation: refl 5s ease-in-out infinite alternate;
    }
    @keyframes refl {
      0% { height: 60px; opacity: 0.5; }
      100% { height: 100px; opacity: 0.2; }
    }

    /* ═══ Content ═══ */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      z-index: 10;
      text-align: center;
    }

    .code {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(6rem, 18vw, 11rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.06em;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(157,175,255,0.4) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.2rem;
    }

    .title {
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.18em;
      margin-bottom: 0.6rem;
    }

    .desc {
      font-size: clamp(0.8rem, 1.3vw, 0.9rem);
      color: rgba(255, 255, 255, 0.3);
      line-height: 2;
      max-width: 320px;
      margin: 0 auto 2rem;
      font-weight: 300;
    }

    .btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 11px 24px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      font-family: inherit;
      transition: all 0.25s ease;
    }
    .btn-main {
      background: rgba(87, 138, 255, 0.18);
      border: 1px solid rgba(87, 138, 255, 0.25);
      color: #b3c8ff;
    }
    .btn-main:hover {
      background: rgba(87, 138, 255, 0.3);
      border-color: rgba(87, 138, 255, 0.45);
      transform: translateY(-1px);
    }
    .btn-sub {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.4);
    }
    .btn-sub:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      transform: translateY(-1px);
    }

    /* ═══ Responsive ═══ */
    @media (max-width: 768px) {
      .moon { width: 44px; height: 44px; top: 10%; right: 12%; }
      .content { transform: translate(-50%, -50%); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="sky" id="sky"></div>
    <div class="moon"></div>
    <div class="reflection"></div>
    <div class="horizon"></div>
    <div class="ocean">
      <div class="ocean-body"></div>
      <svg class="wave-svg w1" viewBox="0 0 2880 120" preserveAspectRatio="none">
        <path d="M0,40 Q360,80 720,40 Q1080,0 1440,40 Q1800,80 2160,40 Q2520,0 2880,40 L2880,120 L0,120Z" fill="rgba(10,18,37,0.5)"/>
      </svg>
      <svg class="wave-svg w2" viewBox="0 0 2880 120" preserveAspectRatio="none">
        <path d="M0,60 Q480,20 960,60 Q1440,100 1920,60 Q2400,20 2880,60 L2880,120 L0,120Z" fill="rgba(8,16,32,0.6)"/>
      </svg>
      <svg class="wave-svg w3" viewBox="0 0 2880 120" preserveAspectRatio="none">
        <path d="M0,50 Q360,90 720,50 Q1080,10 1440,50 Q1800,90 2160,50 Q2520,10 2880,50 L2880,120 L0,120Z" fill="rgba(6,14,28,0.8)"/>
      </svg>
      <svg class="wave-svg w4" viewBox="0 0 2880 120" preserveAspectRatio="none">
        <path d="M0,70 Q480,40 960,70 Q1440,100 1920,70 Q2400,40 2880,70 L2880,120 L0,120Z" fill="#060e1c"/>
      </svg>
    </div>

    <div class="content">
      <div class="code">404</div>
      <h1 class="title">您已航向未知的海域</h1>
      <p class="desc">看來這片海域沒有陸地。<br>別擔心，讓風帶你回到正確的航線。</p>
      <div class="btns">
        <a href="首頁.html" class="btn btn-main">返回首頁</a>
        <a href="https://discord.gg/HdS2HrJEH7" target="_blank" class="btn btn-sub">加入社群</a>
      </div>
    </div>
  </div>

  <script>
    // Stars
    const sky = document.getElementById('sky');
    for (let i = 0; i < 100; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 55 + '%';
      const sz = 0.5 + Math.random() * 1.5;
      s.style.width = sz + 'px';
      s.style.height = sz + 'px';
      s.style.opacity = 0.15 + Math.random() * 0.6;
      sky.appendChild(s);
    }

    // Shooting star
    function shoot() {
      const s = document.createElement('div');
      s.style.cssText = 'position:absolute;width:80px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.7),transparent);border-radius:1px;z-index:2;';
      s.style.top = (5 + Math.random() * 25) + '%';
      s.style.left = (10 + Math.random() * 50) + '%';
      s.style.transform = 'rotate(' + (-20 - Math.random() * 30) + 'deg)';
      sky.appendChild(s);
      s.animate([
        { opacity: 0, transform: s.style.transform + ' translateX(0)' },
        { opacity: 1, offset: 0.1 },
        { opacity: 0, transform: s.style.transform + ' translateX(250px)' }
      ], { duration: 800, easing: 'ease-out' }).onfinish = () => s.remove();
    }
    setInterval(shoot, 4000 + Math.random() * 6000);
    setTimeout(shoot, 1500);
  </script>
</body>
</html>
