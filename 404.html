<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找不到頁面 — 海風</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/img/logo.png">
  <meta name="theme-color" content="#0d1117">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#0b1a2e;user-select:none}

    /* ═══ Ocean Scene ═══ */
    .scene{position:fixed;inset:0;overflow:hidden}

    /* Sky */
    .sky{position:absolute;inset:0;background:linear-gradient(180deg,#071018 0%,#0c1f35 25%,#123050 50%,#1a4070 75%,#2a6090 100%);transition:background 8s}
    .sky.sunset{background:linear-gradient(180deg,#1a0a20 0%,#4a1535 15%,#b84030 30%,#e88040 45%,#f0b060 55%,#f0d080 65%,#80b0d0 80%,#3070a0 100%)}
    .sky.night{background:linear-gradient(180deg,#050810 0%,#0a1225 30%,#0e1c38 60%,#0c1a30 100%)}
    .sky.rainy{background:linear-gradient(180deg,#0a0e14 0%,#141c28 30%,#1a2636 60%,#1e2e42 100%)}
    .sky.snowy{background:linear-gradient(180deg,#1a1e28 0%,#2a3040 30%,#3a4256 60%,#4a5468 100%)}

    /* Stars */
    .star{position:absolute;background:#fff;border-radius:50%;opacity:0;transition:opacity 4s}
    .sky.night .star,.sky.snowy .star{opacity:0.6}

    /* Sun / Moon */
    .celestial{position:absolute;width:60px;height:60px;border-radius:50%;transition:all 8s ease-in-out}
    .sun{background:radial-gradient(circle at 35% 35%,#fff8e0,#f0c848,#e09020);box-shadow:0 0 40px 12px rgba(240,180,60,0.2),0 0 100px 40px rgba(240,180,60,0.06);top:15%;right:22%}
    .moon{background:radial-gradient(circle at 35% 35%,#fffce8,#e8e0c8,#c0b890);box-shadow:0 0 30px 10px rgba(220,210,180,0.12);top:12%;right:20%;opacity:0}
    .sky.night .sun,.sky.rainy .sun,.sky.snowy .sun{opacity:0;transform:translateY(40px)}
    .sky.night .moon{opacity:1}

    /* Clouds */
    .cloud{position:absolute;background:rgba(255,255,255,0.06);border-radius:100px;filter:blur(2px);transition:background 4s,filter 4s}
    .cloud.c1{width:200px;height:30px;top:18%;left:10%;animation:drift-cloud 40s linear infinite}
    .cloud.c2{width:140px;height:22px;top:25%;left:60%;animation:drift-cloud 55s linear infinite reverse}
    .cloud.c3{width:180px;height:26px;top:12%;left:35%;animation:drift-cloud 48s linear infinite 10s}
    .sky.rainy .cloud,.sky.snowy .cloud{background:rgba(200,210,220,0.15);filter:blur(1px)}
    @keyframes drift-cloud{from{transform:translateX(-300px)}to{transform:translateX(calc(100vw + 300px))}}

    /* Horizon */
    .horizon{position:absolute;bottom:42%;left:0;right:0;height:60px;background:linear-gradient(180deg,transparent,rgba(100,160,220,0.06),transparent);pointer-events:none}

    /* ═══ Ocean ═══ */
    .ocean{position:absolute;bottom:0;left:0;right:0;height:45%}
    .ocean-body{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,26,46,0)0%,rgba(8,20,38,0.85)15%,rgba(6,16,32,0.95)40%,#060e1c 100%);transition:background 4s}
    .sky.snowy .ocean-body{background:linear-gradient(180deg,rgba(20,30,50,0)0%,rgba(30,42,60,0.85)15%,rgba(40,52,72,0.95)40%,#2a3648 100%)}
    .ocean-surface{position:absolute;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(100,160,220,0.08),transparent);pointer-events:none}

    /* Waves */
    .wave{position:absolute;left:0;width:200%;pointer-events:none;transition:opacity 3s}
    .wave svg{width:100%;height:100%;display:block}
    .w1{top:0;height:50px;animation:wave-move 8s linear infinite}
    .w2{top:6px;height:60px;animation:wave-move 11s linear infinite reverse;opacity:0.7}
    .w3{top:14px;height:70px;animation:wave-move 6s linear infinite;opacity:0.5}
    .w4{top:24px;height:80px;animation:wave-move 14s linear infinite reverse;opacity:0.3}
    .sky.rainy .w1{animation-duration:5s}
    .sky.rainy .w2{animation-duration:7s}
    .sky.snowy .wave{opacity:0.4}
    @keyframes wave-move{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* Ice overlay for snowy */
    .ice-overlay{position:absolute;bottom:43%;left:0;right:0;height:6px;background:linear-gradient(180deg,rgba(180,210,240,0.3),rgba(200,225,245,0.15),transparent);opacity:0;transition:opacity 4s;pointer-events:none;z-index:6}
    .sky.snowy .ice-overlay{opacity:1}

    /* ═══ Weather Particles ═══ */
    .weather-layer{position:absolute;inset:0;pointer-events:none;z-index:8;overflow:hidden}
    .raindrop{position:absolute;width:1.5px;background:linear-gradient(to bottom,transparent,rgba(174,194,224,0.5));border-radius:0 0 1px 1px;animation:rain-fall linear infinite;opacity:0}
    .sky.rainy .raindrop{opacity:1}
    @keyframes rain-fall{
      0%{transform:translateY(-20px) rotate(15deg);opacity:0}
      10%{opacity:0.7}
      90%{opacity:0.5}
      100%{transform:translateY(100vh) rotate(15deg);opacity:0}
    }
    .snowflake{position:absolute;background:radial-gradient(circle,rgba(255,255,255,0.9),rgba(220,230,245,0.5));border-radius:50%;animation:snow-fall linear infinite;opacity:0}
    .sky.snowy .snowflake{opacity:1}
    @keyframes snow-fall{
      0%{transform:translateY(-10px) translateX(0);opacity:0}
      10%{opacity:0.8}
      50%{transform:translateY(50vh) translateX(20px)}
      90%{opacity:0.6}
      100%{transform:translateY(100vh) translateX(-10px);opacity:0}
    }

    /* ═══ Ships ═══ */
    .ship{position:absolute;z-index:7;transition:all 2s ease;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
    .ship.boat{font-size:2.8rem;animation:sail-boat 20s ease-in-out infinite;bottom:40%}
    .ship.icebreaker{font-size:3rem;animation:sail-ice 25s ease-in-out infinite;bottom:41%;opacity:0}
    .sky.rainy .ship.boat{opacity:1}
    .sky.rainy .ship.icebreaker{opacity:0}
    .sky.snowy .ship.boat{opacity:0}
    .sky.snowy .ship.icebreaker{opacity:1}
    .sky.night .ship,.sky.sunset .ship{opacity:0.7}
    @keyframes sail-boat{
      0%{left:-8%;transform:scaleX(1) translateY(0)}
      15%{transform:scaleX(1) translateY(-4px)}
      30%{transform:scaleX(1) translateY(2px)}
      50%{left:50%;transform:scaleX(1) translateY(-3px)}
      65%{transform:scaleX(1) translateY(1px)}
      80%{transform:scaleX(1) translateY(-5px)}
      100%{left:108%;transform:scaleX(1) translateY(0)}
    }
    @keyframes sail-ice{
      0%{left:-10%;transform:scaleX(1) translateY(0)}
      20%{transform:scaleX(1) translateY(-3px)}
      40%{transform:scaleX(1) translateY(1px)}
      60%{left:55%;transform:scaleX(1) translateY(-2px)}
      80%{transform:scaleX(1) translateY(2px)}
      100%{left:110%;transform:scaleX(1) translateY(0)}
    }

    /* Ship wake */
    .ship-wake{position:absolute;bottom:0;left:0;right:0;height:45%;pointer-events:none;z-index:6;overflow:hidden}
    .wake-line{position:absolute;height:1px;background:rgba(255,255,255,0.04);animation:wake-spread 3s ease-out infinite;opacity:0}
    .sky.rainy .wake-line,.sky.snowy .wake-line{opacity:1}
    @keyframes wake-spread{
      0%{width:0;opacity:0.15}
      50%{opacity:0.08}
      100%{width:200px;opacity:0}
    }

    /* ═══ Floating Trash ═══ */
    .trash{position:absolute;font-size:1.4rem;pointer-events:cursor;z-index:5;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));user-select:none;transition:transform 0.3s,opacity 0.5s}
    .trash.floating{animation:float-trash linear infinite}
    .trash.collected{animation:collect-pop 0.5s ease-out forwards !important;pointer-events:none}
    @keyframes float-trash{
      0%{transform:translateY(0)rotate(0deg)}
      25%{transform:translateY(-4px)rotate(2deg)}
      50%{transform:translateY(0)rotate(0deg)}
      75%{transform:translateY(4px)rotate(-2deg)}
      100%{transform:translateY(0)rotate(0deg)}
    }
    @keyframes collect-pop{
      0%{transform:scale(1);opacity:1}
      40%{transform:scale(1.6)translateY(-20px);opacity:0.9}
      100%{transform:scale(0)translateY(-40px);opacity:0}
    }

    /* Sea creature */
    .creature{position:absolute;z-index:4;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3))}
    .creature.turtle{font-size:2rem;animation:swim-turtle 18s ease-in-out infinite}
    .creature.fish{font-size:1.2rem;animation:swim-fish 12s linear infinite}
    @keyframes swim-turtle{
      0%{bottom:28%;left:10%;transform:scaleX(1)}
      40%{bottom:32%;left:70%;transform:scaleX(1)}
      50%{bottom:30%;left:75%;transform:scaleX(-1)}
      90%{bottom:26%;left:15%;transform:scaleX(-1)}
      100%{bottom:28%;left:10%;transform:scaleX(1)}
    }
    @keyframes swim-fish{
      0%{bottom:20%;left:-5%;transform:scaleX(1)}
      50%{bottom:25%;left:105%;transform:scaleX(1)}
      50.1%{bottom:22%;left:105%;transform:scaleX(-1)}
      100%{bottom:18%;left:-5%;transform:scaleX(-1)}
    }

    /* Cat on waves */
    .cat-float{position:absolute;z-index:5;bottom:38%;left:50%;transform:translateX(-50%);animation:cat-bob 3s ease-in-out infinite;pointer-events:none;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4))}
    @keyframes cat-bob{
      0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}
      25%{transform:translateX(-50%) translateY(-6px) rotate(1.5deg)}
      50%{transform:translateX(-50%) translateY(2px) rotate(-0.5deg)}
      75%{transform:translateX(-50%) translateY(-3px) rotate(1deg)}
    }
    .cat-glow{filter:drop-shadow(0 0 3px rgba(94,234,212,0.5))}

    /* Bubbles */
    .bubble{position:absolute;border-radius:50%;background:rgba(150,200,255,0.08);border:1px solid rgba(150,200,255,0.12);pointer-events:none;z-index:3;animation:rise-bubble linear infinite}
    @keyframes rise-bubble{
      0%{transform:translateY(0)scale(1);opacity:0.6}
      50%{transform:translateY(-80px)scale(1.1);opacity:0.4}
      100%{transform:translateY(-160px)scale(0.8);opacity:0}
    }

    /* ═══ Content ═══ */
    .content{position:absolute;top:16%;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:90%;max-width:520px}
    .code{font-family:'Noto Serif TC',serif;font-size:clamp(4rem,14vw,8rem);font-weight:700;line-height:1;letter-spacing:0.06em;background:linear-gradient(180deg,rgba(255,255,255,0.85)0%,rgba(100,180,240,0.4)100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.3rem}
    .title{font-size:clamp(0.9rem,2vw,1.2rem);font-weight:600;color:rgba(255,255,255,0.8);letter-spacing:0.15em;margin-bottom:0.3rem}
    .desc{font-size:clamp(0.75rem,1.1vw,0.85rem);color:rgba(255,255,255,0.35);line-height:2;max-width:320px;margin:0 auto 0.8rem;font-weight:300}
    .weather-msg{font-size:0.78rem;color:rgba(255,255,255,0.3);margin-bottom:0.6rem;transition:all 0.5s;min-height:1.2em}

    .btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:0.8rem}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;font-size:0.8rem;font-weight:600;text-decoration:none;font-family:inherit;transition:all 0.25s ease;cursor:pointer;border:none}
    .btn-main{background:rgba(87,138,255,0.18);border:1px solid rgba(87,138,255,0.25);color:#b3c8ff}
    .btn-main:hover{background:rgba(87,138,255,0.3);border-color:rgba(87,138,255,0.45);transform:translateY(-1px)}
    .btn-sub{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
    .btn-sub:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);transform:translateY(-1px)}

    /* ═══ Game Bar (bottom) ═══ */
    .game-bar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:90vw}
    .game-tab{padding:7px 13px;border-radius:20px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.1);color:rgba(255,255,255,0.4);font-size:0.72rem;cursor:pointer;font-family:inherit;transition:all 0.2s ease;white-space:nowrap}
    .game-tab:hover,.game-tab.active{background:rgba(157,175,255,0.15);border-color:rgba(157,175,255,0.25);color:#b3c8ff}

    /* ═══ Overlay (all games/quizzes use this) ═══ */
    .overlay{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:rgba(6,10,18,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
    .overlay.active{display:flex;animation:overlay-in 0.25s ease-out}
    @keyframes overlay-in{from{opacity:0}to{opacity:1}}
    .overlay-box{background:rgba(12,18,30,0.95);border:1px solid rgba(157,175,255,0.1);border-radius:16px;padding:24px;max-width:440px;width:90%;max-height:85vh;overflow-y:auto;animation:box-in 0.3s ease-out}
    @keyframes box-in{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
    .overlay-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .overlay-title{font-size:1rem;font-weight:700;color:rgba(255,255,255,0.85)}
    .overlay-close{background:none;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.35);font-size:1rem;cursor:pointer;padding:4px 10px;transition:all 0.2s;font-family:inherit}
    .overlay-close:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6)}

    /* ═══ MCTI Quiz ═══ */
    .mcti-badge{padding:3px 10px;background:linear-gradient(135deg,rgba(171,114,249,0.2),rgba(87,138,255,0.15));border:1px solid rgba(171,114,249,0.25);border-radius:6px;font-size:0.65rem;font-weight:800;color:#c49dff;letter-spacing:0.1em;margin-right:8px}
    .mcti-progress{height:3px;background:rgba(171,114,249,0.08);border-radius:2px;margin-bottom:16px;overflow:hidden}
    .mcti-bar{height:100%;width:0%;background:linear-gradient(90deg,#ab72f9,#9dafff);border-radius:2px;transition:width 0.4s ease}
    .mcti-question{font-size:0.95rem;color:rgba(255,255,255,0.85);font-weight:500;line-height:1.7;margin-bottom:12px;min-height:2.5em}
    .mcti-options{display:flex;flex-direction:column;gap:7px}
    .mcti-opt{padding:11px 14px;background:rgba(157,175,255,0.04);border:1px solid rgba(157,175,255,0.1);border-radius:10px;font-size:0.85rem;color:rgba(255,255,255,0.6);cursor:pointer;font-family:inherit;text-align:left;transition:all 0.2s ease;line-height:1.6}
    .mcti-opt:hover{background:rgba(171,114,249,0.1);border-color:rgba(171,114,249,0.25);color:rgba(255,255,255,0.85);transform:translateX(4px)}
    .mcti-opt .opt-label{font-size:0.65rem;color:rgba(171,114,249,0.5);font-weight:600;margin-right:6px}

    /* MCTI Result */
    .mcti-r-emoji{font-size:3rem;margin-bottom:6px}
    .mcti-r-code{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#c49dff,#9dafff,#a8e6cf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.08em;margin-bottom:4px}
    .mcti-r-name{font-size:1.05rem;color:rgba(255,255,255,0.85);font-weight:700;margin-bottom:8px}
    .mcti-r-desc{font-size:0.82rem;color:rgba(255,255,255,0.45);line-height:1.8;margin-bottom:12px}
    .mcti-r-bars{margin-bottom:12px}
    .mcti-bar-row{margin-bottom:8px}
    .mcti-bar-label{font-size:0.68rem;color:rgba(255,255,255,0.3);margin-bottom:3px;text-align:center}
    .mcti-bar-track{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
    .mcti-bar-fill-a{height:100%;background:linear-gradient(90deg,rgba(171,114,249,0.6),rgba(157,175,255,0.6));border-radius:3px;transition:width 0.6s ease}
    .mcti-bar-pcts{display:flex;justify-content:space-between;font-size:0.65rem;color:rgba(255,255,255,0.35);margin-top:2px}
    .mcti-r-tags{display:flex;justify-content:center;gap:5px;flex-wrap:wrap;margin-bottom:14px}
    .mcti-r-tag{padding:3px 9px;background:rgba(171,114,249,0.08);border:1px solid rgba(171,114,249,0.12);border-radius:100px;font-size:0.68rem;color:rgba(171,114,249,0.7)}
    .mcti-r-actions{display:flex;gap:8px;justify-content:center}

    /* ═══ Memory Game ═══ */
    .mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px;background:rgba(6,14,28,0.5);border-radius:12px;border:1px solid rgba(157,175,255,0.08)}
    .mem-card{aspect-ratio:1;border-radius:8px;cursor:pointer;background:rgba(157,175,255,0.08);border:1px solid rgba(157,175,255,0.12);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:all 0.25s;position:relative;overflow:hidden}
    .mem-card:hover{background:rgba(157,175,255,0.15)}
    .mem-card .front,.mem-card .back{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:transform 0.3s,opacity 0.3s}
    .mem-card .front{transform:rotateY(90deg);opacity:0}
    .mem-card .back{color:rgba(157,175,255,0.25);font-size:0.9rem}
    .mem-card.flipped .front{transform:rotateY(0);opacity:1}
    .mem-card.flipped .back{transform:rotateY(-90deg);opacity:0}
    .mem-card.matched{background:rgba(168,230,207,0.12);border-color:rgba(168,230,207,0.25);pointer-events:none}

    /* ═══ Click Speed ═══ */
    .click-zone{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;background:rgba(6,14,28,0.5);border-radius:12px;border:1px solid rgba(157,175,255,0.08)}
    .click-target{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(168,230,207,0.2),rgba(168,230,207,0.06));border:2px solid rgba(168,230,207,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.8rem;transition:all 0.1s;user-select:none}
    .click-target:active{transform:scale(0.9)}
    .click-label{font-size:0.72rem;color:rgba(255,255,255,0.3)}

    /* ═══ Reaction Time ═══ */
    .react-zone{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;border-radius:12px;min-height:160px;justify-content:center;cursor:pointer;transition:background 0.2s;border:1px solid rgba(157,175,255,0.08)}
    .react-zone.wait{background:rgba(255,80,80,0.08)}
    .react-zone.go{background:rgba(168,230,207,0.15);border-color:rgba(168,230,207,0.3)}
    .react-zone.result{background:rgba(157,175,255,0.08)}
    .react-text{font-size:1rem;color:rgba(255,255,255,0.7);font-weight:600}
    .react-ms{font-size:2rem;font-weight:800;color:#a8e6cf}

    /* ═══ Tic Tac Toe ═══ */
    .ttt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:200px;margin:0 auto}
    .ttt-cell{aspect-ratio:1;border-radius:8px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.1);display:flex;align-items:center;justify-content:center;font-size:1.8rem;cursor:pointer;transition:all 0.2s;font-weight:700}
    .ttt-cell:hover{background:rgba(157,175,255,0.12)}
    .ttt-cell.x{color:#9dafff}
    .ttt-cell.o{color:#ff8282}
    .ttt-status{text-align:center;font-size:0.82rem;color:rgba(255,255,255,0.5);margin-top:10px}
    .ttt-reset{display:block;margin:8px auto 0;padding:6px 16px;background:none;border:1px solid rgba(157,175,255,0.15);border-radius:6px;color:rgba(255,255,255,0.4);font-size:0.75rem;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .ttt-reset:hover{border-color:rgba(157,175,255,0.3);color:#b3c8ff}

    /* ═══ Number Memory ═══ */
    .num-mem{text-align:center}
    .num-display{font-size:2.5rem;font-weight:800;color:#9dafff;letter-spacing:0.15em;margin:16px 0;min-height:3rem;font-family:'JetBrains Mono',monospace}
    .num-input{width:180px;padding:10px 14px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.15);border-radius:10px;color:rgba(255,255,255,0.8);font-size:1.2rem;text-align:center;font-family:'JetBrains Mono',monospace;outline:none;letter-spacing:0.1em}
    .num-input:focus{border-color:rgba(157,175,255,0.3)}
    .num-label{font-size:0.75rem;color:rgba(255,255,255,0.35);margin-bottom:8px}
    .num-level{font-size:0.72rem;color:rgba(157,175,255,0.5);margin-top:8px}

    /* ═══ Snake ═══ */
    .snake-wrap{text-align:center}
    .snake-canvas{display:block;margin:0 auto;border-radius:8px;border:1px solid rgba(157,175,255,0.12);image-rendering:pixelated}
    .snake-controls{display:flex;justify-content:center;gap:6px;margin-top:10px}
    .snake-ctrl{width:40px;height:40px;border-radius:8px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.12);color:rgba(255,255,255,0.5);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none;-webkit-user-select:none}
    .snake-ctrl:active{background:rgba(157,175,255,0.2);transform:scale(0.92)}
    .snake-ctrl-row{display:flex;justify-content:center;gap:6px}

    /* ═══ Whack-a-Mole ═══ */
    .mole-wrap{text-align:center}
    .mole-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:260px;margin:0 auto}
    .mole-hole{aspect-ratio:1;border-radius:50%;background:rgba(30,20,10,0.6);border:2px solid rgba(100,70,30,0.3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;cursor:pointer;transition:all 0.1s;position:relative;overflow:hidden}
    .mole-hole:active{transform:scale(0.9)}
    .mole-hole .mob{animation:mole-pop 0.15s ease-out}
    @keyframes mole-pop{from{transform:scale(0) translateY(20px)}to{transform:scale(1) translateY(0)}}
    .mole-hole .bonked{animation:bonk 0.3s ease-out forwards}
    @keyframes bonk{0%{transform:scale(1)}30%{transform:scale(1.3) rotate(-15deg)}100%{transform:scale(0) translateY(10px);opacity:0}}

    /* Game HUD */
    .game-hud{display:flex;justify-content:space-between;align-items:center;padding:8px 0;margin-bottom:12px;font-size:0.78rem;color:rgba(255,255,255,0.4)}
    .game-hud-val{color:#a8e6cf;font-weight:700;font-variant-numeric:tabular-nums}

    /* Result */
    .game-result{text-align:center;padding:16px 0}
    .game-result-emoji{font-size:2rem;margin-bottom:6px}
    .game-result-val{font-size:1.6rem;font-weight:800;color:#a8e6cf;margin-bottom:4px}
    .game-result-text{font-size:0.82rem;color:rgba(255,255,255,0.4);margin-bottom:12px}
    .game-result-btns{display:flex;gap:8px;justify-content:center}

    /* Eco HUD */
    .eco-hud{display:inline-flex;align-items:center;gap:10px;padding:6px 16px;background:rgba(13,17,23,0.7);backdrop-filter:blur(10px);border:1px solid rgba(168,230,207,0.15);border-radius:100px;font-size:0.78rem;color:rgba(255,255,255,0.5);margin-bottom:0.6rem;opacity:0;transition:opacity 0.5s}
    .eco-hud.visible{opacity:1}
    .eco-score{color:#a8e6cf;font-weight:700}

    /* Timer */
    .timer{font-size:1.5rem;font-weight:800;color:rgba(255,255,255,0.7);font-variant-numeric:tabular-nums;text-align:center;margin:8px 0}

    @media(max-width:768px){
      .celestial{width:40px;height:40px}
      .sun{top:12%;right:15%}
      .moon{top:10%;right:13%}
      .content{top:12%}
      .code{font-size:3.5rem}
      .mem-grid{gap:3px;padding:5px}
      .mem-card{font-size:1rem}
      .game-tab{padding:6px 9px;font-size:0.68rem}
      .ttt-grid{width:160px}
      .ttt-cell{font-size:1.4rem}
      .game-bar{bottom:10px}
    }
    @media(max-width:375px){
      .content{top:8%}
      .code{font-size:3rem}
      .title{font-size:0.85rem}
    }
  </style>
</head>

  <script>
  (() => {
    'use strict';

    const TRASH = ['🧴','🥤','🛍️','📦','🥫','🪣','🧃','🫙','🧋','🍶','🥡','🛒','🎈','🪥'];
    const SEA = ['🐙','🦑','🦐','🐡','🐠','🐟','🐬','🦀','🐚'];

    // ═══ Weather System ═══
    // States: sunset → night → rainy → snowy → sunset → ...
    const sky = document.getElementById('sky');
    const weatherMsg = document.getElementById('weatherMsg');
    const weatherLayer = document.getElementById('weatherLayer');
    const weathers = ['sunset','night','rainy','snowy'];
    const weatherLabels = {
      sunset: '☀️ 晴空萬里，適合出海',
      night: '🌙 月色如水，海面寧靜',
      rainy: '🌧️ 狂風暴雨，注意航線',
      snowy: '❄️ 瑞雪紛飛，破冰前行'
    };
    let weatherIdx = 0;

    function setWeather(w) {
      sky.className = 'sky ' + w;
      weatherMsg.textContent = weatherLabels[w] || '';
      spawnWeatherParticles(w);
    }

    function cycleWeather() {
      weatherIdx = (weatherIdx + 1) % weathers.length;
      setWeather(weathers[weatherIdx]);
    }

    // Init
    setTimeout(() => {
      sky.style.transition = 'background 6s';
      setWeather('night');
      setInterval(cycleWeather, 18000);
    }, 3000);

    // ═══ Weather Particles ═══
    function spawnWeatherParticles(type) {
      weatherLayer.innerHTML = '';
      const isMobile = window.innerWidth < 768;
      if (type === 'rainy') {
        const count = isMobile ? 40 : 80;
        for (let i = 0; i < count; i++) {
          const d = document.createElement('div');
          d.className = 'raindrop';
          d.style.left = Math.random() * 100 + '%';
          d.style.height = (12 + Math.random() * 16) + 'px';
          d.style.animationDuration = (0.4 + Math.random() * 0.4) + 's';
          d.style.animationDelay = (Math.random() * 2) + 's';
          weatherLayer.appendChild(d);
        }
      } else if (type === 'snowy') {
        const count = isMobile ? 25 : 50;
        for (let i = 0; i < count; i++) {
          const f = document.createElement('div');
          f.className = 'snowflake';
          const size = 2 + Math.random() * 4;
          f.style.width = size + 'px';
          f.style.height = size + 'px';
          f.style.left = Math.random() * 100 + '%';
          f.style.animationDuration = (4 + Math.random() * 6) + 's';
          f.style.animationDelay = (Math.random() * 5) + 's';
          weatherLayer.appendChild(f);
        }
      }
    }

    // ═══ Stars ═══
    const skyEl = document.getElementById('sky');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random()*100+'%';
      s.style.top = Math.random()*50+'%';
      const sz = 0.5+Math.random()*1.5;
      s.style.width = sz+'px'; s.style.height = sz+'px';
      skyEl.appendChild(s);
    }

    // ═══ Bubbles ═══
    const bubbleContainer = document.getElementById('bubbles');
    function spawnBubble() {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 4+Math.random()*12;
      b.style.width = size+'px'; b.style.height = size+'px';
      b.style.left = (10+Math.random()*80)+'%';
      b.style.bottom = (5+Math.random()*30)+'%';
      b.style.animationDuration = (4+Math.random()*6)+'s';
      bubbleContainer.appendChild(b);
      setTimeout(() => b.remove(), 10000);
    }
    setInterval(spawnBubble, 1000);

    // ═══ Trash System ═══
    const trashField = document.getElementById('trashField');
    let trashCount = 0, cleanupActive = false;

    function spawnTrash() {
      if (!cleanupActive) return;
      const t = document.createElement('div');
      t.className = 'trash floating';
      t.textContent = TRASH[Math.floor(Math.random()*TRASH.length)];
      t.style.top = (55 + Math.random()*15) + '%';
      t.style.left = (5+Math.random()*90) + '%';
      t.style.animationDuration = (3+Math.random()*4)+'s';
      t.style.fontSize = (1+Math.random()*0.8)+'rem';
      t.addEventListener('click', () => {
        if (t.classList.contains('collected')) return;
        t.classList.add('collected');
        trashCount++;
        document.getElementById('ecoScore').textContent = trashCount;
        setTimeout(() => t.remove(), 500);
      });
      trashField.appendChild(t);
      setTimeout(() => { if (!t.classList.contains('collected')) t.remove(); }, 15000+Math.random()*10000);
    }

    window.startCleanup = () => {
      cleanupActive = true; trashCount = 0;
      document.getElementById('ecoScore').textContent = '0';
      document.getElementById('ecoHud').classList.add('visible');
      document.getElementById('cleanBtn').textContent = '🧹 淨灘中...';
      trashField.innerHTML = '';
      for (let i = 0; i < 6; i++) setTimeout(spawnTrash, i*300);
      const iv = setInterval(() => {
        if (!cleanupActive) { clearInterval(iv); return; }
        if (trashField.querySelectorAll('.trash:not(.collected)').length < 8) spawnTrash();
      }, 2000);
    };

    // ═══ Unified Overlay ═══
    const overlay = document.getElementById('overlay');
    const overlayBox = document.getElementById('overlayBox');
    let currentGame = null;

    window.openGame = (type) => {
      currentGame = type;
      document.querySelectorAll('.game-tab').forEach(t => t.classList.toggle('active', t.textContent.includes(getTabLabel(type))));
      if (type === 'mcti') { initMCTI(); renderMCTI(); }
      else if (type === 'memory') renderMemory();
      else if (type === 'click') renderClick();
      else if (type === 'react') renderReact();
      else if (type === 'ttt') renderTTT();
      else if (type === 'nummem') renderNumMem();
      else if (type === 'snake') renderSnake();
      else if (type === 'mole') renderMole();
      overlay.classList.add('active');
    };

    window.closeOverlay = () => {
      overlay.classList.remove('active');
      document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
      clearInterval(gameTimer);
      currentGame = null;
    };

    function getTabLabel(t) {
      return {mcti:'MCTI',memory:'翻牌',click:'點速',react:'反應',ttt:'井字',nummem:'記數',snake:'貪吃蛇',mole:'打苦力怕'}[t]||'';
    }

    let gameTimer = null, gameScore = 0, gameTime = 0;

    // ═══ MCTI ═══
    const MCTI_Q = [
      { q:'進入新的世界，你第一件事會？', a:['開始蓋一個漂亮的家','衝出去探險，管他三七二十一'], dim:'BS' },
      { q:'你在伺服器最常做的事是？', a:['研究紅石電路、搞自動化農場','到處挖礦、找遺跡和寶藏'], dim:'RD' },
      { q:'你蓋東西最注重的是？', a:['配色、氛圍、讓人驚艷','功能、效率、方便使用'], dim:'CM' },
      { q:'你覺得最好玩的時刻是？', a:['和朋友一起搞事、一起蓋','一個人安靜地享受世界'], dim:'LH' },
      { q:'朋友蓋了一棟歪七扭八的房子，你會？', a:['忍不住幫他重新設計','誇他有創意然後默默走開'], dim:'BS' },
      { q:'你更嚮往哪種生活？', a:['住在充滿機關的紅石堡壘','背包一背，說走就走的冒險'], dim:'RD' },
      { q:'伺服器辦建築比賽，你會？', a:['馬上報名，終於能大展身手','先看看獎勵值不值得參加'], dim:'CM' },
      { q:'在海風伺服器你最自在的時刻是？', a:['在群組跟大家一起聊天哈啦','在自己領地裡慢慢經營'], dim:'LH' },
      { q:'你有三天假期，你會在遊戲裡？', dim:'BS', a0:'蓋一個夢想中的建築', a1:'探索一個從沒去過的地方' },
      { q:'你更享受哪種成就感？', dim:'RD', a0:'做出一台超複雜的紅石裝置', a1:'找到稀有礦石或裝備' },
      { q:'伺服器有新功能開放，你會？', dim:'CM', a0:'想辦法用它做出好看的東西', a1:'研究它的效率最大化用法' },
      { q:'有人在伺服器遇到困難，你會？', dim:'LH', a0:'馬上過去幫忙', a1:'告訴他方法，讓他自己解決' },
      { q:'你理想中的基地是？', dim:'BS', a0:'一座精心設計的城堡或莊園', a1:'一個功能齊全的地下避難所' },
      { q:'你對「最強裝備」的定義是？', dim:'RD', a0:'全套附魔 IV+ 的頂級裝備', a1:'夠用就好，重點是玩得開心' },
      { q:'你蓋了一座農場，你最開心的是？', dim:'CM', a0:'它看起來很美很療癒', a1:'它全自動、效率超高' }
    ];
    const MCTI_TYPES = {
      'BRCL':{emoji:'🏗️',name:'建築高手',desc:'你的作品總讓人驚嘆。別人蓋火柴盒的時候，你已經在規劃一座城市了。伺服器地標十有八九出自你手。',tags:['建築×紅石×美感×獨行']},

        const qText = q.q;

        html += `<div class="mcti-question">Q${mctiStep+1}. ${qText}</div><div class="mcti-options">`;

    window.answerMCTI = (choice) => {

      else if(dim==='LH')choice===0?mctiScores.H++:mctiScores.L++;

    // ═══ Memory Game ═══
    function renderMemory() {

      let flipped=[], matched=0, locked=false, timeLeft=60;
      window.flipCard = (card) => {
        if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
        card.classList.add('flipped'); flipped.push(card);
        if(flipped.length===2){
          locked=true;
          const[a,b]=flipped;
          if(a.dataset.emoji===b.dataset.emoji){
            a.classList.add('matched');b.classList.add('matched');matched++;
            document.getElementById('memPairs').textContent=matched;
            flipped=[];locked=false;
            if(matched===8){clearInterval(gameTimer);showGameResult('🧠','完成！',timeLeft+'s剩餘');}
          } else {
            setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];locked=false;},600);
          }
        }
      };
      gameTimer = setInterval(()=>{
        timeLeft--;
        const el=document.getElementById('memTime');if(el)el.textContent=timeLeft;
        if(timeLeft<=0){clearInterval(gameTimer);showGameResult('🃏','時間到！',matched+'/8 配對');}
      },1000);
    }

    // ═══ Reaction Time ═══
    function renderReact() {
      clearInterval(gameTimer);
      let html = '<div class="overlay-header"><span class="overlay-title">⏱️ 反應測試</span><button class="overlay-close" onclick="closeOverlay()">✕</button></div>';
      html += '<div class="react-zone wait" id="reactZone" onclick="reactClick()"><div class="react-text" id="reactText">點擊開始</div></div>';
      overlayBox.innerHTML = html;
      let phase='idle', startTime=0, results=[];
      window.reactClick = () => {
        const zone=document.getElementById('reactZone');
        const text=document.getElementById('reactText');
        if(phase==='idle'){
          phase='waiting';zone.className='react-zone wait';text.textContent='等待綠色...';
          const delay=1500+Math.random()*3000;
          setTimeout(()=>{
            if(phase!=='waiting')return;
            phase='go';zone.className='react-zone go';text.textContent='點！';
            startTime=Date.now();
          },delay);
        } else if(phase==='waiting'){
          phase='idle';zone.className='react-zone result';text.innerHTML='<span style="color:#ff8282">太早了！</span><br><small style="color:rgba(255,255,255,0.3)">點擊重試</small>';
        } else if(phase==='go'){
          const ms=Date.now()-startTime;results.push(ms);
          const avg=Math.round(results.reduce((a,b)=>a+b,0)/results.length);
          const best=Math.min(...results);
          let emoji=ms<200?'⚡':ms<300?'💨':'🖱️';
          phase='result';zone.className='react-zone result';
          text.innerHTML=`<div class="react-ms">${ms}ms</div><div style="font-size:0.72rem;color:rgba(255,255,255,0.3);margin-top:6px">平均 ${avg}ms · 最快 ${best}ms · 第${results.length}次</div><div style="font-size:0.7rem;color:rgba(255,255,255,0.2);margin-top:8px">點擊繼續</div>`;
          setTimeout(()=>{phase='idle';},300);
        } else if(phase==='result'){
          phase='idle';renderReact();
        }
      };
    }

    // ═══ Tic Tac Toe ═══
    function renderTTT() {
      let board=Array(9).fill(null), turn='x', over=false;
      const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      let html = '<div class="overlay-header"><span class="overlay-title">⭕ 井字棋</span><button class="overlay-close" onclick="closeOverlay()">✕</button></div>';
      html += '<div class="ttt-grid" id="tttGrid">';
      for(let i=0;i<9;i++) html+=`<div class="ttt-cell" data-i="${i}" onclick="tttClick(this)"></div>`;
      html += '</div><div class="ttt-status" id="tttStatus">你的回合（X）</div><button class="ttt-reset" onclick="renderTTT()">重新開始</button>';
      overlayBox.innerHTML = html;

      window.tttClick = (cell) => {
        const i=+cell.dataset.i;
        if(board[i]||over)return;
        board[i]='x';cell.textContent='✕';cell.classList.add('x');
        if(checkWin('x')){over=true;document.getElementById('tttStatus').textContent='🎉 你贏了！';return;}
        if(board.every(c=>c)){over=true;document.getElementById('tttStatus').textContent='平手！';return;}
        document.getElementById('tttStatus').textContent='電腦思考中...';
        setTimeout(()=>{
          const empty=board.map((v,i)=>v?null:i).filter(v=>v!==null);
          if(!empty.length)return;
          // Simple AI: win > block > center > random
          let move=-1;
          for(const w of wins){const vals=w.map(i=>board[i]);if(vals.filter(v=>v==='o').length===2&&vals.includes(null)){move=w[vals.indexOf(null)];break;}}
          if(move<0)for(const w of wins){const vals=w.map(i=>board[i]);if(vals.filter(v=>v==='x').length===2&&vals.includes(null)){move=w[vals.indexOf(null)];break;}}
          if(move<0&&!board[4])move=4;
          if(move<0)move=empty[Math.floor(Math.random()*empty.length)];
          board[move]='o';
          const cells=document.querySelectorAll('.ttt-cell');
          cells[move].textContent='O';cells[move].classList.add('o');
          if(checkWin('o')){over=true;document.getElementById('tttStatus').textContent='電腦贏了！';return;}
          if(board.every(c=>c)){over=true;document.getElementById('tttStatus').textContent='平手！';return;}
          document.getElementById('tttStatus').textContent='你的回合（X）';
        },400);
      };

      function checkWin(p){return wins.some(w=>w.every(i=>board[i]===p));}
    }

    // ═══ Snake Game ═══
    function renderSnake() {
      clearInterval(gameTimer);
      const CELL = 16, COLS = 18, ROWS = 14;
      const W = COLS * CELL, H = ROWS * CELL;
      let html = '<div class="overlay-header"><span class="overlay-title">🐍 貪吃蛇</span><button class="overlay-close" onclick="closeOverlay()">✕</button></div>';
      html += '<div class="game-hud"><span>🍎 <span class="game-hud-val" id="snakeScore">0</span></span><span>最高: <span class="game-hud-val" id="snakeBest">0</span></span></div>';
      html += `<div class="snake-wrap"><canvas class="snake-canvas" id="snakeCanvas" width="${W}" height="${H}"></canvas>`;
      html += '<div class="snake-controls"><div class="snake-ctrl-row"><button class="snake-ctrl" id="sUp">▲</button></div><div class="snake-ctrl-row"><button class="snake-ctrl" id="sLeft">◀</button><button class="snake-ctrl" id="sDown">▼</button><button class="snake-ctrl" id="sRight">▶</button></div></div>';
      html += '<div style="font-size:0.68rem;color:rgba(255,255,255,0.25);margin-top:6px">鍵盤方向鍵 或 點擊按鈕</div></div>';
      overlayBox.innerHTML = html;

      const canvas = document.getElementById('snakeCanvas');
      const ctx = canvas.getContext('2d');
      let snake = [{x:Math.floor(COLS/2),y:Math.floor(ROWS/2)}];
      let dir = {x:1,y:0}, nextDir = {x:1,y:0};
      let food = spawnFood();
      let score = 0, best = parseInt(localStorage.getItem('sw-snake-best')||'0');
      document.getElementById('snakeBest').textContent = best;
      let alive = true;

      function spawnFood() {
        let f;
        do { f = {x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
        while (snake.some(s => s.x===f.x && s.y===f.y));
        return f;
      }

      function draw() {
        ctx.fillStyle = '#0a0f1a';
        ctx.fillRect(0,0,W,H);
        // Grid dots
        ctx.fillStyle = 'rgba(157,175,255,0.03)';
        for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) {
          if((x+y)%2===0) ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
        }
        // Food
        ctx.font = (CELL-2)+'px serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('🍎', food.x*CELL+CELL/2, food.y*CELL+CELL/2+1);
        // Snake
        snake.forEach((s,i) => {
          const pct = i / snake.length;
          ctx.fillStyle = i===0 ? '#5eead4' : `rgba(94,234,212,${0.7-pct*0.5})`;
          ctx.beginPath();
          ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, 3);
          ctx.fill();
        });
      }

      function tick() {
        if (!alive) return;
        dir = {...nextDir};
        const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
        // Wall collision
        if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) { die(); return; }
        // Self collision
        if (snake.some(s => s.x===head.x && s.y===head.y)) { die(); return; }
        snake.unshift(head);
        // Eat food
        if (head.x===food.x && head.y===food.y) {
          score++;
          document.getElementById('snakeScore').textContent = score;
          food = spawnFood();
        } else {
          snake.pop();
        }
        draw();
      }

      function die() {
        alive = false;
        clearInterval(gameTimer);
        if (score > best) { best = score; localStorage.setItem('sw-snake-best', best); }
        ctx.fillStyle = 'rgba(255,80,80,0.15)';
        ctx.fillRect(0,0,W,H);
        showGameResult('🐍', score+' 分', score > best ? '新紀錄！' : '最高 '+best+' 分');
      }

      function setDir(dx,dy) {
        if (dx===-dir.x && dy===-dir.y) return;
        nextDir = {x:dx,y:dy};
      }

      document.addEventListener('keydown', snakeKeyHandler);
      function snakeKeyHandler(e) {
        if (!alive || !overlay.classList.contains('active')) { document.removeEventListener('keydown', snakeKeyHandler); return; }
        if (e.key==='ArrowUp'||e.key==='w') { e.preventDefault(); setDir(0,-1); }
        else if (e.key==='ArrowDown'||e.key==='s') { e.preventDefault(); setDir(0,1); }
        else if (e.key==='ArrowLeft'||e.key==='a') { e.preventDefault(); setDir(-1,0); }
        else if (e.key==='ArrowRight'||e.key==='d') { e.preventDefault(); setDir(1,0); }
      }

      document.getElementById('sUp').onclick = () => setDir(0,-1);
      document.getElementById('sDown').onclick = () => setDir(0,1);
      document.getElementById('sLeft').onclick = () => setDir(-1,0);
      document.getElementById('sRight').onclick = () => setDir(1,0);

      draw();
      gameTimer = setInterval(tick, 120);
    }

    // ═══ Whack-a-Mole (MC Theme) ═══
    function renderMole() {
      clearInterval(gameTimer);
      const MOBS = ['💀','🧟','🕷️','👾','😈'];
      const BONUS = ['💎','✨'];
      let html = '<div class="overlay-header"><span class="overlay-title">🔨 打苦力怕</span><button class="overlay-close" onclick="closeOverlay()">✕</button></div>';
      html += '<div class="game-hud"><span>🔨 <span class="game-hud-val" id="moleScore">0</span></span><span>⏱ <span class="game-hud-val" id="moleTime">30</span>s</span></div>';
      html += '<div class="mole-wrap"><div class="mole-grid" id="moleGrid">';
      for(let i=0;i<9;i++) html += `<div class="mole-hole" data-i="${i}" onclick="bonkMole(this)"></div>`;
      html += '</div></div>';
      overlayBox.innerHTML = html;

      let score = 0, timeLeft = 30, activeMoles = [];
      let speed = 1200; // ms between spawns, gets faster

      function spawnMole() {
        if (timeLeft <= 0) return;
        const holes = document.querySelectorAll('.mole-hole');
        const empty = Array.from(holes).filter(h => !h.querySelector('.mob'));
        if (!empty.length) return;
        const hole = empty[Math.floor(Math.random()*empty.length)];
        const isBonus = Math.random() < 0.1;
        const mob = document.createElement('span');
        mob.className = 'mob';
        mob.textContent = isBonus ? BONUS[Math.floor(Math.random()*BONUS.length)] : MOBS[Math.floor(Math.random()*MOBS.length)];
        mob.dataset.points = isBonus ? '3' : '1';
        hole.appendChild(mob);
        activeMoles.push(mob);
        // Auto disappear
        setTimeout(() => {
          if (mob.parentNode) {
            mob.style.transition = 'opacity 0.2s, transform 0.2s';
            mob.style.opacity = '0';
            mob.style.transform = 'scale(0.5) translateY(10px)';
            setTimeout(() => mob.remove(), 200);
          }
        }, 800 + Math.random()*400);
      }

      window.bonkMole = (hole) => {
        const mob = hole.querySelector('.mob');
        if (!mob || mob.classList.contains('bonked')) return;
        const pts = parseInt(mob.dataset.points||'1');
        score += pts;
        document.getElementById('moleScore').textContent = score;
        mob.classList.add('bonked');
        // Hit flash
        hole.style.background = 'rgba(168,230,207,0.15)';
        setTimeout(() => { hole.style.background = ''; }, 150);
        setTimeout(() => mob.remove(), 300);
      };

      // Spawn loop
      let spawnInterval = setInterval(() => {
        if (timeLeft <= 0) { clearInterval(spawnInterval); return; }
        spawnMole();
        // Occasionally spawn 2 at once
        if (Math.random() < 0.3) setTimeout(spawnMole, 200);
      }, speed);

      // Speed up over time
      let speedInterval = setInterval(() => {
        if (timeLeft <= 0) { clearInterval(speedInterval); return; }
        if (speed > 600) {
          speed -= 50;
          clearInterval(spawnInterval);
          spawnInterval = setInterval(() => {
            if (timeLeft <= 0) { clearInterval(spawnInterval); return; }
            spawnMole();
            if (Math.random() < 0.3) setTimeout(spawnMole, 200);
          }, speed);
        }
      }, 3000);

      // Timer
      gameTimer = setInterval(() => {
        timeLeft--;
        const el = document.getElementById('moleTime');
        if (el) el.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(gameTimer);
          clearInterval(spawnInterval);
          clearInterval(speedInterval);
          const label = score >= 30 ? '苦力怕剋星！' : score >= 15 ? '打得好！' : '再快一點！';
          showGameResult('🔨', score+' 分', label);
        }
      }, 1000);
    }

    // ═══ Game Result Helper ═══
    function showGameResult(emoji, val, text) {
      let html = '<div class="overlay-header"><span class="overlay-title" id="resultTitle"></span><button class="overlay-close" onclick="closeOverlay()">✕</button></div>';
      html += `<div class="game-result"><div class="game-result-emoji">${emoji}</div><div class="game-result-val">${val}</div><div class="game-result-text">${text}</div><div class="game-result-btns"><button class="btn btn-main" onclick="openGame('${currentGame}')">🔄 再玩一次</button><button class="btn btn-sub" onclick="closeOverlay()">關閉</button></div></div>`;
      overlayBox.innerHTML = html;
    }

    // ═══ Keyboard ═══
    document.addEventListener('keydown',(e)=>{
      if(e.key==='Escape'&&overlay.classList.contains('active'))closeOverlay();
    });

    // Init MCTI
    initMCTI();
  })();
  </script>
</body>
</html>
