<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找不到頁面 — 海風</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="assets/img/logo.png">
  <meta name="theme-color" content="#0d1117">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;600;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#0b1a2e;user-select:none}

    /* ═══ Ocean Scene ═══ */
    .scene{position:fixed;inset:0;overflow:hidden}

    /* Sky */
    .sky{position:absolute;inset:0;background:linear-gradient(180deg,#071018 0%,#0c1f35 25%,#123050 50%,#1a4070 75%,#2a6090 100%);transition:background 8s}
    .sky.sunset{background:linear-gradient(180deg,#1a0a20 0%,#4a1535 15%,#b84030 30%,#e88040 45%,#f0b060 55%,#f0d080 65%,#80b0d0 80%,#3070a0 100%)}
    .sky.night{background:linear-gradient(180deg,#050810 0%,#0a1225 30%,#0e1c38 60%,#0c1a30 100%)}

    /* Stars (only visible at night) */
    .star{position:absolute;background:#fff;border-radius:50%;opacity:0;transition:opacity 4s}
    .sky.night .star{opacity:1}

    /* Sun / Moon */
    .celestial{position:absolute;width:60px;height:60px;border-radius:50%;transition:all 8s ease-in-out}
    .sun{background:radial-gradient(circle at 35% 35%,#fff8e0,#f0c848,#e09020);box-shadow:0 0 40px 12px rgba(240,180,60,0.2),0 0 100px 40px rgba(240,180,60,0.06);top:15%;right:22%}
    .moon{background:radial-gradient(circle at 35% 35%,#fffce8,#e8e0c8,#c0b890);box-shadow:0 0 30px 10px rgba(220,210,180,0.12);top:12%;right:20%;opacity:0}
    .sky.night .sun{opacity:0;transform:translateY(40px)}
    .sky.night .moon{opacity:1}

    /* Clouds */
    .cloud{position:absolute;background:rgba(255,255,255,0.06);border-radius:100px;filter:blur(2px)}
    .cloud.c1{width:200px;height:30px;top:18%;left:10%;animation:drift-cloud 40s linear infinite}
    .cloud.c2{width:140px;height:22px;top:25%;left:60%;animation:drift-cloud 55s linear infinite reverse}
    .cloud.c3{width:180px;height:26px;top:12%;left:35%;animation:drift-cloud 48s linear infinite 10s}
    @keyframes drift-cloud{from{transform:translateX(-300px)}to{transform:translateX(calc(100vw + 300px))}}

    /* Horizon glow */
    .horizon{position:absolute;bottom:42%;left:0;right:0;height:60px;background:linear-gradient(180deg,transparent,rgba(100,160,220,0.06),transparent);pointer-events:none}

    /* ═══ Ocean ═══ */
    .ocean{position:absolute;bottom:0;left:0;right:0;height:45%}
    .ocean-body{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,26,46,0)0%,rgba(8,20,38,0.85)15%,rgba(6,16,32,0.95)40%,#060e1c 100%)}
    .ocean-surface{position:absolute;top:0;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(100,160,220,0.08),transparent);pointer-events:none}

    /* Waves */
    .wave{position:absolute;left:0;width:200%;pointer-events:none}
    .wave svg{width:100%;height:100%;display:block}
    .w1{top:0;height:50px;animation:wave-move 8s linear infinite}
    .w2{top:6px;height:60px;animation:wave-move 11s linear infinite reverse;opacity:0.7}
    .w3{top:14px;height:70px;animation:wave-move 6s linear infinite;opacity:0.5}
    .w4{top:24px;height:80px;animation:wave-move 14s linear infinite reverse;opacity:0.3}
    @keyframes wave-move{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* ═══ Floating Trash ═══ */
    .trash{position:absolute;font-size:1.4rem;pointer-events:cursor;z-index:5;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));user-select:none;transition:transform 0.3s,opacity 0.5s}
    .trash.floating{animation:float-trash linear infinite}
    .trash.collected{animation:collect-pop 0.5s ease-out forwards !important;pointer-events:none}
    @keyframes float-trash{
      0%{transform:translateY(0)rotate(0deg)}
      25%{transform:translateY(-4px)rotate(2deg)}
      50%{transform:translateY(0)rotate(0deg)}
      75%{transform:translateY(4px)rotate(-2deg)}
      100%{transform:translateY(0)rotate(0deg)}
    }
    @keyframes collect-pop{
      0%{transform:scale(1);opacity:1}
      40%{transform:scale(1.6)translateY(-20px);opacity:0.9}
      100%{transform:scale(0)translateY(-40px);opacity:0}
    }

    /* Sea creature */
    .creature{position:absolute;z-index:4;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.3))}
    .creature.turtle{font-size:2rem;animation:swim-turtle 18s ease-in-out infinite}
    .creature.fish{font-size:1.2rem;animation:swim-fish 12s linear infinite}
    .creature.whale{font-size:3rem;bottom:15%;left:-10%;animation:swim-whale 30s linear infinite}
    @keyframes swim-turtle{
      0%{bottom:28%;left:10%;transform:scaleX(1)}
      40%{bottom:32%;left:70%;transform:scaleX(1)}
      50%{bottom:30%;left:75%;transform:scaleX(-1)}
      90%{bottom:26%;left:15%;transform:scaleX(-1)}
      100%{bottom:28%;left:10%;transform:scaleX(1)}
    }
    @keyframes swim-fish{
      0%{bottom:20%;left:-5%;transform:scaleX(1)}
      50%{bottom:25%;left:105%;transform:scaleX(1)}
      50.1%{bottom:22%;left:105%;transform:scaleX(-1)}
      100%{bottom:18%;left:-5%;transform:scaleX(-1)}
    }
    @keyframes swim-whale{
      0%{left:-15%;transform:scaleX(1)}
      100%{left:110%;transform:scaleX(1)}
    }

    /* ═══ Cat on waves ═══ */
    .cat-float{
      position:absolute;
      z-index:5;
      bottom:38%;
      left:50%;
      transform:translateX(-50%);
      animation:cat-bob 3s ease-in-out infinite;
      pointer-events:none;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }
    @keyframes cat-bob{
      0%,100%{transform:translateX(-50%) translateY(0) rotate(0deg)}
      25%{transform:translateX(-50%) translateY(-6px) rotate(1.5deg)}
      50%{transform:translateX(-50%) translateY(2px) rotate(-0.5deg)}
      75%{transform:translateX(-50%) translateY(-3px) rotate(1deg)}
    }
    .cat-float svg{display:block}
    /* Cat eyes subtle glow */
    .cat-glow{filter:drop-shadow(0 0 3px rgba(94,234,212,0.5))}

    /* Bubbles */
    .bubble{position:absolute;border-radius:50%;background:rgba(150,200,255,0.08);border:1px solid rgba(150,200,255,0.12);pointer-events:none;z-index:3;animation:rise-bubble linear infinite}
    @keyframes rise-bubble{
      0%{transform:translateY(0)scale(1);opacity:0.6}
      50%{transform:translateY(-80px)scale(1.1);opacity:0.4}
      100%{transform:translateY(-160px)scale(0.8);opacity:0}
    }

    /* ═══ Content ═══ */
    .content{position:absolute;top:22%;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:90%;max-width:520px}
    .code{font-family:'Noto Serif TC',serif;font-size:clamp(5rem,16vw,10rem);font-weight:700;line-height:1;letter-spacing:0.06em;background:linear-gradient(180deg,rgba(255,255,255,0.85)0%,rgba(100,180,240,0.4)100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
    .title{font-size:clamp(1rem,2.2vw,1.4rem);font-weight:600;color:rgba(255,255,255,0.8);letter-spacing:0.15em;margin-bottom:0.4rem}
    .desc{font-size:clamp(0.8rem,1.2vw,0.9rem);color:rgba(255,255,255,0.35);line-height:2;max-width:340px;margin:0 auto 1.2rem;font-weight:300}
    .eco-msg{font-size:0.82rem;color:rgba(168,230,207,0.6);margin-bottom:1.5rem;line-height:1.8}
    .eco-msg strong{color:rgba(168,230,207,0.85)}

    .btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:1.2rem}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:8px;font-size:0.85rem;font-weight:600;text-decoration:none;font-family:inherit;transition:all 0.25s ease;cursor:pointer;border:none}
    .btn-main{background:rgba(87,138,255,0.18);border:1px solid rgba(87,138,255,0.25);color:#b3c8ff}
    .btn-main:hover{background:rgba(87,138,255,0.3);border-color:rgba(87,138,255,0.45);transform:translateY(-1px)}
    .btn-eco{background:rgba(168,230,207,0.12);border:1px solid rgba(168,230,207,0.2);color:rgba(168,230,207,0.9)}
    .btn-eco:hover{background:rgba(168,230,207,0.2);border-color:rgba(168,230,207,0.35);transform:translateY(-1px)}
    .btn-sub{background:transparent;border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
    .btn-sub:hover{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);transform:translateY(-1px)}

    /* Score HUD */
    .hud{display:inline-flex;align-items:center;gap:12px;padding:8px 20px;background:rgba(13,17,23,0.7);backdrop-filter:blur(10px);border:1px solid rgba(168,230,207,0.15);border-radius:100px;font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:0.8rem;opacity:0;transition:opacity 0.5s}
    .hud.visible{opacity:1}
    .hud-score{color:var(--foam,#a8e6cf);font-weight:700;font-variant-numeric:tabular-nums}
    .hud-msg{color:rgba(255,255,255,0.4);font-size:0.75rem}

    /* Game toggle */
    .game-menu{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;opacity:0.7;transition:opacity 0.3s}
    .game-menu:hover{opacity:1}
    .game-btn{padding:7px 14px;border-radius:20px;background:rgba(157,175,255,0.06);border:1px solid rgba(157,175,255,0.1);color:rgba(255,255,255,0.45);font-size:0.75rem;cursor:pointer;font-family:inherit;transition:all 0.2s ease}
    .game-btn:hover,.game-btn.active{background:rgba(157,175,255,0.15);border-color:rgba(157,175,255,0.25);color:#b3c8ff}

    /* Mini game containers */
    .game-area{display:none;max-width:420px;margin:0 auto}
    .game-area.active{display:block;animation:game-in 0.3s ease-out}
    @keyframes game-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

    /* Memory game */
    .mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px;background:rgba(6,14,28,0.5);border-radius:12px;border:1px solid rgba(157,175,255,0.08)}
    .mem-card{aspect-ratio:1;border-radius:8px;cursor:pointer;background:rgba(157,175,255,0.08);border:1px solid rgba(157,175,255,0.12);display:flex;align-items:center;justify-content:center;font-size:1.4rem;transition:all 0.25s;position:relative;overflow:hidden}
    .mem-card:hover{background:rgba(157,175,255,0.15)}
    .mem-card .front,.mem-card .back{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transition:transform 0.3s,opacity 0.3s}
    .mem-card .front{transform:rotateY(90deg);opacity:0}
    .mem-card .back{color:rgba(157,175,255,0.25);font-size:1rem}
    .mem-card.flipped .front{transform:rotateY(0);opacity:1}
    .mem-card.flipped .back{transform:rotateY(-90deg);opacity:0}
    .mem-card.matched{background:rgba(168,230,207,0.12);border-color:rgba(168,230,207,0.25);pointer-events:none}

    /* Click speed */
    .click-zone{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px;background:rgba(6,14,28,0.5);border-radius:12px;border:1px solid rgba(157,175,255,0.08)}
    .click-target{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(168,230,207,0.2),rgba(168,230,207,0.06));border:2px solid rgba(168,230,207,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2rem;transition:all 0.1s;user-select:none}
    .click-target:active{transform:scale(0.9)}
    .click-label{font-size:0.75rem;color:rgba(255,255,255,0.35)}

    /* Result overlay */
    .result{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)scale(0.9);z-index:25;text-align:center;padding:28px 40px;background:rgba(6,14,28,0.92);backdrop-filter:blur(16px);border:1px solid rgba(168,230,207,0.2);border-radius:16px;display:none;min-width:220px}
    .result.active{display:block;animation:result-in 0.3s ease-out}
    @keyframes result-in{from{transform:translate(-50%,-50%)scale(0.9);opacity:0}to{transform:translate(-50%,-50%)scale(1);opacity:1}}
    .result-emoji{font-size:2rem;margin-bottom:8px}
    .result-score{font-size:2rem;font-weight:800;color:#a8e6cf;margin-bottom:4px}
    .result-text{font-size:0.85rem;color:rgba(255,255,255,0.5);margin-bottom:16px}
    .result-btn{padding:8px 20px;border-radius:8px;background:rgba(168,230,207,0.12);border:1px solid rgba(168,230,207,0.25);color:rgba(168,230,207,0.9);font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s}
    .result-btn:hover{background:rgba(168,230,207,0.22)}

    @media(max-width:768px){
      .celestial{width:40px;height:40px}
      .sun{top:12%;right:15%}
      .moon{top:10%;right:13%}
      .content{top:18%}
      .code{font-size:4rem}
      .mem-grid{gap:4px;padding:6px}
      .mem-card{font-size:1.1rem}
      .game-btn{padding:8px 10px;font-size:0.72rem}
      .trash{font-size:1.1rem}
    }
    @media(max-width:375px){
      .content{top:14%}
      .code{font-size:3.5rem}
      .title{font-size:0.9rem}
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <!-- Sky -->
    <div class="sky sunset" id="sky">
      <div class="celestial sun" id="sun"></div>
      <div class="celestial moon" id="moon"></div>
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>

    <!-- Horizon -->
    <div class="horizon"></div>

    <!-- Ocean -->
    <div class="ocean" id="ocean">
      <div class="ocean-body"></div>
      <div class="ocean-surface"></div>
      <div class="wave w1"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,20 Q360,45 720,20 Q1080,0 1440,20 Q1800,40 2160,20 Q2520,0 2880,20 L2880,60 L0,60Z" fill="rgba(10,26,46,0.4)"/></svg></div>
      <div class="wave w2"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,30 Q480,10 960,30 Q1440,50 1920,30 Q2400,10 2880,30 L2880,60 L0,60Z" fill="rgba(8,20,38,0.5)"/></svg></div>
      <div class="wave w3"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,25 Q360,45 720,25 Q1080,5 1440,25 Q1800,45 2160,25 Q2520,5 2880,25 L2880,60 L0,60Z" fill="rgba(6,16,32,0.7)"/></svg></div>
      <div class="wave w4"><svg viewBox="0 0 2880 60" preserveAspectRatio="none"><path d="M0,35 Q480,15 960,35 Q1440,55 1920,35 Q2400,15 2880,35 L2880,60 L0,60Z" fill="#060e1c"/></svg></div>

      <!-- Sea creatures -->
      <div class="creature turtle" id="turtle">🐢</div>
      <div class="creature fish" style="animation-delay:-3s">🐠</div>
      <div class="creature fish" style="animation-delay:-8s;bottom:16%;font-size:0.9rem;animation-duration:15s">🐟</div>

      <!-- Little cat floating on waves -->
      <div class="cat-float" aria-hidden="true">
        <svg width="64" height="56" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 奶牛貓 Cow Cat — 黑白花色 -->
          <!-- Body (white base) -->
          <ellipse cx="32" cy="38" rx="18" ry="12" fill="#f0ece4" stroke="#e0dcd4" stroke-width="1"/>
          <!-- Body black patches -->
          <ellipse cx="24" cy="34" rx="8" ry="7" fill="#1a1a1a"/>
          <ellipse cx="44" cy="40" rx="6" ry="5" fill="#1a1a1a"/>
          <ellipse cx="30" cy="44" rx="5" ry="3" fill="#2a2a2a"/>
          <!-- Head (white base) -->
          <circle cx="32" cy="22" r="12" fill="#f0ece4" stroke="#e0dcd4" stroke-width="1"/>
          <!-- Head split-face black patch (right side) -->
          <path d="M32 10 Q44 12 44 22 Q44 32 32 34Z" fill="#1a1a1a"/>
          <!-- Black patch on top of head -->
          <ellipse cx="28" cy="13" rx="6" ry="5" fill="#2a2a2a"/>
          <!-- Left ear (white with black tip) -->
          <path d="M22 14 L19 3 L28 11Z" fill="#f0ece4" stroke="#d0ccc4" stroke-width="1"/>
          <path d="M20 6 L22 12 L25 10Z" fill="#1a1a1a"/>
          <!-- Right ear (black) -->
          <path d="M42 14 L45 3 L36 11Z" fill="#1a1a1a" stroke="#333" stroke-width="0.8"/>
          <path d="M41 12 L43 5 L37 11Z" fill="#2a2a2a"/>
          <!-- Eyes -->
          <ellipse cx="27" cy="21" rx="2.8" ry="3.2" fill="#5eead4" class="cat-glow"/>
          <ellipse cx="38" cy="21" rx="2.8" ry="3.2" fill="#5eead4" class="cat-glow"/>
          <ellipse cx="27" cy="21" rx="1.3" ry="2.8" fill="#111"/>
          <ellipse cx="38" cy="21" rx="1.3" ry="2.8" fill="#111"/>
          <!-- Eye shine -->
          <circle cx="28.2" cy="19.5" r="0.9" fill="#fff" opacity="0.95"/>
          <circle cx="39.2" cy="19.5" r="0.9" fill="#fff" opacity="0.95"/>
          <!-- Nose -->
          <path d="M31 25.5 L32 27.5 L33 25.5Z" fill="#f5a0b0"/>
          <!-- Mouth -->
          <path d="M32 27.5 Q29 30.5 27 28.5" stroke="#aa9988" stroke-width="0.8" fill="none"/>
          <path d="M32 27.5 Q35 30.5 37 28.5" stroke="#aa9988" stroke-width="0.8" fill="none"/>
          <!-- Whiskers -->
          <line x1="17" y1="23" x2="24" y2="24" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="16" y1="26" x2="23" y2="26.5" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="17" y1="29" x2="23" y2="28" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="40" y1="24" x2="47" y2="23" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="41" y1="26.5" x2="48" y2="26" stroke="#ccbb99" stroke-width="0.5"/>
          <line x1="41" y1="28" x2="47" y2="29" stroke="#ccbb99" stroke-width="0.5"/>
          <!-- Front paws (white with black spots) -->
          <ellipse cx="22" cy="46" rx="5" ry="3.5" fill="#f0ece4" stroke="#d0ccc4" stroke-width="0.8"/>
          <ellipse cx="20" cy="45.5" rx="2" ry="1.5" fill="#2a2a2a"/>
          <ellipse cx="42" cy="46" rx="5" ry="3.5" fill="#1a1a1a" stroke="#333" stroke-width="0.8"/>
          <!-- Tail (black with white tip) -->
          <path d="M50 36 Q57 27 55 18 Q54 14 56 12" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M55 14 Q55 11 56 9" stroke="#f0ece4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <!-- Trash items (will be populated by JS) -->
    <div id="trashField"></div>

    <!-- Bubbles -->
    <div id="bubbles"></div>

    <!-- Content -->
    <div class="content" id="mainContent">
      <div class="code">404</div>
      <h1 class="title">航向了未知的海域</h1>
      <p class="desc">看來這片海域沒有你要找的陸地。<br>別擔心，讓風帶你回到正確的航線。</p>

      <div class="eco-msg">
        🌊 這片海域漂浮著一些垃圾…<br>
        <strong>點擊垃圾幫忙清理，守護海洋！</strong>
      </div>

      <div class="hud" id="hud">
        🌿 已清理 <span class="hud-score" id="score">0</span> 件垃圾
        <span class="hud-msg" id="hudMsg"></span>
      </div>

      <div class="btns">
        <a href="首頁.html" class="btn btn-main">🏠 返回首頁</a>
        <button class="btn btn-eco" onclick="startCleanup()" id="cleanBtn">🧹 開始淨灘</button>
        <a href="https://discord.gg/HdS2HrJEH7" target="_blank" rel="noopener" class="btn btn-sub">💬 加入社群</a>
      </div>

      <div class="game-menu" id="gameMenu">
        <button class="game-btn" onclick="startGame('memory')">🃏 翻牌</button>
        <button class="game-btn" onclick="startGame('click')">⚡ 點擊測速</button>
      </div>
    </div>

    <!-- Game areas -->
    <div class="game-area" id="memoryArea">
      <div class="mem-grid" id="memGrid"></div>
    </div>
    <div class="game-area" id="clickArea">
      <div class="click-zone">
        <div class="click-label">盡可能快速點擊！</div>
        <div class="click-target" id="clickTarget">🌊</div>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-text" id="resultText"></div>
    <button class="result-btn" id="resultBtn">再玩一次</button>
  </div>

  <script>
  (() => {
    'use strict';

    const TRASH = ['🧴','🥤','🛍️','📦','🥫','🪣','🧃','🫙','🧋','🍶','🥡','🛒','🎈','🪥'];
    const SEA = ['🐙','🦑','🦐','🐡','🐠','🐟','🐬','🦀','🐚'];

    // ═══ Day/Night Cycle ═══
    const sky = document.getElementById('sky');
    let isNight = false;
    function cycleSky() {
      isNight = !isNight;
      sky.className = 'sky ' + (isNight ? 'night' : 'sunset');
    }
    // Initial transition after 2s
    setTimeout(() => {
      sky.style.transition = 'background 4s';
      cycleSky();
      setInterval(cycleSky, 20000);
    }, 2000);

    // ═══ Stars ═══
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random()*100+'%';
      s.style.top = Math.random()*50+'%';
      const sz = 0.5+Math.random()*1.5;
      s.style.width = sz+'px'; s.style.height = sz+'px';
      s.style.animationDelay = Math.random()*3+'s';
      sky.appendChild(s);
    }

    // ═══ Bubbles ═══
    const bubbleContainer = document.getElementById('bubbles');
    function spawnBubble() {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 4+Math.random()*12;
      b.style.width = size+'px'; b.style.height = size+'px';
      b.style.left = (10+Math.random()*80)+'%';
      b.style.bottom = (5+Math.random()*30)+'%';
      b.style.animationDuration = (4+Math.random()*6)+'s';
      bubbleContainer.appendChild(b);
      setTimeout(() => b.remove(), 10000);
    }
    setInterval(spawnBubble, 800);

    // ═══ Trash System ═══
    const trashField = document.getElementById('trashField');
    let trashCount = 0;
    let cleanupActive = false;

    function spawnTrash() {
      if (!cleanupActive) return;
      const t = document.createElement('div');
      t.className = 'trash floating';
      t.textContent = TRASH[Math.floor(Math.random()*TRASH.length)];
      // Place on ocean surface
      const oceanTop = 55; // ~55% from top
      t.style.top = (oceanTop + Math.random()*15) + '%';
      t.style.left = (5+Math.random()*90) + '%';
      const dur = 3+Math.random()*4;
      t.style.animationDuration = dur+'s';
      t.style.fontSize = (1+Math.random()*0.8)+'rem';

      t.addEventListener('click', () => {
        if (t.classList.contains('collected')) return;
        t.classList.add('collected');
        trashCount++;
        document.getElementById('score').textContent = trashCount;
        // Show message at milestones
        const msg = document.getElementById('hudMsg');
        if (trashCount === 3) msg.textContent = '— 繼續加油！';
        else if (trashCount === 7) msg.textContent = '— 海洋變乾淨了！';
        else if (trashCount === 12) msg.textContent = '— 你是淨灘英雄！🏆';
        else if (trashCount === 20) msg.textContent = '— 海洋守護者！🌊';
        setTimeout(() => t.remove(), 500);
      });

      trashField.appendChild(t);
      // Remove after floating too long
      setTimeout(() => { if (!t.classList.contains('collected')) t.remove(); }, 15000+Math.random()*10000);
    }

    function startCleanup() {
      cleanupActive = true;
      trashCount = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('hud').classList.add('visible');
      document.getElementById('hudMsg').textContent = '';
      document.getElementById('cleanBtn').textContent = '🧹 淨灘中...';
      // Clear existing trash
      trashField.innerHTML = '';
      // Spawn initial batch
      for (let i = 0; i < 6; i++) setTimeout(spawnTrash, i*300);
      // Keep spawning
      const interval = setInterval(() => {
        if (!cleanupActive) { clearInterval(interval); return; }
        if (trashField.querySelectorAll('.trash:not(.collected)').length < 8) spawnTrash();
      }, 2000);
    }

    // ═══ Mini Games ═══
    let currentGame = null, score = 0, timeLeft = 0, timerHandle = null;

    function startGame(type) {
      clearInterval(timerHandle);
      document.querySelectorAll('.game-area').forEach(a => a.classList.remove('active'));
      document.getElementById('result').classList.remove('active');
      currentGame = type;
      score = 0; timeLeft = type === 'memory' ? 60 : 5;

      if (type === 'memory') initMemory();
      else if (type === 'click') initClick();
    }

    function endGame() {
      clearInterval(timerHandle);
      document.querySelectorAll('.game-area').forEach(a => a.classList.remove('active'));

      const emoji = currentGame === 'memory'
        ? (score >= 8 ? '🧠' : score >= 4 ? '🃏' : '💪')
        : (score >= 80 ? '⚡' : score >= 40 ? '💨' : '🖱️');
      const text = currentGame === 'memory'
        ? (score >= 8 ? '記憶天才！' : score >= 4 ? '記憶力不錯' : '再試試看')
        : (score >= 80 ? '閃電快手！' : score >= 40 ? '手速不錯' : '再快一點！');
      const display = currentGame === 'click' ? (score/5).toFixed(1)+' CPS' : score;

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultScore').textContent = display;
      document.getElementById('resultText').textContent = text;
      document.getElementById('resultBtn').onclick = () => startGame(currentGame);
      document.getElementById('result').classList.add('active');
    }

    function initMemory() {
      const area = document.getElementById('memoryArea');
      area.classList.add('active');
      const pairs = SEA.slice(0,8);
      const cards = [...pairs,...pairs].sort(() => Math.random()-0.5);
      const grid = document.getElementById('memGrid');
      grid.innerHTML = '';
      let flipped=[], matched=0, locked=false;

      cards.forEach(emoji => {
        const card = document.createElement('div');
        card.className = 'mem-card';
        card.innerHTML = `<div class="back">?</div><div class="front">${emoji}</div>`;
        card.onclick = () => {
          if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
          card.classList.add('flipped');
          flipped.push(card);
          if(flipped.length===2){
            locked=true;
            const[a,b]=flipped;
            if(a.querySelector('.front').textContent===b.querySelector('.front').textContent){
              a.classList.add('matched');b.classList.add('matched');
              matched+=2;score=matched;flipped=[];locked=false;
              if(matched===cards.length)endGame();
            }else{
              setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];locked=false},800);
            }
          }
        };
        grid.appendChild(card);
      });

      clearInterval(timerHandle);
      timerHandle = setInterval(()=>{timeLeft--;if(timeLeft<=0)endGame()},1000);
    }

    function initClick() {
      const area = document.getElementById('clickArea');
      area.classList.add('active');
      const target = document.getElementById('clickTarget');
      let clicks=0;
      target.onclick = ()=>{clicks++;score=clicks;target.textContent=['🌊','💨','⚡','🔥','💫'][clicks%5]};
      clearInterval(timerHandle);
      timerHandle = setInterval(()=>{timeLeft--;if(timeLeft<=0)endGame()},1000);
    }

    // Expose globally
    window.startCleanup = startCleanup;
    window.startGame = startGame;
  })();
  </script>
</body>
</html>
