# ═══════════════════════════════════════
# 珍奶微微 — MythicMobs 技能設定
# 檔案位置：plugins/MythicMobs/Skills/珍奶微微-skills.yml
# ═══════════════════════════════════════

# ───────────────────────────────────────
# 珍珠飄浮 — 手持時珍珠泡泡環繞劍身
# ───────────────────────────────────────
珍珠飄浮:
  Cooldown: 0
  Conditions:
    - holdingitem{item=2026Bubble_tea-01} true
  Skills:
    - effect:particleset{
        particle=bubble_pop;
        amount=3;
        hspread=0.3;
        vspread=0.3;
        speed=0.02;
        yoffset=0.5} @self ~onTimer:8
    - effect:sound{
        sound=entity.bubble_column.bubble_pop;
        volume=0.1;
        pitch=1.5} @self ~onTimer:40

# ───────────────────────────────────────
# 奶茶飛濺 — 攻擊命中時迸出珍珠與奶茶
# ───────────────────────────────────────
奶茶飛濺:
  Cooldown: 0
  Conditions:
    - holdingitem{item=2026Bubble_tea-01} true
  Skills:
    # 珍珠爆發
    - effect:particleset{
        particle=bubble_pop;
        amount=10;
        hspread=0.5;
        vspread=0.5;
        speed=0.3;
        yoffset=0.5} @target ~onAttack
    # 水滴飛濺（奶茶感）
    - effect:particleset{
        particle=falling_dripstone_water;
        amount=5;
        hspread=0.3;
        vspread=0.3;
        speed=0.2;
        yoffset=0.3} @target ~onAttack
    # 音效
    - effect:sound{
        sound=entity.drink.honey;
        volume=0.3;
        pitch=1.2} @target ~onAttack

# ───────────────────────────────────────
# 擊殺閃光 — 擊殺時閃爍金色光芒
# ───────────────────────────────────────
擊殺閃光:
  Cooldown: 0
  Conditions:
    - holdingitem{item=2026Bubble_tea-01} true
  Skills:
    # 金色光環
    - effect:particleset{
        particle=glow;
        amount=12;
        hspread=1.0;
        vspread=0.5;
        speed=0.1;
        yoffset=0.5} @target ~onKill
    # 附魔台光粒子
    - effect:particleset{
        particle=enchant;
        amount=8;
        hspread=0.5;
        vspread=1.0;
        speed=0.15;
        yoffset=0.5} @target ~onKill
    # 音效
    - effect:sound{
        sound=block.enchantment_table.use;
        volume=0.4;
        pitch=1.5} @target ~onKill

# ───────────────────────────────────────
# 暴擊強化 — 暴擊時額外特效
# ───────────────────────────────────────
暴擊強化:
  Cooldown: 0
  Conditions:
    - holdingitem{item=2026Bubble_tea-01} true
    - iscritical true
  Skills:
    - effect:particleset{
        particle=crit_magic;
        amount=6;
        hspread=0.4;
        vspread=0.4;
        speed=0.2;
        yoffset=0.5} @target ~onAttack
    - effect:particleset{
        particle=bubble_pop;
        amount=8;
        hspread=0.6;
        vspread=0.6;
        speed=0.25;
        yoffset=0.5} @target ~onAttack
