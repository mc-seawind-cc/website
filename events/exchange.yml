token_shop:
  - cost: 10
    reward: "基礎材料包（鐵錠 ×16 + 鑽石 ×4）"
  - cost: 20
    reward: "任務幣 ×50"
  - cost: 30
    reward: "風汐碎片 ×2"
  - cost: 50
    reward: "任務幣 ×100 + 稱號「🧋 珍奶學徒」"
  - cost: 70
    reward: "風汐石 ×1"
  - cost: 90
    reward: "限定武器「珍奶微微」+ 稱號「⭐ 珍奶大師」"

# ═══════════════════════════════════════
# 五、平衡備註
# ═══════════════════════════════════════
#
# 每日任務收入（做滿 3 個）：
#   原料：4+4+4 = 12 份（或 4+4+2 = 10 份含高級）
#   代幣：3+5+5 = 13（或 3+5+8 = 16 含高級）
#
# 兌換成本：
#   基本款：4+4 原料 + 2 代幣 → 每天可做 1~2 杯（取決於任務種類）
#   進階款：4+4+4 原料 + 3 代幣 → 需 2 天任務量（糖+牛奶+特色）
#   限定款：8+8+1+4 原料 + 5 代幣 → 需 3~4 天集中收集
#
# 活動期 35 天，每天 3 任務：
#   代幣總收入約 455~560
#   兌換全部 13 種飲料所需代幣：4×2 + 8×3 + 1×5 = 37
#   剩餘代幣可用於代幣商店（最高獎勵 90）
#   → 全收集 + 兌換武器 完全可行，但需要積極參與
#
# 自行採集補充：
#   糖和牛奶可大量自行轉換（甘蔗和牛奶都是可再生）
#   任務主要提供代幣 + 其他 12 種不易大量取得的原料
