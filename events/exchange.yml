# ═══════════════════════════════════════
# 2026 海風國際珍奶日 — 兌換與任務獎勵
# 檔案位置：plugins/（依插件格式匯入）
# ═══════════════════════════════════════
#
# 系統架構：
#   原始材料 →(轉換)→ 原料道具 →(原料+代幣)→ 飲料
#   自行採集 ─────────↗     每日任務 ───代幣↗
#
# 代幣來源：僅由每日任務產出（自行採集不給代幣）

# ═══════════════════════════════════════
# 一、原料轉換（NPC 兌換面板 / 工作台配方）
#    只有這兩種需要轉換，其餘原料直接採集即可使用
# ═══════════════════════════════════════

conversions:
  - id: sugar_convert
    input:
      material: SUGAR_CANE
      amount: 1
    output:
      id: "2026BUBBLE_TEA_03"     # 本土甘蔗糖
      amount: 1
    name: "甘蔗 → 本土甘蔗糖"
    note: "1 甘蔗 = 1 糖，與原版合成一致"

  - id: milk_convert
    input:
      material: MILK_BUCKET
      amount: 1
    output:
      id: "2026BUBBLE_TEA_02"     # 超高溫殺菌的鮮乳
      amount: 1
    name: "牛奶桶 → 超高溫殺菌的鮮乳"
    note: "1 牛奶桶 = 1 鮮乳，由 NPC 轉換"

# ═══════════════════════════════════════
# 二、每日任務獎勵
#    每天刷新 3 個任務（14 種輪替，14 天一輪）
#    獎勵 = 原料道具 + 代幣
# ═══════════════════════════════════════

task_rewards:
  # ── 基礎原料（代幣低，因為後續還要加工或需求量大）──
  - task: "糖的製備"
    action: blockBreak + submit
    require:
      action: "blockBreak"
      material: SUGAR_CANE
      amount: 10
      then_submit: true           # 採集後提交 10 甘蔗
    reward:
      ingredient: "2026BUBBLE_TEA_03"    # 本土甘蔗糖
      amount: 4
      tokens: 3

  - task: "擠奶工"
    action: interaction
    require:
      action: "interaction"
      target: COW
      amount: 5
      note: "擠 5 頭不同的牛"
    reward:
      ingredient: "2026BUBBLE_TEA_02"    # 超高溫殺菌的鮮乳
      amount: 4
      tokens: 3

  # ── 一般原料（標準獎勵）──
  - task: "海底採茶"
    action: blockBreak
    require:
      action: "blockBreak"
      material: KELP
      amount: 15
    reward:
      ingredient: "2026BUBBLE_TEA_04"    # 金門海帶
      amount: 4
      tokens: 5

  - task: "採蜜人"
    action: interaction
    require:
      action: "interaction"
      target: BEEHIVE
      amount: 3
      note: "使用玻璃瓶收集蜂蜜"
    reward:
      ingredient: "2026BUBBLE_TEA_05"    # CNS1305認證純蜂蜜
      amount: 4
      tokens: 5

  - task: "可可農夫"
    action: blockBreak
    require:
      action: "blockBreak"
      material: COCOA
      amount: 12
    reward:
      ingredient: "2026BUBBLE_TEA_06"    # 鹼化可可粉
      amount: 4
      tokens: 5

  - task: "仙人掌收割"
    action: blockBreak
    require:
      action: "blockBreak"
      material: CACTUS
      amount: 8
    reward:
      ingredient: "2026BUBBLE_TEA_07"    # 有機仙人掌粉
      amount: 4
      tokens: 5

  - task: "歌萊果燒製"
    action: blockBreak + craftItem
    require:
      - action: "blockBreak"
        material: CHORUS_FRUIT
        amount: 10
      - action: "craftItem"
        material: POPPED_CHORUS_FRUIT
        amount: 10
        note: "放入熔爐燒製"
    reward:
      ingredient: "2026BUBBLE_TEA_08"    # 黑糖珍珠粉圓
      amount: 4
      tokens: 5

  - task: "胡蘿蔔農夫"
    action: blockBreak
    require:
      action: "blockBreak"
      material: CARROTS
      amount: 12
    reward:
      ingredient: "2026BUBBLE_TEA_09"    # 現採紅蘿蔔
      amount: 4
      tokens: 5

  - task: "蘑菇採集"
    action: blockBreak
    require:
      action: "blockBreak"
      material: RED_MUSHROOM
      amount: 8
    reward:
      ingredient: "2026BUBBLE_TEA_10"    # 野採紅菇
      amount: 4
      tokens: 5

  - task: "甜苺獵人"
    action: blockBreak
    require:
      action: "blockBreak"
      material: SWEET_BERRY_BUSH
      amount: 15
      note: "用右鍵採集甜苺灌木"
    reward:
      ingredient: "2026BUBBLE_TEA_11"    # 高山甜莓
      amount: 4
      tokens: 5

  - task: "蜂巢刮取"
    action: shear
    require:
      action: "shear"
      target: BEEHIVE
      amount: 3
      note: "需持有剪刀"
    reward:
      ingredient: "2026BUBBLE_TEA_12"    # 蜂農自產蜂巢
      amount: 4
      tokens: 5

  - task: "西瓜切割"
    action: blockBreak + craftItem
    require:
      - action: "blockBreak"
        material: MELON
        amount: 2
      - action: "craftItem"
        material: MELON_SLICE
        amount: 18
        note: "工作台切割西瓜"
    reward:
      ingredient: "2026BUBBLE_TEA_13"    # 現切西瓜片
      amount: 4
      tokens: 5

  # ── 高級原料（代幣高，取得成本高）──
  - task: "蘋果採集"
    action: blockBreak
    require:
      action: "blockBreak"
      material: LEAVES
      amount: 6
      note: "破壞橡木/樺木樹葉掉落蘋果"
    reward:
      ingredient: "2026BUBBLE_TEA_14"    # 富士蘋果
      amount: 2
      tokens: 8

  - task: "金蘋果合成"
    action: craftItem
    require:
      action: "craftItem"
      material: GOLDEN_APPLE
      amount: 1
      note: "需金錠 ×8 + 蘋果 ×1"
    reward:
      ingredient: "2026BUBBLE_TEA_15"    # 鍍金蘋果
      amount: 1
      tokens: 8

