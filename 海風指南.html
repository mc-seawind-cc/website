  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const searchEl = document.getElementById('guideSearch');
    const resultsEl = document.getElementById('searchResults');
    const browseEl = document.getElementById('guideBrowse');
    const searchEntriesEl = document.getElementById('searchEntries');
    const searchCountEl = document.getElementById('searchCount');
    const noResultEl = document.getElementById('noResult');

    // 蒐集所有指南項目
    const allGuides = [];
    document.querySelectorAll('.guide-entry').forEach(entry => {
      const title = entry.querySelector('.guide-entry-title')?.textContent || '';
      const desc = entry.querySelector('.guide-entry-desc')?.textContent || '';
      const href = entry.getAttribute('href') || '';
      const emoji = entry.querySelector('.guide-entry-icon')?.textContent || '';
      const section = entry.closest('.guide-cat')?.dataset.section || '';
      allGuides.push({ title, desc, href, emoji, section });
    });

    // 搜尋
    searchEl.addEventListener('input', () => {
      const q = searchEl.value.trim().toLowerCase();
      if (!q) {
        resultsEl.classList.remove('active');
        browseEl.style.display = '';
        return;
      }

      const matches = allGuides.filter(g =>
        g.title.toLowerCase().includes(q) || g.desc.toLowerCase().includes(q)
      );

      resultsEl.classList.add('active');
      browseEl.style.display = 'none';
      searchCountEl.textContent = matches.length;

      if (matches.length === 0) {
        searchEntriesEl.innerHTML = '';
        noResultEl.style.display = '';
        return;
      }

      noResultEl.style.display = 'none';
      searchEntriesEl.innerHTML = matches.map(g => `
        <a href="${g.href}" class="guide-entry">
          <div class="guide-entry-icon">${g.emoji}</div>
          <div class="guide-entry-body">
            <div class="guide-entry-title">${g.title}</div>
            <div class="guide-entry-desc">${g.desc}</div>
          </div>
          <span class="guide-entry-arrow">→</span>
        </a>
      `).join('');
    });

    // 分類標籤
    document.querySelectorAll('.guide-qt').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.guide-qt').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const cat = btn.dataset.cat;
        searchEl.value = '';
        resultsEl.classList.remove('active');
        browseEl.style.display = '';

        document.querySelectorAll('.guide-cat').forEach(sec => {
          if (cat === 'all') {
            sec.style.display = '';
          } else {
            sec.style.display = sec.dataset.section === cat ? '' : 'none';
          }
        });

        const cta = document.querySelector('.guide-cta');
        if (cta) cta.style.display = cat === 'all' ? '' : 'none';
      });
    });

    // 側邊欄高亮
    const sidebarLinks = document.querySelectorAll('.guide-sb-link');
    sidebarLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const section = link.dataset.section;
        const target = document.getElementById('sec-' + section);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        sidebarLinks.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      });
    });
  });
  </script>
  <script>
  (function(){
    const loader = document.getElementById("pageLoader");
    if (!loader) return;
    function hideLoader() {
      loader.classList.add("fade-out");
      setTimeout(() => loader.remove(), 600);
    }
    if (document.readyState === "complete") { hideLoader(); }
    else { window.addEventListener("load", hideLoader); }
    setTimeout(hideLoader, 3000);
  })();
  </script>
