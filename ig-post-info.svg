<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#578aff"/>
      <stop offset="100%" stop-color="#ab72f9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9dafff"/>
      <stop offset="100%" stop-color="#a8e6cf"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.3" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#578aff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#578aff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.7" cy="0.8" r="0.4">
      <stop offset="0%" stop-color="#ab72f9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ab72f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow1)"/>
  <rect width="1080" height="1080" fill="url(#glow2)"/>

  <!-- Decorative wave at bottom -->
  <path d="M0 900 Q270 850 540 900 Q810 950 1080 900 L1080 1080 L0 1080Z" fill="#578aff" fill-opacity="0.06"/>
  <path d="M0 940 Q270 890 540 940 Q810 990 1080 940 L1080 1080 L0 1080Z" fill="#ab72f9" fill-opacity="0.04"/>

  <!-- Floating particles -->
  <circle cx="150" cy="200" r="3" fill="#9dafff" opacity="0.3"/>
  <circle cx="900" cy="150" r="2" fill="#a8e6cf" opacity="0.25"/>
  <circle cx="800" cy="350" r="4" fill="#ab72f9" opacity="0.2"/>
  <circle cx="200" cy="700" r="3" fill="#578aff" opacity="0.2"/>
  <circle cx="950" cy="600" r="2" fill="#9dafff" opacity="0.3"/>
  <circle cx="100" cy="500" r="2.5" fill="#a8e6cf" opacity="0.2"/>

  <!-- Glowing orbs -->
  <circle cx="180" cy="250" r="80" fill="#578aff" opacity="0.04" filter="url(#blur2)"/>
  <circle cx="880" cy="750" r="100" fill="#ab72f9" opacity="0.03" filter="url(#blur2)"/>

  <!-- Top decorative line -->
  <rect x="440" y="80" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Logo area -->
  <circle cx="540" cy="220" r="70" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <text x="540" y="210" font-family="Arial, sans-serif" font-size="48" font-weight="900" fill="#9dafff" text-anchor="middle" opacity="0.9">🌊</text>
  <text x="540" y="260" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18" font-weight="700" fill="#8b949e" text-anchor="middle" letter-spacing="4">SEAWIND.CC</text>

  <!-- Main title -->
  <text x="540" y="370" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="52" font-weight="900" fill="#e6edf3" text-anchor="middle">海風伺服器</text>
  <text x="540" y="430" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="22" font-weight="500" fill="#9dafff" text-anchor="middle" letter-spacing="2">在風與海之間，有一個可以長久生存的地方</text>

  <!-- Divider -->
  <rect x="460" y="465" width="160" height="1.5" rx="1" fill="url(#accent)" opacity="0.3"/>

  <!-- Info cards -->
  <!-- Card 1: Server type -->
  <rect x="120" y="510" width="250" height="80" rx="12" fill="#161b22" stroke="#578aff" stroke-opacity="0.15" stroke-width="1"/>
  <text x="145" y="545" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="15" font-weight="700" fill="#578aff">🎮 伺服器類型</text>
  <text x="145" y="572" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="14" font-weight="400" fill="#c9d1d9">養老建築生存</text>

  <!-- Card 2: Version -->
  <rect x="415" y="510" width="250" height="80" rx="12" fill="#161b22" stroke="#a8e6cf" stroke-opacity="0.15" stroke-width="1"/>
  <text x="440" y="545" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="15" font-weight="700" fill="#a8e6cf">📌 遊戲版本</text>
  <text x="440" y="572" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="14" font-weight="400" fill="#c9d1d9">Java Edition 1.21+</text>

  <!-- Card 3: Community -->
  <rect x="710" y="510" width="250" height="80" rx="12" fill="#161b22" stroke="#ab72f9" stroke-opacity="0.15" stroke-width="1"/>
  <text x="735" y="545" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="15" font-weight="700" fill="#ab72f9">👥 社群規模</text>
  <text x="735" y="572" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="14" font-weight="400" fill="#c9d1d9">400+ 註冊會員</text>

  <!-- Features section -->
  <text x="540" y="650" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18" font-weight="700" fill="#8b949e" text-anchor="middle" letter-spacing="3">— 海風特色 —</text>

  <!-- Feature items -->
  <text x="200" y="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">🏗️ 精緻建築</text>
  <text x="420" y="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">📖 獨特世界觀</text>
  <text x="640" y="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">🎉 豐富活動</text>
  <text x="860" y="700" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">🤝 友善社群</text>

  <!-- Second row -->
  <text x="200" y="740" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">🌅 美麗風景</text>
  <text x="420" y="740" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">🎵 背景音樂</text>
  <text x="640" y="740" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">🛡️ 穩定營運</text>
  <text x="860" y="740" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="16" font-weight="500" fill="#c9d1d9" text-anchor="middle">🏆 定期活動</text>

  <!-- CTA area -->
  <rect x="340" y="800" width="400" height="56" rx="28" fill="url(#accent)" opacity="0.15"/>
  <rect x="340" y="800" width="400" height="56" rx="28" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
  <text x="540" y="834" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18" font-weight="700" fill="#e6edf3" text-anchor="middle">🌐 www.seawind.cc</text>

  <!-- Bottom info -->
  <text x="540" y="910" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="13" font-weight="400" fill="#8b949e" text-anchor="middle">Discord 連結在個人主頁 · 歡迎加入我們</text>

  <!-- Bottom wave accent -->
  <path d="M0 1020 Q270 1000 540 1020 Q810 1040 1080 1020 L1080 1080 L0 1080Z" fill="#578aff" fill-opacity="0.08"/>
</svg>
