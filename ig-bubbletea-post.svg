<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1c2333"/>
    </linearGradient>
    <!-- Gold gradient for title -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c49b6c"/>
      <stop offset="50%" stop-color="#e0c9a8"/>
      <stop offset="100%" stop-color="#c49b6c"/>
    </linearGradient>
    <!-- Blue glow -->
    <radialGradient id="glow1" cx="0.3" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="rgba(157,175,255,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Green glow -->
    <radialGradient id="glow2" cx="0.7" cy="0.8" r="0.5">
      <stop offset="0%" stop-color="rgba(168,230,207,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Cup gradient -->
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(210,180,140,0.9)"/>
      <stop offset="60%" stop-color="rgba(180,140,100,0.95)"/>
      <stop offset="100%" stop-color="rgba(100,60,30,0.9)"/>
    </linearGradient>
    <!-- Straw gradient -->
    <linearGradient id="straw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8282"/>
      <stop offset="100%" stop-color="#e06060"/>
    </linearGradient>
    <!-- Card bg -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow1)"/>
  <rect width="1080" height="1080" fill="url(#glow2)"/>

  <!-- Decorative dots / particles -->
  <circle cx="120" cy="180" r="2" fill="rgba(157,175,255,0.3)"/>
  <circle cx="950" cy="120" r="1.5" fill="rgba(168,230,207,0.25)"/>
  <circle cx="200" cy="900" r="2.5" fill="rgba(157,175,255,0.2)"/>
  <circle cx="880" cy="850" r="1.8" fill="rgba(196,155,108,0.25)"/>
  <circle cx="500" cy="950" r="2" fill="rgba(168,230,207,0.2)"/>
  <circle cx="980" cy="500" r="1.5" fill="rgba(157,175,255,0.2)"/>
  <circle cx="80" cy="550" r="2" fill="rgba(196,155,108,0.2)"/>

  <!-- ═══ Bubble Tea Cup (center, large) ═══ -->
  <g transform="translate(540, 380)">
    <!-- Cup body -->
    <rect x="-65" y="-50" width="130" height="160" rx="8" ry="8" fill="url(#cup)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <!-- Cup shine -->
    <ellipse cx="-30" cy="-10" rx="12" ry="35" fill="rgba(255,255,255,0.15)" transform="rotate(-10, -30, -10)"/>
    <!-- Lid -->
    <rect x="-75" y="-62" width="150" height="14" rx="7" ry="7" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Straw -->
    <rect x="18" y="-130" width="10" height="80" rx="5" ry="5" fill="url(#straw)" transform="rotate(8, 23, -90)"/>
    <!-- Pearls (boba) -->
    <circle cx="-30" cy="75" r="10" fill="#3a2010" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <circle cx="-30" cy="75" r="4" fill="#6b4226" opacity="0.6"/>
    <circle cx="-8" cy="82" r="9" fill="#3a2010" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <circle cx="-8" cy="82" r="3.5" fill="#6b4226" opacity="0.6"/>
    <circle cx="18" cy="72" r="11" fill="#3a2010" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <circle cx="18" cy="72" r="4.5" fill="#6b4226" opacity="0.6"/>
    <circle cx="38" cy="80" r="8" fill="#3a2010" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <circle cx="38" cy="80" r="3" fill="#6b4226" opacity="0.6"/>
    <circle cx="-18" cy="92" r="9" fill="#3a2010" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <circle cx="-18" cy="92" r="3.5" fill="#6b4226" opacity="0.6"/>
    <circle cx="28" cy="93" r="10" fill="#3a2010" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <circle cx="28" cy="93" r="4" fill="#6b4226" opacity="0.6"/>
    <circle cx="5" cy="68" r="8" fill="#3a2010" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
    <circle cx="5" cy="68" r="3" fill="#6b4226" opacity="0.6"/>
  </g>

  <!-- ═══ Emoji decorations (text labels instead of emoji) ═══ -->
  <text x="380" y="305" font-family="sans-serif" font-weight="700" font-size="20" fill="#c49b6c" text-anchor="middle">Boba</text>
  <text x="700" y="315" font-family="sans-serif" font-weight="700" font-size="18" fill="rgba(168,230,207,0.5)" text-anchor="middle">Tea</text>
  <text x="345" y="485" font-family="sans-serif" font-weight="700" font-size="18" fill="rgba(157,175,255,0.4)" text-anchor="middle">MC</text>
  <text x="735" y="465" font-family="sans-serif" font-weight="700" font-size="18" fill="rgba(196,155,108,0.4)" text-anchor="middle">Sw</text>

  <!-- ═══ Title ═══ -->
  <text x="540" y="600" font-family="sans-serif" font-weight="900" font-size="62" fill="url(#gold)" text-anchor="middle" letter-spacing="-1">海風國際珍奶日</text>

  <!-- ═══ Subtitle ═══ -->
  <text x="540" y="650" font-family="sans-serif" font-weight="500" font-size="26" fill="#9dafff" text-anchor="middle" letter-spacing="4">2026 · 4/27 – 5/31</text>

  <!-- ═══ Divider line ═══ -->
  <line x1="380" y1="680" x2="700" y2="680" stroke="rgba(196,155,108,0.25)" stroke-width="2"/>
  <circle cx="540" cy="680" r="4" fill="#c49b6c" opacity="0.5"/>

  <!-- ═══ Info cards ═══ -->
  <!-- Card 1: 13 flavors -->
  <g transform="translate(160, 720)">
    <rect x="0" y="0" width="230" height="90" rx="12" fill="cardBg" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="115" y="35" font-family="sans-serif" font-weight="900" font-size="36" fill="#c49b6c" text-anchor="middle">13</text>
    <text x="115" y="62" font-family="sans-serif" font-weight="500" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">限定口味</text>
  </g>

  <!-- Card 2: 14 ingredients -->
  <g transform="translate(425, 720)">
    <rect x="0" y="0" width="230" height="90" rx="12" fill="cardBg" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="115" y="35" font-family="sans-serif" font-weight="900" font-size="36" fill="#c49b6c" text-anchor="middle">14</text>
    <text x="115" y="62" font-family="sans-serif" font-weight="500" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">活動原料</text>
  </g>

  <!-- Card 3: 35 days -->
  <g transform="translate(690, 720)">
    <rect x="0" y="0" width="230" height="90" rx="12" fill="cardBg" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="115" y="35" font-family="sans-serif" font-weight="900" font-size="36" fill="#c49b6c" text-anchor="middle">35</text>
    <text x="115" y="62" font-family="sans-serif" font-weight="500" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="2">活動天數</text>
  </g>

  <!-- ═══ Feature highlights ═══ -->
  <text x="540" y="870" font-family="sans-serif" font-weight="500" font-size="17" fill="#c9d1d9" text-anchor="middle">限定武器「珍奶微微」· 限定稱號 · 代幣商店</text>

  <!-- ═══ Bottom: logo + server info ═══ -->
  <line x1="200" y1="920" x2="880" y2="920" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Logo circle -->
  <circle cx="540" cy="965" r="22" fill="rgba(157,175,255,0.1)" stroke="rgba(157,175,255,0.2)" stroke-width="1.5"/>
  <text x="540" y="973" font-family="sans-serif" font-weight="800" font-size="16" fill="#9dafff" text-anchor="middle">SW</text>

  <text x="540" y="1010" font-family="sans-serif" font-weight="600" font-size="16" fill="#8b949e" text-anchor="middle">www.seawind.cc</text>
  <text x="540" y="1038" font-family="sans-serif" font-weight="400" font-size="13" fill="#484f58" text-anchor="middle">Java Edition · Minecraft 養老建築生存伺服器</text>

  <!-- ═══ Top-left badge ═══ -->
  <rect x="40" y="40" width="130" height="36" rx="18" fill="rgba(255,170,50,0.12)" stroke="rgba(255,170,50,0.2)" stroke-width="1"/>
  <text x="105" y="64" font-family="sans-serif" font-weight="700" font-size="15" fill="#ffaa32" text-anchor="middle">限時活動</text>

  <!-- ═══ Bottom-right: IG handle ═══ -->
  <text x="1040" y="1060" font-family="sans-serif" font-weight="500" font-size="13" fill="#484f58" text-anchor="end">@mc.seawind.cc</text>
</svg>
